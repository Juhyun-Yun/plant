    {art:'🧩',title:'식물 세포의 구조',body:'식물 세포는 <b>세포벽·세포막·핵·세포질</b>로 이루어져요. 이름표를 알맞은 자리에 붙여 보세요!'}
  ]});
}

/* 지지 작용 — 바람 vs 뿌리 (조작) */
function rootSupportSim(body,t,done){
  const col=t.col.c;
  body.innerHTML=`<div class="simwrap"><div id="cvHolder"></div>
    <div class="simside">
      <div class="softpill">💨 바람 세기: <b id="wv">0</b></div>
      <input id="wind" type="range" min="0" max="100" value="0" style="width:100%; accent-color:${col}">
      <div class="softpill">🌱 뿌리 튼튼함: <b id="rv">3</b></div>
      <input id="rstr" type="range" min="1" max="10" value="3" style="width:100%; accent-color:${col}">
      <div class="panel" style="padding:7px 12px; flex:1; display:flex; flex-direction:column; gap:5px;">
        <div style="font-family:'Jua'; color:var(--ink); font-size:22px">🔎 단계별 확인</div>
        <div class="check" id="check">
          <div class="ck" data-ck="wind"><span class="box">○</span><span>바람을 세게 불게 했어요</span></div>
          <div class="ck" data-ck="fall"><span class="box">○</span><span>뿌리가 약하면 쓰러져요</span></div>
          <div class="ck" data-ck="hold"><span class="box">○</span><span>뿌리가 튼튼하면 버텨요</span></div>
        </div>
        <div class="hintline" id="hint">바람을 세게 한 뒤, 뿌리 튼튼함을 약하게·강하게 바꿔 보세요.</div>
      </div>
      <button class="navbtn sm ghost" id="guide">📖 차근차근 알아보기</button>
    </div></div>`;
  const cv=mkCanvas(document.getElementById('cvHolder'),540,360);
  const ctx=cv.ctx,W=cv.w,H=cv.h, cx=W/2, soilY=232;
  const root=genRoot(cx,soilY,H-soilY-8,150,21);
  let wind=0, rstr=3, theta=0, frame=0;
  const ws=document.getElementById('wind'), rs=document.getElementById('rstr');
  ws.oninput=()=>{wind=+ws.value; document.getElementById('wv').textContent=wind; if(wind>0)tick(body,'wind'); chk();};
  rs.oninput=()=>{rstr=+rs.value; document.getElementById('rv').textContent=rstr; chk();};
  document.getElementById('guide').onclick=guide;
  function guide(){openModal([
    {art:'⚓',title:'뿌리는 식물을 붙잡아요',body:'뿌리는 땅속으로 단단히 뻗어 식물이 <b>쓰러지지 않게 지지</b>해요. 눈에 보이지 않는 이 힘을 비교해 봐요.'},
    {art:'💨',title:'직접 해 보기',body:'<b>바람</b>을 세게 하고 <b>뿌리 튼튼함</b>을 바꿔 보세요. 뿌리가 약하면 쉽게 기울어 쓰러지고, 튼튼하면 버텨요!'}
  ],{color:col});}
  function chk(){if(allTicked(body)){document.getElementById('hint').textContent='👍 모든 단계 확인! ‘다음’으로 넘어가요.'; done();}}
  function drawLeaf(x,y,dir,s){ctx.fillStyle='#4fae6d'; ctx.beginPath(); ctx.ellipse(x,y,24*s,11*s,dir*0.5,0,7); ctx.fill();}
  loop(()=>{ frame++;
    const target=(wind/100)*(1-rstr/10)*1.25;
    theta += (target-theta)*0.08 + (wind>0?Math.sin(frame*0.25)*0.006*(wind/100):0);
    if(theta<0)theta=0;
    if(wind>=60 && rstr<=3 && theta>0.55) tick(body,'fall');
    if(wind>=60 && rstr>=8 && theta<0.3) tick(body,'hold');
    chk();
    // draw
    ctx.clearRect(0,0,W,H);
    const sky=ctx.createLinearGradient(0,0,0,soilY); sky.addColorStop(0,'#eaf6ff'); sky.addColorStop(1,'#f1f8ef');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,soilY);
    ctx.fillStyle='#7a5230'; ctx.fillRect(0,soilY,W,H-soilY);
    ctx.fillStyle='#6c4626'; for(let x=0;x<W;x+=24)ctx.fillRect(x,soilY+3,11,3);
    // wind streaks
    if(wind>0){ctx.strokeStyle='rgba(120,170,210,.5)'; ctx.lineWidth=2;
      const n=Math.round(wind/100*6); for(let i=0;i<n;i++){const yy=40+i*26, off=(frame*3+i*40)%160;
        ctx.beginPath(); ctx.moveTo(off-40,yy); ctx.lineTo(off+10,yy); ctx.stroke();}
      ctx.font='24px serif'; ctx.fillText('💨',14,soilY-20);}
    // roots (튼튼할수록 깊고 넓게)
    ctx.save(); ctx.translate(cx,soilY); ctx.scale(0.7+rstr/10*0.5,0.5+rstr/10*0.8); ctx.translate(-cx,-soilY);
    drawRoot(ctx,root,'#9c6a34','#c79a63',Math.round(rstr*6)); ctx.restore();
    // plant (기울어짐)
    ctx.save(); ctx.translate(cx,soilY); ctx.rotate(theta);
    ctx.strokeStyle='#62a73d'; ctx.lineCap='round'; ctx.lineWidth=12; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-120); ctx.stroke(); ctx.lineCap='butt';
    drawLeaf(-26,-118,-1,1); drawLeaf(26,-118,1,1); drawLeaf(-22,-86,-1,0.85); drawLeaf(22,-86,1,0.85);
    ctx.restore();
    // 상태 표시
    ctx.font='bold 20px Noto Sans KR'; ctx.textAlign='center';
    if(theta>0.95){ctx.fillStyle='#d3603a'; ctx.fillText('쓰러졌어요! 🌪️',cx,40);}
    else if(wind>=60 && theta<0.3){ctx.fillStyle='#1f9d57'; ctx.fillText('튼튼하게 버텨요! 💪',cx,40);}
    ctx.textAlign='left';
  });
  const k='guide-'+t.id+'-'+state.pi; if(!state.seen[k]){state.seen[k]=1; delay(guide,350);}
}

/* 저장 작용 — 잎이 만든 양분을 뿌리에 저장 (조작) */
function rootStoreSim(body,t,done){
  const col=t.col.c;
  body.innerHTML=`<div class="simwrap"><div id="cvHolder"></div>
    <div class="simside">
      <div class="controls"><button class="toggle on" id="sunT">☀️ 날씨: 맑음</button></div>
      <div class="meter"><div class="m">저장량 <b id="st">0</b></div></div>
      <div class="panel" style="padding:7px 12px; flex:1; display:flex; flex-direction:column; gap:5px;">
        <div style="font-family:'Jua'; color:var(--ink); font-size:22px">🔎 단계별 확인</div>
        <div class="check" id="check">
          <div class="ck" data-ck="make"><span class="box">○</span><span>맑은 날 잎이 양분을 만들어요</span></div>
          <div class="ck" data-ck="store"><span class="box">○</span><span>양분이 뿌리에 저장돼요</span></div>
          <div class="ck" data-ck="fat"><span class="box">○</span><span>저장될수록 뿌리가 굵어져요</span></div>
        </div>
        <div class="hintline" id="hint">맑은 날에는 잎이 양분을 만들어 뿌리로 내려보내요. 날씨를 바꿔 보세요.</div>
      </div>
      <button class="navbtn sm ghost" id="guide">📖 차근차근 알아보기</button>
    </div></div>`;
  const cv=mkCanvas(document.getElementById('cvHolder'),540,360);
  const ctx=cv.ctx,W=cv.w,H=cv.h, cx=W/2, soilY=150, rootY=soilY+78;
  let sun=true, store=0, parts=[], frame=0;
  const sunT=document.getElementById('sunT');
  sunT.onclick=()=>{sun=!sun; sunT.classList.toggle('on',sun); sunT.textContent='☀️ 날씨: '+(sun?'맑음':'흐림');
    if(!sun)sunT.textContent='☁️ 날씨: 흐림';};
  document.getElementById('guide').onclick=guide;
  function guide(){openModal([
    {art:'🍠',title:'뿌리에 양분을 저장해요',body:'잎이 만든 <b>양분</b>은 줄기를 타고 내려와 뿌리에 <b>저장</b>되기도 해요. 고구마·당근·무가 그런 뿌리예요.'},
    {art:'☀️',title:'직접 해 보기',body:'<b>맑은 날</b>에는 잎이 양분을 많이 만들어 뿌리로 내려보내요. <b>흐린 날</b>로 바꾸면 어떻게 되는지 비교해 보세요!'}
  ],{color:col});}
  function chk(){if(allTicked(body)){document.getElementById('hint').textContent='👍 모든 단계 확인! ‘다음’으로 넘어가요.'; done();}}
  function drawCloud(x,y,s){ctx.fillStyle='#eef1f5'; ctx.strokeStyle='#d3dae3'; ctx.lineWidth=2;
    [[0,0,20],[-16,5,14],[16,5,15],[-6,-9,12]].forEach(c=>{ctx.beginPath(); ctx.arc(x+c[0]*s,y+c[1]*s,c[2]*s,0,7); ctx.fill();});}
  loop(()=>{ frame++;
    if(sun && frame%16===0){parts.push({x:cx+(Math.random()-.5)*60,y:60,ph:'down'}); tick(body,'make'); chk();}
    for(const p of parts){
      p.x+=(cx-p.x)*0.05; p.y+=2.2;
      if(p.y>=rootY){p.dead=1; store++; tick(body,'store'); if(store>=14)tick(body,'fat');
        document.getElementById('st').textContent=store; chk();}
    }
    parts=parts.filter(p=>!p.dead);
    // draw
    ctx.clearRect(0,0,W,H);
    const sky=ctx.createLinearGradient(0,0,0,soilY); sky.addColorStop(0,sun?'#eaf6ff':'#dfe4ea'); sky.addColorStop(1,'#f1f8ef');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,soilY);
    // 해 (항상 노란색) + 맑으면 광선, 흐리면 구름이 가림
    ctx.fillStyle='#ffd24d'; ctx.beginPath(); ctx.arc(58,44,18,0,7); ctx.fill();
    if(sun){ctx.strokeStyle='rgba(255,200,60,.7)'; ctx.lineWidth=3; for(let i=0;i<4;i++){ctx.beginPath(); ctx.moveTo(74,52); ctx.lineTo(cx-30,40+i*16); ctx.stroke();}}
    else { drawCloud(64,46,1.2); ctx.font='bold 18px Noto Sans KR'; ctx.fillStyle='#7a818c'; ctx.fillText('흐린 날에는 양분을 잘 못 만들어요',150,40); }
    ctx.fillStyle='#7a5230'; ctx.fillRect(0,soilY,W,H-soilY);
    ctx.fillStyle='#6c4626'; for(let x=0;x<W;x+=24)ctx.fillRect(x,soilY+3,11,3);
    // 잎 + 줄기
    ctx.fillStyle='#62a73d'; ctx.fillRect(cx-8,40,16,soilY-40);
    ctx.fillStyle='#4fae6d';
    ctx.beginPath(); ctx.ellipse(cx-30,52,26,12,-0.5,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+30,52,26,12,0.5,0,7); ctx.fill();
    // 저장 뿌리(저장량 따라 굵어짐)
    const rw=24+Math.min(store,40)/40*44, rh=46+Math.min(store,40)/40*36;
    ctx.fillStyle='#d98f4e'; ctx.beginPath(); ctx.ellipse(cx,rootY,rw,rh,0,0,7); ctx.fill();
    ctx.strokeStyle='#b9772f'; ctx.lineWidth=2; ctx.stroke();
    // 잔뿌리
    ctx.strokeStyle='#b9772f'; ctx.lineWidth=2.5; ctx.lineCap='round';
    for(let i=-2;i<=2;i++){ctx.beginPath(); ctx.moveTo(cx+i*10,rootY+rh-6); ctx.quadraticCurveTo(cx+i*16,rootY+rh+18,cx+i*20,H-6); ctx.stroke();} ctx.lineCap='butt';
    // 저장된 양분(점)
    ctx.fillStyle='#e8b73c'; const dots=Math.min(store,30);
    for(let i=0;i<dots;i++){const a=i*2.4, rr=(i/dots)*rw*0.7; ctx.beginPath(); ctx.arc(cx+Math.cos(a)*rr,rootY+Math.sin(a)*rh*0.7,3,0,7); ctx.fill();}
    // 내려가는 양분
    for(const p of parts){ctx.fillStyle='#e8b73c'; ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,7); ctx.fill();
      ctx.strokeStyle='#b9892a'; ctx.lineWidth=1; ctx.stroke();}
    ctx.font='bold 17px Noto Sans KR'; ctx.fillStyle='#c79320'; ctx.fillText('● 양분',14,H-16);
  });
  const k='guide-'+t.id+'-'+state.pi; if(!state.seen[k]){state.seen[k]=1; delay(guide,350);}
}

/* 뿌리의 생김새 — 굵은 뿌리 / 잔뿌리 / 뿌리털 */
function rootShape(body,t,done){
  const col=t.col.c;
  const svg=`<svg viewBox="0 0 260 250" style="width:100%; height:100%; max-height:340px">
    <rect x="0" y="30" width="260" height="14" fill="#7a5230" opacity="0.18"/>
    <line x1="130" y1="6" x2="130" y2="36" stroke="#62a73d" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="112" cy="14" rx="20" ry="9" fill="#4fae6d"/><ellipse cx="148" cy="14" rx="20" ry="9" fill="#4fae6d"/>
    <polygon points="116,40 144,40 150,118 134,214 126,214 110,118" fill="#b07a3e" stroke="#8a5a2b" stroke-width="2"/>
    <path d="M120 92 C96 100 80 124 66 152" stroke="#b07a3e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M140 112 C168 122 188 142 206 168" stroke="#b07a3e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M130 200 C128 214 126 222 124 236" stroke="#b07a3e" stroke-width="4" fill="none" stroke-linecap="round"/>
    ${(()=>{ // 뿌리털: 뿌리 전체를 따라 자연스럽게 (끝으로 갈수록 촘촘)
      let s=''; const segs=[
        [[124,118],[116,150],[108,182],[103,212]],
        [[118,96],[98,110],[80,130],[66,152]],
        [[142,114],[168,126],[190,146],[206,168]],
        [[129,198],[127,212],[125,224],[124,236]]
      ];
      segs.forEach(pts=>{ for(let i=0;i<pts.length-1;i++){ const [x1,y1]=pts[i],[x2,y2]=pts[i+1];
        const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len;
        for(let k=0;k<4;k++){ const f=k/4, x=x1+dx*f, y=y1+dy*f, side=(k%2?1:-1), L=5+ (i+1)*1.2 + Math.random()*2;
          s+=`<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${(x+nx*side*L).toFixed(1)}" y2="${(y+ny*side*L+2).toFixed(1)}" stroke="#caa06a" stroke-width="1.2"/>`;
        }}});
      return s; })()}
    <circle class="slot" data-id="thick" cx="130" cy="70" r="14" fill="rgba(255,255,255,.9)" stroke="${col}" stroke-width="2" stroke-dasharray="4 3"/>
    <text class="slotxt" data-id="thick" x="130" y="75" text-anchor="middle" font-family="Jua" font-size="12" fill="${t.col.d}">?</text>
    <circle class="slot" data-id="lat" cx="192" cy="148" r="14" fill="rgba(255,255,255,.9)" stroke="${col}" stroke-width="2" stroke-dasharray="4 3"/>
    <text class="slotxt" data-id="lat" x="192" y="153" text-anchor="middle" font-family="Jua" font-size="12" fill="${t.col.d}">?</text>
    <line x1="58" y1="196" x2="94" y2="178" stroke="${col}" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle class="slot" data-id="hair" cx="50" cy="200" r="14" fill="rgba(255,255,255,.9)" stroke="${col}" stroke-width="2" stroke-dasharray="4 3"/>
    <text class="slotxt" data-id="hair" x="50" y="205" text-anchor="middle" font-family="Jua" font-size="12" fill="${t.col.d}">?</text>
  </svg>`;
  labelActivity(body,t,done,{intro:'🏷️ 이름표를 누른 뒤, 뿌리에서 알맞은 부분을 누르세요.', svg, color:col, parts:[
    {id:'thick',label:'굵은 뿌리',desc:'가운데를 지나는 가장 굵은 뿌리예요. 식물을 단단히 지지해요.'},
    {id:'lat',label:'잔뿌리',desc:'굵은 뿌리에서 갈라져 나온 가늘고 작은 뿌리예요.'},
    {id:'hair',label:'뿌리털',desc:'뿌리 곳곳에 솜털처럼 난 아주 가는 털이에요. 물과 닿는 면을 넓혀 흡수를 도와요.'}
  ], guide:[
    {art:'🌱',title:'뿌리의 생김새',body:'뿌리는 가운데 <b>굵은 뿌리</b>와, 거기서 갈라진 <b>잔뿌리</b>, 그리고 뿌리 곳곳에 솜털처럼 난 <b>뿌리털</b>로 이루어져요.'},
    {art:'🔎',title:'직접 찾아보기',body:'굵은 뿌리는 가운데, 잔뿌리는 갈라진 가는 뿌리, <b>뿌리털</b>은 뿌리에 촘촘히 난 가는 털이에요. 이름표를 붙여 확인해요!'}
  ]});
}
