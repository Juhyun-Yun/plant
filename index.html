                        <h2 className="font-jua text-3xl text-amber-900">🗺 다섯 가지 미션을 완료하세요!</h2>
                    </div>

                    <div className="grid grid-cols-3 lg:grid-cols-6 gap-3 px-2 flex-1 items-center">
                        {missions.map((m) => {
                            const done = completed[m.id];
                            return (
                                <button key={m.id} onClick={() => setStep(m.id)}
                                    className={`group relative bg-white ink-border rounded-3xl p-3 flex flex-col items-center text-center gap-2 stamp-shadow hover:-translate-y-2 hover:stamp-shadow-deep transition-all`}>
                                    {done && (
                                        <div className="absolute -top-2 -right-2 w-12 h-12 bg-rose-500 text-white rounded-full font-jua text-sm flex items-center justify-center ink-border rotate-12 stamp-in">
                                            완료!
                                        </div>
                                    )}
                                    <div className={`w-16 h-16 ${m.color} rounded-2xl flex items-center justify-center ink-border ${m.borderColor} stamp-shadow text-white floating`}>
                                        <Icon name={m.icon} className="w-9 h-9" />
                                    </div>
                                    <div className="text-sm font-bold text-amber-700">MISSION {m.num}</div>
                                    <h3 className="font-jua text-xl text-amber-900 leading-tight">{m.title}</h3>
                                    <p className="text-sm text-amber-700/80 leading-snug break-keep">{m.desc}</p>
                                </button>
                            );
                        })}
                        <button onClick={() => setStep('cert')}
                            disabled={Object.values(completed).filter(Boolean).length < 5}
                            className={`group relative bg-gradient-to-br from-amber-200 to-rose-200 ink-border rounded-3xl p-3 flex flex-col items-center text-center gap-2 stamp-shadow ${Object.values(completed).filter(Boolean).length >= 5 ? 'hover:-translate-y-2 cursor-pointer' : 'opacity-50 cursor-not-allowed'}`}>
                            <div className="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center ink-border border-yellow-700 stamp-shadow text-white floating">
                                <Icon name="Award" className="w-9 h-9" />
                            </div>
                            <div className="text-sm font-bold text-amber-700">FINAL</div>
                            <h3 className="font-jua text-xl text-amber-900 leading-tight">도형 마스터 인증</h3>
                            <p className="text-sm text-amber-700/80 leading-snug">5개 미션 완료시</p>
                        </button>
                    </div>

                    <div className="mt-4 px-2 shrink-0">
                        <div className="bg-amber-100/60 border-2 border-amber-300 rounded-2xl p-3 text-center text-base text-amber-800">
                            💡 진행도: <b className="text-amber-900">{Object.values(completed).filter(Boolean).length}</b> / 5 미션 완료
                        </div>
                    </div>
                </div>
            );
        }

        // ============ 공통: 미션 헤더 (지도 버튼 통합) + 좌우 페이지 네비게이션 ============
        function MissionHeader({ mNum, mTitle, page, total, icon, iconBg, extra, onBack }) {
            return (
                <div className="bg-white ink-border rounded-xl px-3 py-1.5 stamp-shadow mb-2 shrink-0 flex items-center gap-2">
                    {onBack && (
                        <button onClick={onBack}
                            className="px-2 py-1 bg-amber-50 ink-border rounded-lg text-amber-800 hover:bg-amber-100 flex items-center gap-1 shrink-0">
                            <Icon name="Home" className="w-4 h-4" />
                            <span className="text-xs font-bold whitespace-nowrap">지도</span>
                        </button>
                    )}
                    <div className={`w-8 h-8 ${iconBg} rounded-lg flex items-center justify-center text-white shrink-0`}>
                        <Icon name={icon} className="w-5 h-5" />
                    </div>
                    <span className="text-xs text-amber-700 font-bold tracking-wider whitespace-nowrap">MISSION {mNum}</span>
                    <h2 className="font-jua text-lg text-amber-900 whitespace-nowrap">{mTitle}</h2>
                    {extra}
                    <div className="ml-auto px-3 py-1 bg-amber-100 ink-border rounded-full font-jua text-sm text-amber-900 shrink-0 whitespace-nowrap">
                        {page} / {total} 페이지
                    </div>
                </div>
            );
        }

        // 페이지 네비: 좌측 끝 이전 / 우측 끝 다음 (동일한 작은 크기). children으로 가운데 내용
        function PageNav({ page, total, onPrev, onNext, onComplete, canNext = true, completeLabel = '완료', completeColor = 'bg-amber-700 hover:bg-amber-800', children }) {
            const btnBase = "px-3 py-1.5 ink-border rounded-lg font-jua text-sm stamp-shadow flex items-center gap-1 shrink-0 whitespace-nowrap";
            return (
                <div className="flex items-center gap-2 shrink-0">
                    <button onClick={onPrev} disabled={page === 1}
                        className={`${btnBase} ${page === 1 ? 'bg-amber-50 text-amber-300 cursor-not-allowed' : 'bg-white text-amber-800 hover:bg-amber-50'}`}>
                        <Icon name="ChevronLeft" className="w-4 h-4" /> 이전
                    </button>
                    <div className="flex-1 flex items-center justify-center text-amber-700 text-xs">{children}</div>
                    {page < total ? (
                        <button onClick={onNext} disabled={!canNext}
                            className={`${btnBase} ${canNext ? 'bg-amber-700 text-white hover:bg-amber-800' : 'bg-amber-100 text-amber-400 cursor-not-allowed'}`}>
                            다음 <Icon name="ChevronRight" className="w-4 h-4" />
                        </button>
                    ) : (
                        <button onClick={onComplete} disabled={!canNext}
                            className={`${btnBase} ${canNext ? `${completeColor} text-white` : 'bg-amber-100 text-amber-400 cursor-not-allowed'}`}>
                            {completeLabel} <Icon name="Stamp" className="w-4 h-4" />
                        </button>
                    )}
                </div>
            );
        }

        // ============ 단계별 힌트 버튼 (중간 장치 포함) ============
        // 흐름: ① 글을 먼저 써야 힌트1을 열 수 있음
        //       ② 힌트1을 보고 답을 다시 고쳐 써야 힌트2가 열림
        // 버튼에 마우스를 올리면 현재 단계의 힌트 내용/안내가 말풍선으로 보임
        function HintBox({ hints, value = '' }) {
            const [level, setLevel] = useState(0);        // 0=닫힘, 1=힌트1, 2=힌트2
            const [snapshot, setSnapshot] = useState('');  // 마지막으로 힌트를 연 시점의 글 내용
            const labels = ['키워드', '문장 완성'];

            const written = (value || '').trim();
            const changed = written !== snapshot.trim();

            // 다음 단계를 열 수 있는 조건 + 잠겨 있을 때 안내 문구
            let canAdvance, lockMsg;
            if (level === 0) {
                canAdvance = written.length > 0;
                lockMsg = '먼저 너의 생각을 한 줄이라도 적어야 힌트가 열려!';
            } else if (level < hints.length) {
                canAdvance = changed;
                lockMsg = '힌트를 참고해서 답을 더 고쳐 적으면 다음 힌트가 열려!';
            } else {
                canAdvance = true; // 마지막 단계 → 누르면 닫힘
                lockMsg = '';
            }
            const locked = level < hints.length && !canAdvance;

            const handleClick = () => {
                if (level >= hints.length) { setLevel(0); return; } // 닫기
                if (!canAdvance) return;                            // 잠김 → 무시
                setLevel(level + 1);
                setSnapshot(value || '');
            };

            // 마우스를 올렸을 때 보일 내용
            const tipTitle = level > 0 ? `힌트 ${level} · ${labels[level - 1]}` : '힌트';
            const tipBody = level > 0 ? hints[level - 1] : (lockMsg || '버튼을 누르면 힌트가 열려요!');
            const suffix = locked ? ' 🔒' : (level === 0 ? '' : (level < hints.length ? ' ▸' : ' ✕'));

            return (
                <span className="relative group inline-flex items-center align-middle">
                    <button type="button" onClick={handleClick}
                        className={`ml-1 px-2 py-0.5 rounded-md text-xs font-bold whitespace-nowrap shrink-0 border-2 ${locked ? 'bg-gray-100 border-gray-300 text-gray-400 cursor-not-allowed' : 'bg-yellow-300 border-yellow-500 text-yellow-900 hover:bg-yellow-400'}`}>
                        💡 {level === 0 ? '힌트' : `힌트 ${level}`}{suffix}
                    </button>
                    <span className="pointer-events-none absolute left-0 top-full mt-1 w-64 z-50 opacity-0 group-hover:opacity-100 transition-opacity bg-amber-900 text-white text-sm leading-snug rounded-lg p-2 shadow-xl whitespace-normal break-keep text-left">
                        <span className="block text-yellow-300 text-xs mb-0.5">{tipTitle}</span>
                        {tipBody}
                        {locked && level > 0 && (
                            <span className="block text-yellow-200 text-xs mt-1">✍️ {lockMsg}</span>
                        )}
                    </span>
                </span>
            );
        }

        // ============================================================
        //         MISSION 1: 도형 분류소 (외연적 정의 활동)
        //   페이지 1: 개념 설명 / 페이지 2: 한 개씩 드래그 분류 / 페이지 3: 정리
        // ============================================================
        function ClassifyView({ onComplete, onBack }) {
            const TOTAL = 2;
            const [page, setPage] = useState(1);
            const [popup, setPopup] = useState(null);
            // 페이지 2: 한 개씩 분류 + 정리
            const shuffled = useMemo(() => [...CLASSIFY_ITEMS].sort(() => Math.random() - 0.5), []);
            const [idx, setIdx] = useState(0);
            const [classified, setClassified] = useState([]);
            const [dragging, setDragging] = useState(false);
            const [hoverSide, setHoverSide] = useState(null);
            // 정리
            const [common, setCommon] = useState('');
            const [diffPrism, setDiffPrism] = useState('');   // 차이점 - 각기둥은~
            const [diffPyramid, setDiffPyramid] = useState(''); // 차이점 - 각뿔은~

            const current = shuffled[idx];
            const allClassified = classified.length >= shuffled.length;

            // page 범위 안전 가드 (빈 화면 방지)
            useEffect(() => {
                if (page < 1 || page > TOTAL) setPage(1);
            }, [page]);
            const summaryDone = common.trim().length > 0 && diffPrism.trim().length > 0 && diffPyramid.trim().length > 0;

            const handleDrop = (side) => {
                setDragging(false);
                setHoverSide(null);
                if (!current) return;
                const correct = current.kind === side;
                if (correct) {
                    const isLast = idx >= shuffled.length - 1;
                    const dropped = { ...current, slot: side, correct: true };
                    // 함수형 업데이트로 stale closure 방지 + 중복 분류 방지
                    setClassified(prev => {
                        if (prev.some(c => c.id === dropped.id)) return prev;
                        return [...prev, dropped];
                    });
                    setPopup({ type: 'success', msg: isLast ? '모든 도형 분류 완료! 🎉\n이제 공통점과 차이점을 적어보세요!' : `정답! 🎉\n${current.name}은(는) ${side === 'prism' ? '각기둥' : '각뿔'}이에요!` });
                    setTimeout(() => {
                        setPopup(null);
                        if (!isLast) setIdx(prev => prev + 1);
                    }, 1100);
                } else {
                    setPopup({ type: 'error', msg: `다시 생각해보세요!\n${side === 'prism' ? '각기둥' : '각뿔'}이 맞나요?` });
                }
            };

            const resetClassify = () => {
                setIdx(0);
                setClassified([]);
                setCommon('');
                setDiffPrism('');
                setDiffPyramid('');
            };

            // ----------- 페이지 1: 개념 설명 -----------
            if (page === 1) {
                return (
                    <div className="h-full flex flex-col p-3 paper-bg overflow-hidden">
                        <Popup {...(popup || {})} onClose={() => setPopup(null)} />
                        <MissionHeader mNum="1" mTitle="도형 친구들을 만나봐요!" page={1} total={TOTAL} icon="BookOpen" iconBg="bg-amber-400" onBack={onBack} />
                        <AvatarGuide char="guard" text={
                            <span className="text-lg leading-relaxed">
                                "도형 왕국에는 두 종류의 마을이 있단다. <b className="text-emerald-700">각기둥 마을</b>과 <b className="text-rose-700">각뿔 마을</b>이지! 마우스를 클릭해 도형을 돌리며 잘 살펴봐."
                            </span>
                        } />

                        <div className="grid grid-cols-2 gap-3 flex-1 mb-2 min-h-0">
                            <div className="bg-amber-50 ink-border border-amber-500 rounded-2xl p-3 stamp-shadow flex flex-col min-h-0">
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white ink-border shrink-0">
                                        <Icon name="Box" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-3xl text-amber-900 whitespace-nowrap">각기둥</h3>
                                </div>
                                <div className="flex-1 bg-white rounded-xl border-2 border-amber-300 overflow-hidden" style={{ minHeight: '250px' }}>
                                    <Shape3DViewer shape={PRISMS[0]} color={0xf59e0b} />
                                </div>
                                <div className="mt-2 paper-bg p-2 rounded-xl border-2 border-amber-300 font-jua text-lg text-amber-900 leading-snug shrink-0">
                                    📌 <span className="hl-key">위·아래</span>에 <span className="hl-key">모양·크기가 같은 두 면</span>이 있고, <span className="hl-key">옆면</span>은 모두 <span className="hl-key">직사각형</span>인 도형
                                </div>
                            </div>
                            <div className="bg-rose-50 ink-border border-rose-500 rounded-2xl p-3 stamp-shadow flex flex-col min-h-0">
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center text-white ink-border shrink-0">
                                        <Icon name="Triangle" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-3xl text-rose-900 whitespace-nowrap">각뿔</h3>
                                </div>
                                <div className="flex-1 bg-white rounded-xl border-2 border-rose-300 overflow-hidden" style={{ minHeight: '250px' }}>
                                    <Shape3DViewer shape={PYRAMIDS[0]} color={0xf43f5e} />
                                </div>
                                <div className="mt-2 paper-bg p-2 rounded-xl border-2 border-rose-300 font-jua text-lg text-rose-900 leading-snug shrink-0">
                                    📌 <span className="hl-key">아래</span>는 <span className="hl-key">다각형 한 개</span>, 위는 <b>한 점</b>으로 모이고 <span className="hl-key">옆면</span>은 모두 <span className="hl-key">삼각형</span>인 도형
                                </div>
                            </div>
                        </div>

                        <PageNav page={1} total={TOTAL} onNext={() => setPage(2)} canNext={true} />
                    </div>
                );
            }

            // ----------- 페이지 2: 한 개씩 분류 -----------
            if (page === 2) {
                const prismItems = classified.filter(c => c.slot === 'prism');
                const pyramidItems = classified.filter(c => c.slot === 'pyramid');
                const extraInfo = (
                    <div className="ml-2 flex items-center gap-2 shrink-0">
                        <div className="w-32 h-2.5 bg-amber-100 rounded-full overflow-hidden border border-amber-300">
                            <div className="h-full bg-amber-500 transition-all" style={{ width: `${(classified.length / shuffled.length) * 100}%` }} />
                        </div>
                        <span className="font-jua text-sm text-amber-900 whitespace-nowrap">{classified.length}/{shuffled.length}</span>
                        <button onClick={resetClassify} className="px-2 py-0.5 bg-white border-2 border-amber-300 rounded-md text-xs font-bold text-amber-700 hover:bg-amber-50 whitespace-nowrap">
                            <Icon name="RotateCcw" className="w-3 h-3 inline" /> 다시
                        </button>
                    </div>
                );

                return (
                    <div className="h-full flex flex-col p-3 paper-bg overflow-hidden">
                        <Popup {...(popup || {})} onClose={() => setPopup(null)} />
                        <MissionHeader mNum="1" mTitle="도형을 분류해보세요!" page={2} total={TOTAL} icon="Layers" iconBg="bg-amber-400" extra={extraInfo} onBack={onBack} />
                        <div className="bg-amber-100/70 ink-border border-amber-400 rounded-lg px-3 py-2 stamp-shadow mb-2 shrink-0 flex items-center gap-3">
                            <div className="text-3xl shrink-0">🧭</div>
                            <div className="font-gaegu text-lg text-amber-900 flex-1 leading-snug">
                                "길 잃은 도형 친구들이야! <b className="text-emerald-700">각기둥</b>은 왼쪽 마을로, <b className="text-rose-700">각뿔</b>은 오른쪽 마을로 보내줘."
                            </div>
                        </div>

                        {/* 좌: 각기둥 박스 / 중앙: 현재 도형 / 우: 각뿔 박스 */}
                        <div className="grid grid-cols-7 gap-3 flex-1 mb-2 min-h-0">
                            {/* 각기둥 박스 */}
                            <div
                                onDragOver={(e) => { e.preventDefault(); setHoverSide('prism'); }}
                                onDragLeave={() => setHoverSide(null)}
                                onDrop={() => handleDrop('prism')}
                                className={`col-span-2 bg-amber-50 ink-border border-amber-500 border-[4px] border-dashed rounded-2xl flex flex-col p-3 ${hoverSide === 'prism' ? 'drop-zone-active' : ''}`}>
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white ink-border">
                                        <Icon name="Box" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-2xl text-amber-900">각기둥</h3>
                                </div>
                                <div className="paper-bg p-2 rounded-lg border border-amber-300 font-jua text-base text-amber-900 leading-snug mb-2 shrink-0">
                                    📌 <span className="hl-key">위·아래</span>에 <span className="hl-key">모양과 크기가 같은 두 면</span>이 있고, <span className="hl-key">옆면</span>은 모두 <span className="hl-key">직사각형</span>인 도형
                                </div>
                                <div className="flex-1 bg-white/50 rounded-xl border-2 border-amber-300 p-2 min-h-0 overflow-hidden">
                                    {prismItems.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-amber-400 text-sm text-center">
                                            아직 분류된 도형이<br/>없어요
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-2 h-full content-start">
                                            {prismItems.map(c => (
                                                <div key={c.id} className="bg-white rounded-lg border-2 border-amber-600 p-1 flex flex-col items-center stamp-shadow">
                                                    <div className="w-full h-16">
                                                        <MiniShape3D shape={c.shape} color={c.color} />
                                                    </div>
                                                    <div className="text-xs font-bold text-amber-900 whitespace-nowrap">{c.name}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 중앙: 분류 중 → 현재 도형 / 분류 완료 → 공통점/차이점 폼 */}
                            <div className="col-span-3 bg-white ink-border rounded-2xl stamp-shadow flex flex-col p-3 relative min-h-0">
                                {!allClassified && current ? (
                                    <>
                                        <div className="text-base font-bold text-amber-700 mb-1 shrink-0 whitespace-nowrap text-center">
                                            이 도형은 어디에 속할까요?
                                        </div>
                                        <div className="font-jua text-3xl text-amber-900 mb-2 shrink-0 whitespace-nowrap text-center">{current.name}</div>
                                        <div
                                            draggable
                                            onDragStart={(e) => {
                                                setDragging(true);
                                                // 일부 브라우저는 setData가 없으면 drag 안 시작됨
                                                try { e.dataTransfer.setData('text/plain', current.id); } catch (err) {}
                                                try { e.dataTransfer.effectAllowed = 'move'; } catch (err) {}
                                            }}
                                            onDragEnd={() => { setDragging(false); setHoverSide(null); }}
                                            className={`draggable-card flex-1 w-full bg-amber-50/30 rounded-xl border-2 border-amber-300 cursor-grab active:cursor-grabbing min-h-0 relative ${dragging ? 'opacity-50 scale-95' : ''}`}>
                                            <MiniShape3D shape={current.shape} color={current.color} />
                                            {/* 투명 오버레이 - Three.js canvas가 drag 이벤트 가로채지 못하게 */}
                                            <div className="absolute inset-0" style={{ cursor: 'grab' }} />
                                        </div>
                                        <div className="text-base text-amber-700 mt-2 shrink-0 whitespace-nowrap text-center">
                                            ✋ 도형을 좌/우 박스로 드래그하세요!
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="text-center shrink-0 mb-2">
                                            <Icon name="PartyPopper" className="w-10 h-10 text-amber-500 inline" />
                                            <span className="font-jua text-xl text-amber-900 ml-2 whitespace-nowrap">분류 완료! 분류된 도형을 보며 정리해요</span>
                                        </div>
                                        <div className="flex-1 min-h-0 grid grid-rows-2 gap-2">
                                            <div className="flex flex-col min-h-0">
                                                <label className="text-base font-jua text-emerald-700 mb-1 flex items-center gap-1 shrink-0 whitespace-nowrap">
                                                    <div className="w-3 h-3 rounded-full bg-emerald-500"/> 공통점 (두 종류 도형의 같은 점)
                                                    <HintBox value={common} hints={[
                                                        '키워드: 평평한 면 · 다각형 ·  옆면 수 = 밑면 변의 수',
                                                        '각기둥과 각뿔은 모두 □□한 면(다각형)으로 둘러싸여 있고, 옆면의 수가 밑면의 변의 수와 □□.'
                                                    ]} />
                                                </label>
                                                <textarea value={common} onChange={e => setCommon(e.target.value)}
                                                    className="w-full flex-1 p-2 border-2 border-emerald-200 rounded-xl resize-none outline-none focus:border-emerald-400 text-base"
                                                    placeholder="예) 모두 평평한 면(다각형)으로만 둘러싸여 있다..." />
                                            </div>
                                            <div className="flex flex-col min-h-0">
                                                <label className="text-base font-jua text-rose-700 mb-1 flex items-center gap-2 shrink-0 whitespace-nowrap">
                                                    <div className="w-3 h-3 rounded-full bg-rose-500"/> 차이점 (각기둥 ↔ 각뿔의 다른 점)
                                                </label>
                                                <div className="flex-1 min-h-0 grid grid-cols-2 gap-2">
                                                    <div className="flex flex-col min-h-0">
                                                        <div className="text-sm font-jua text-emerald-700 mb-0.5 flex items-center gap-1 shrink-0 whitespace-nowrap">
                                                            각기둥은...
                                                            <HintBox value={diffPrism} hints={[
                                                                '키워드: 밑면 2개 · 옆면은 직사각형',
                                                                '각기둥은 밑면이 □개이고, 옆면이 모두 □□□형이다.'
                                                            ]} />
                                                        </div>
                                                        <textarea value={diffPrism} onChange={e => setDiffPrism(e.target.value)}
                                                            className="w-full flex-1 p-2 border-2 border-emerald-200 rounded-xl resize-none outline-none focus:border-emerald-400 text-sm"
                                                            placeholder="예) 밑면이 2개이고, 옆면이 직사각형이다..." />
                                                    </div>
                                                    <div className="flex flex-col min-h-0">
                                                        <div className="text-sm font-jua text-rose-700 mb-0.5 flex items-center gap-1 shrink-0 whitespace-nowrap">
                                                            각뿔은...
                                                            <HintBox value={diffPyramid} hints={[
                                                                <span>키워드: 밑면 1개 · 옆면은 삼각형 · <span className="whitespace-nowrap">한 점에서 만남</span></span>,
                                                                <span>각뿔은 밑면이 □개이고, 옆면이 모두 □□형이며 <span className="whitespace-nowrap">위의 한 □에서</span> 만난다.</span>
                                                            ]} />
                                                        </div>
                                                        <textarea value={diffPyramid} onChange={e => setDiffPyramid(e.target.value)}
                                                            className="w-full flex-1 p-2 border-2 border-rose-200 rounded-xl resize-none outline-none focus:border-rose-400 text-sm"
                                                            placeholder="예) 밑면이 1개이고, 옆면이 삼각형이며 한 점에서 만난다..." />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>

                            {/* 각뿔 박스 */}
                            <div
                                onDragOver={(e) => { e.preventDefault(); setHoverSide('pyramid'); }}
                                onDragLeave={() => setHoverSide(null)}
                                onDrop={() => handleDrop('pyramid')}
                                className={`col-span-2 bg-rose-50 ink-border border-rose-500 border-[4px] border-dashed rounded-2xl flex flex-col p-3 ${hoverSide === 'pyramid' ? 'drop-zone-active' : ''}`}>
                                <div className="flex items-center gap-2 mb-2 shrink-0">
                                    <div className="w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center text-white ink-border">
                                        <Icon name="Triangle" className="w-6 h-6" />
                                    </div>
                                    <h3 className="font-jua text-2xl text-rose-900">각뿔</h3>
                                </div>
                                <div className="paper-bg p-2 rounded-lg border border-rose-300 font-jua text-base text-rose-900 leading-snug mb-2 shrink-0">
                                    📌 <span className="hl-key">아래</span>는 <span className="hl-key">다각형 한 개</span>, 위는 <b>한 점</b>으로 모이고 <span className="hl-key">옆면</span>은 모두 <span className="hl-key">삼각형</span>인 도형
                                </div>
                                <div className="flex-1 bg-white/50 rounded-xl border-2 border-rose-300 p-2 min-h-0 overflow-hidden">
                                    {pyramidItems.length === 0 ? (
                                        <div className="h-full flex items-center justify-center text-rose-400 text-sm text-center">
                                            아직 분류된 도형이<br/>없어요
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-2 h-full content-start">
                                            {pyramidItems.map(c => (
                                                <div key={c.id} className="bg-white rounded-lg border-2 border-rose-600 p-1 flex flex-col items-center stamp-shadow">
                                                    <div className="w-full h-16">
                                                        <MiniShape3D shape={c.shape} color={c.color} />
                                                    </div>
                                                    <div className="text-xs font-bold text-rose-900 whitespace-nowrap">{c.name}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <PageNav page={2} total={TOTAL} onPrev={() => setPage(1)} onComplete={onComplete}
                            canNext={allClassified && summaryDone}
                            completeLabel="완료" />
                    </div>
                );
            }

            return null;
        }

        // ============================================================
        //   MISSION 2 & 3 공통: 입체도형 탐험 (각기둥/각뿔)
        // ============================================================
        function ShapeExploreView({ kind, onComplete, onBack }) {
            const SHAPES = kind === 'prism' ? PRISMS : PYRAMIDS;
            const isPrism = kind === 'prism';
            const themeHex = isPrism ? 0x10b981 : 0xf43f5e;
            const villageName = isPrism ? '각기둥 마을' : '각뿔 마을';
            const T = isPrism ? {
                bg50: 'bg-emerald-50', bg100: 'bg-emerald-100', bg500: 'bg-emerald-500',
                bg600: 'bg-emerald-600', bg700: 'bg-emerald-700',
                border200: 'border-emerald-200', border300: 'border-emerald-300',
                border400: 'border-emerald-400', border700: 'border-emerald-700',
                text700: 'text-emerald-700', text900: 'text-emerald-900',
                hoverBg50: 'hover:bg-emerald-50', hoverBg600: 'hover:bg-emerald-600',
                hoverBg700: 'hover:bg-emerald-700', hoverBg800: 'hover:bg-emerald-800',
                from100: 'from-emerald-100', focusBorder600: 'focus:border-emerald-600'
            } : {
                bg50: 'bg-rose-50', bg100: 'bg-rose-100', bg500: 'bg-rose-500',
                bg600: 'bg-rose-600', bg700: 'bg-rose-700',
                border200: 'border-rose-200', border300: 'border-rose-300',
                border400: 'border-rose-400', border700: 'border-rose-700',
                text700: 'text-rose-700', text900: 'text-rose-900',
                hoverBg50: 'hover:bg-rose-50', hoverBg600: 'hover:bg-rose-600',
                hoverBg700: 'hover:bg-rose-700', hoverBg800: 'hover:bg-rose-800',
                from100: 'from-rose-100', focusBorder600: 'focus:border-rose-600'
            };

            const [shape, setShape] = useState(SHAPES[0]);
            const [page, setPage] = useState(1);
            const [highlight, setHighlight] = useState('none');  // 초기 highlight = 'none' (기본 도형)
            const [inputs, setInputs] = useState({
                baseShape: '', baseCount: '', sideShape: '', sideCount: '',
                vertices: '', edges: '', name: '', commonText: ''
            });
            const [partsDone, setPartsDone] = useState({ base: false, side: false, vertex: false, edge: false });
            const [popup, setPopup] = useState(null);
            // 도형의 부분을 클릭했을 때 마을 어른의 말을 크게 띄웠다가 제자리로 보내는 팝업
            const [bigMsg, setBigMsg] = useState(null);
            const [bigMsgSeq, setBigMsgSeq] = useState(0);
            const bigTimerRef = useRef(null);

            // shape 변경 시 reset
            useEffect(() => {
                setInputs({ baseShape: '', baseCount: '', sideShape: '', sideCount: '',
                    vertices: '', edges: '', name: '', commonText: inputs.commonText });
                setPartsDone({ base: false, side: false, vertex: false, edge: false });
                setHighlight('none');
            }, [shape.id]);

            // page 범위 안전 가드
            useEffect(() => { if (page < 1 || page > 3) setPage(1); }, [page]);

            // 정답 자동 체크 - 각 부분의 모양/개수 입력 시
            useEffect(() => {
                const b = onlyKorean(inputs.baseShape);
                const c = parseInt(inputs.baseCount);
                const expectedCount = isPrism ? 2 : 1;
                if (b === shape.baseName && c === expectedCount) {
                    setPartsDone(p => p.base ? p : ({ ...p, base: true }));
                }
            }, [inputs.baseShape, inputs.baseCount, shape.baseName, isPrism]);

            useEffect(() => {
                const s = onlyKorean(inputs.sideShape);
                const c = parseInt(inputs.sideCount);
                const expectedShape = isPrism ? '직사각형' : '삼각형';
                if (s === expectedShape && c === shape.n) {
                    setPartsDone(p => p.side ? p : ({ ...p, side: true }));
                }
            }, [inputs.sideShape, inputs.sideCount, shape.n, isPrism]);

            useEffect(() => {
                if (parseInt(inputs.vertices) === shape.vertices) {
                    setPartsDone(p => p.vertex ? p : ({ ...p, vertex: true }));
                }
            }, [inputs.vertices, shape.vertices]);

            useEffect(() => {
                if (parseInt(inputs.edges) === shape.edges) {
                    setPartsDone(p => p.edge ? p : ({ ...p, edge: true }));
                }
            }, [inputs.edges, shape.edges]);

            const allPartsDone = Object.values(partsDone).every(Boolean);
            const nameDone = onlyKorean(inputs.name) === shape.name;
            const summaryDone = inputs.commonText.trim().length > 5;

            const TOTAL = 3;
            const pageTitles = { 1: '도형의 부분 살펴보기', 2: '도형의 이름은?', 3: '공통점 찾기' };
            const completeColor = isPrism ? 'bg-emerald-700 hover:bg-emerald-800' : 'bg-rose-700 hover:bg-rose-800';

            // 강조 버튼 정의 (보라 계열)
            const highlightBtns = [
                { id: 'none', label: '기본', icon: 'Eye', key: null },
                { id: 'base', label: '밑면', icon: 'Square', key: 'base' },
                { id: 'side', label: '옆면', icon: 'RectangleHorizontal', key: 'side' },
                { id: 'edge', label: '모서리', icon: 'Minus', key: 'edge' },
                { id: 'vertex', label: '꼭짓점', icon: 'Dot', key: 'vertex' },
            ];

            // 마을 어른 안내 (highlight 별) - 개념 설명 + "직접 클릭해서 찾기" 안내
            const villagerGuide = {
                none: `"${villageName}에 잘 왔어! 위쪽 [밑면] [옆면] [모서리] [꼭짓점] 버튼을 누른 뒤, 도형에서 그 부분을 손가락으로 콕 찍어 직접 찾아보렴!"`,
                base: isPrism
                    ? '"밑면은 서로 마주 보는 바닥과 천장 같은 면이야. 각기둥은 위·아래에 모양과 크기가 똑같은 밑면이 두 개 있단다! 도형에서 밑면을 직접 눌러 찾고, 어떤 모양이고 몇 개인지 적어줘."'
                    : '"밑면은 도형을 받치는 바닥 면이야. 각뿔은 바닥에 다각형 밑면이 한 개 있지! 도형에서 밑면을 직접 눌러 찾고, 어떤 모양이고 몇 개인지 적어줘."',
                side: isPrism
                    ? '"옆면은 두 밑면을 이어 주는 면이야. 각기둥의 옆면은 모두 직사각형이지! 도형의 옆면을 직접 눌러 찾고, 어떤 모양이고 몇 개인지 적어줘."'
                    : '"옆면은 밑면에서 꼭대기 한 점으로 모이는 면이야. 각뿔의 옆면은 모두 삼각형이란다! 도형의 옆면을 직접 눌러 찾고, 어떤 모양이고 몇 개인지 적어줘."',
                vertex: '"꼭짓점은 모서리들이 만나는 뾰족한 점이야. 도형의 점들을 하나씩 콕콕 눌러 색칠하며 모두 몇 개인지 세어보자!"',
                edge: '"모서리는 면과 면이 맞닿아 생기는 선이야. 도형의 선들을 하나씩 눌러 색칠하며 모두 몇 개인지 세어보자!"'
            };

            // 도형 부분을 클릭하면 마을 어른의 말을 크게 띄웠다가 제자리로
            const handlePartClick = (type) => {
                setBigMsg(villagerGuide[type] || villagerGuide.none);
                setBigMsgSeq(s => s + 1);
                if (bigTimerRef.current) clearTimeout(bigTimerRef.current);
                bigTimerRef.current = setTimeout(() => setBigMsg(null), 3400);
            };

            const partsCount = Object.values(partsDone).filter(Boolean).length;

            return (
                <div className="h-full flex flex-col p-3 paper-bg overflow-hidden">
                    <Popup {...(popup || {})} onClose={() => setPopup(null)} />

                    {/* 도형 부분 클릭 시: 마을 어른의 말이 크게 떴다가 제자리로 (오른쪽 아래) */}
                    {bigMsg && (
                        <div className="fixed inset-0 z-[150] pointer-events-none">
                            <div key={bigMsgSeq} className="pop-then-park fixed left-1/2 top-1/2 w-[30rem] max-w-[82vw]">
                                <div className="bg-amber-50 ink-border border-amber-500 rounded-3xl p-5 stamp-shadow-deep flex items-center gap-3">
                                    <div className="w-16 h-16 rounded-full overflow-hidden ink-border border-amber-600 bg-white shrink-0">
                                        <img src={AVATAR_IMG.elder} className="w-full h-full object-cover" alt="마을 어른" />
                                    </div>
                                    <div className="font-gaegu text-xl text-amber-900 leading-snug break-keep">{bigMsg}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 상단 헤더 */}
                    <div className="bg-white ink-border rounded-xl px-3 py-1.5 stamp-shadow mb-2 shrink-0 flex items-center gap-2">
                        <button onClick={onBack}
                            className="px-2 py-1 bg-amber-50 ink-border rounded-lg text-amber-800 hover:bg-amber-100 flex items-center gap-1 shrink-0">
                            <Icon name="Home" className="w-4 h-4" />
                            <span className="text-xs font-bold whitespace-nowrap">지도</span>
                        </button>
                        <div className={`w-8 h-8 ${T.bg500} rounded-lg flex items-center justify-center text-white shrink-0`}>
                            <Icon name={isPrism ? "Box" : "Triangle"} className="w-5 h-5" />
                        </div>
                        <span className="text-xs text-amber-700 font-bold tracking-wider whitespace-nowrap">MISSION {isPrism ? 2 : 3} · {villageName}</span>
                        <h2 className="font-jua text-lg text-amber-900 whitespace-nowrap">{pageTitles[page]}</h2>
                        {/* 도형 선택 - 주황 계열 */}
                        <div className="flex gap-1.5 flex-1 justify-center">
                            {SHAPES.map(s => (
                                <button key={s.id} onClick={() => setShape(s)}
                                    className={`px-3 py-1 rounded-lg font-jua text-sm ink-border whitespace-nowrap ${shape.id === s.id ? 'bg-orange-400 text-white border-orange-700' : 'bg-orange-50 text-orange-800 hover:bg-orange-100'}`}>
                                    {s.name}
                                </button>
                            ))}
                        </div>
                        <div className="px-3 py-1 bg-amber-100 ink-border rounded-full font-jua text-sm text-amber-900 shrink-0 whitespace-nowrap">
                            {page} / {TOTAL} 페이지
                        </div>
                    </div>

                    {/* ========== 페이지 1: 강조 버튼 → 각 부분 동적 입력 ========== */}
                    {page === 1 && (
                        <div className="flex flex-row gap-3 flex-1 min-h-0 mb-2">
                            <div className="flex-1 flex flex-col gap-2 min-h-0">
                                {/* 강조 보기 버튼 - 보라 계열 (도형 선택과 명확히 구분) */}
                                <div className="bg-white ink-border rounded-xl px-2 py-1.5 stamp-shadow shrink-0 flex gap-1.5 justify-center items-center flex-wrap">
                                    <span className="text-xs font-bold text-violet-700 mr-1 whitespace-nowrap">🔍 강조 보기:</span>
                                    {highlightBtns.map(opt => {
                                        const done = opt.key && partsDone[opt.key];
                                        return (
                                            <button key={opt.id} onClick={() => { setHighlight(opt.id); if (opt.id !== 'none') handlePartClick(opt.id); }}
                                                className={`px-2.5 py-1 rounded-md text-xs font-bold flex items-center gap-1 ink-border whitespace-nowrap ${highlight === opt.id ? 'bg-violet-500 text-white border-violet-700' : 'bg-violet-50 text-violet-800 hover:bg-violet-100 border-violet-300'}`}>
                                                <Icon name={opt.icon} className="w-3 h-3" /> {opt.label}
                                                {done && <span className="text-emerald-300 ml-0.5">✓</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                                {/* 3D 뷰어 - 부분 모드(밑면/옆면/꼭짓점/모서리)에서는 클릭으로 직접 찾기 */}
                                <div className={`flex-1 bg-white ink-border ${T.border700} rounded-2xl relative overflow-hidden stamp-shadow min-h-0`}>
                                    <Shape3DViewer key={`${shape.id}-${highlight}`} shape={shape} color={themeHex} highlight={highlight}
                                        interactive={highlight !== 'none'} onPartClick={null} />
                                    <div className="absolute top-2 left-2 px-2 py-1 bg-white/95 rounded-full text-xs font-bold text-amber-800 flex items-center gap-1 ink-border">
                                        <Icon name="Hand" className="w-3 h-3" /> {highlight === 'none' ? '드래그하여 회전' : '드래그 회전 · 부분을 콕 누르기'}
                                    </div>
                                </div>
                            </div>

                            {/* 우측: 마을 어른 안내(오른쪽 끝) + 동적 입력란 - 내용이 길면 잘리지 않게 스크롤 */}
                            <div className="w-[380px] bg-white ink-border rounded-2xl stamp-shadow flex flex-col overflow-y-auto custom-scrollbar shrink-0 p-2 gap-1">
                                {/* 마을 어른 안내 - 아바타가 오른쪽 끝, 말풍선이 왼쪽 */}
                                <AvatarGuide char="elder" side="right" text={villagerGuide[highlight]} />

                                {/* 동적 입력란 (highlight에 따라) */}
                                {highlight === 'none' && (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center text-amber-700 gap-2">
                                        <div className="text-6xl">👆</div>
                                        <div className="font-jua text-base">위쪽 강조 보기 버튼을 눌러봐!</div>
                                        <div className="text-xs">밑면→옆면→모서리→꼭짓점 순서로</div>
                                    </div>
                                )}
                                {highlight === 'base' && (
                                    <div className="flex flex-col gap-2 shrink-0">
                                        <div>
                                            <label className="text-xs font-bold text-amber-700">밑면의 모양</label>
                                            <input type="text" value={inputs.baseShape}
                                                onChange={e => setInputs({...inputs, baseShape: e.target.value})}
                                                placeholder="예: 삼각형"
                                                className="w-full mt-0.5 px-3 py-1.5 bg-amber-50 border-2 border-amber-200 rounded-lg text-center font-bold text-base focus:border-amber-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-amber-700">밑면의 개수</label>
                                            <input type="number" value={inputs.baseCount}
                                                onChange={e => setInputs({...inputs, baseCount: e.target.value})}
                                                placeholder="숫자"
                                                className="w-full mt-0.5 px-3 py-1.5 bg-amber-50 border-2 border-amber-200 rounded-lg text-center font-bold text-base focus:border-amber-500 outline-none" />
                                        </div>
                                        {partsDone.base && (
                                            <div className="text-center font-jua text-base text-emerald-700 mt-1">✓ 밑면 정답!</div>
                                        )}
                                    </div>
                                )}
                                {highlight === 'side' && (
                                    <div className="flex flex-col gap-2 shrink-0">
                                        <div>
                                            <label className="text-xs font-bold text-amber-700">옆면의 모양</label>
                                            <input type="text" value={inputs.sideShape}
                                                onChange={e => setInputs({...inputs, sideShape: e.target.value})}
                                                placeholder={isPrism ? "예: 직사각형" : "예: 삼각형"}
                                                className="w-full mt-0.5 px-3 py-1.5 bg-amber-50 border-2 border-amber-200 rounded-lg text-center font-bold text-base focus:border-amber-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-amber-700">옆면의 개수</label>
                                            <input type="number" value={inputs.sideCount}
                                                onChange={e => setInputs({...inputs, sideCount: e.target.value})}
                                                placeholder="숫자"
                                                className="w-full mt-0.5 px-3 py-1.5 bg-amber-50 border-2 border-amber-200 rounded-lg text-center font-bold text-base focus:border-amber-500 outline-none" />
                                        </div>
                                        {partsDone.side && (
                                            <div className="text-center font-jua text-base text-emerald-700 mt-1">✓ 옆면 정답!</div>
                                        )}
                                    </div>
                                )}
                                {highlight === 'vertex' && (
                                    <div className="flex flex-col gap-2 shrink-0">
                                        <div>
                                            <label className="text-xs font-bold text-amber-700">꼭짓점의 개수</label>
                                            <input type="number" value={inputs.vertices}
                                                onChange={e => setInputs({...inputs, vertices: e.target.value})}
                                                placeholder="숫자"
                                                className="w-full mt-0.5 px-3 py-1.5 bg-amber-50 border-2 border-amber-200 rounded-lg text-center font-bold text-base focus:border-amber-500 outline-none" />

        // ============================================================
        //  FOLDABLE PRISM - Three.js로 각기둥 전개도가 접히는 애니메이션
        // ============================================================
        function FoldablePrism({ n, progress }) {
            const mountRef = useRef(null);
            const stateRef = useRef({});

            useEffect(() => {
                let renderer, scene, camera, frameId, ro;
                let isMounted = true;
                let initialized = false;
                const disposables = [];
                let sideMeshes = [];
                let baseMeshes = [];
                const r = 1.2;
                const ht = 2.3;
                const sideLen = 2 * r * Math.sin(Math.PI / n);
                const apothem = r * Math.cos(Math.PI / n);

                const initThree = (w, h) => {
                    if (initialized || !mountRef.current) return;
                    while (mountRef.current.firstChild) {
                        try { mountRef.current.removeChild(mountRef.current.firstChild); } catch (e) { break; }
                    }
                    scene = new THREE.Scene();
                    scene.background = null;
                    // 카메라를 더 멀리 + 넓은 FOV로 → 펼친 전개도가 잘리지 않음
                    camera = new THREE.PerspectiveCamera(38, w / h, 0.1, 1000);
                    camera.position.set(0, 1.3, 11);
                    camera.lookAt(0, 0, 0);

                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.setSize(w, h);
                    mountRef.current.appendChild(renderer.domElement);
                    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

                    // 옆면 머티리얼 (연한 초록 fill + 어두운 초록 테두리)
                    const sideMat = new THREE.MeshBasicMaterial({
                        color: 0xa7f3d0, side: THREE.DoubleSide,
                        transparent: true, opacity: 0.9,
                        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
                    });
                    disposables.push(sideMat);
                    const sideEdgeMat = new THREE.LineBasicMaterial({ color: 0x065f46, linewidth: 2 });
                    disposables.push(sideEdgeMat);

                    // 밑면 머티리얼 (연한 노란 fill + 갈색 테두리)
                    const baseMat = new THREE.MeshBasicMaterial({
                        color: 0xfde68a, side: THREE.DoubleSide,
                        transparent: true, opacity: 0.9,
                        polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
                    });
                    disposables.push(baseMat);
                    const baseEdgeMat = new THREE.LineBasicMaterial({ color: 0x92400e, linewidth: 2 });
                    disposables.push(baseEdgeMat);

                    // 회전 받는 sceneRoot
                    const sceneRoot = new THREE.Group();
                    scene.add(sceneRoot);
                    sceneRoot.rotation.y = 0.4;
                    sceneRoot.rotation.x = 0.15;

                    // wrapper: 도형 중심 정렬용 (펼친/접힌 상태 lerp으로 위치)
                    const wrapper = new THREE.Group();
                    sceneRoot.add(wrapper);
                    stateRef.current.wrapper = wrapper;

                    // 옆면들을 hierarchical chain으로 구성 (진짜 hinge 접기)
                    // sideGroups[0]은 wrapper의 자식
                    // sideGroups[i]는 sideGroups[i-1]의 자식 (position.x = sideLen → 인접 hinge)
                    const planeGeo = new THREE.PlaneGeometry(sideLen, ht);
                    disposables.push(planeGeo);
                    const planeEdgeGeo = new THREE.EdgesGeometry(planeGeo);
                    disposables.push(planeEdgeGeo);

                    let parentForSides = wrapper;
                    for (let i = 0; i < n; i++) {
                        const sg = new THREE.Group();
                        if (i > 0) sg.position.x = sideLen; // 이전 옆면 오른쪽 변 = 이 옆면 왼쪽 변 (hinge)
                        parentForSides.add(sg);

                        const m = new THREE.Mesh(planeGeo, sideMat);
                        m.position.x = sideLen / 2; // mesh center가 group origin에서 +X 방향 sideLen/2
                        sg.add(m);
                        const el = new THREE.LineSegments(planeEdgeGeo, sideEdgeMat);
                        el.position.x = sideLen / 2;
                        sg.add(el);

                        sideMeshes.push(sg);
                        parentForSides = sg; // 다음 옆면은 이 옆면의 자식
                    }

                    // 밑면: sideGroups[0]에 hinge로 연결
                    // 위쪽 밑면: side 0의 위 변(Y=ht/2)을 hinge
                    // 아래쪽 밑면: side 0의 아래 변(Y=-ht/2)을 hinge
                    const baseGeoHinge = createNgonForHinge(r, n);
                    disposables.push(baseGeoHinge);
                    const baseEdgeGeoHinge = new THREE.EdgesGeometry(baseGeoHinge);
                    disposables.push(baseEdgeGeoHinge);

                    const topBaseGroup = new THREE.Group();
                    topBaseGroup.position.set(sideLen / 2, ht / 2, 0); // side 0 위 변 중심
                    sideMeshes[0].add(topBaseGroup);
                    topBaseGroup.add(new THREE.Mesh(baseGeoHinge, baseMat));
                    topBaseGroup.add(new THREE.LineSegments(baseEdgeGeoHinge, baseEdgeMat));
                    baseMeshes.push({ group: topBaseGroup, type: 'top' });

                    const botBaseGroup = new THREE.Group();
                    botBaseGroup.position.set(sideLen / 2, -ht / 2, 0); // side 0 아래 변 중심
                    botBaseGroup.scale.y = -1; // 아래쪽은 거꾸로 (Y+ 방향이 아닌 Y- 방향으로 연장되어야)
                    sideMeshes[0].add(botBaseGroup);
                    botBaseGroup.add(new THREE.Mesh(baseGeoHinge, baseMat));
                    botBaseGroup.add(new THREE.LineSegments(baseEdgeGeoHinge, baseEdgeMat));
                    baseMeshes.push({ group: botBaseGroup, type: 'bot' });

                    let isDragging = false;
                    let prev = { x: 0, y: 0 };
                    const getXY = (e) => ({
                        x: e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX),
                        y: e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY)
                    });
                    const onStart = (e) => { isDragging = true; prev = getXY(e); e.preventDefault && e.preventDefault(); };
                    const onMove = (e) => {
                        if (!isDragging) return;
                        const xy = getXY(e);
                        sceneRoot.rotation.y += (xy.x - prev.x) * 0.01;
                        sceneRoot.rotation.x += (xy.y - prev.y) * 0.01;
                        prev = xy;
                    };
                    const onEnd = () => { isDragging = false; };
                    const el = mountRef.current;
                    el.addEventListener('mousedown', onStart);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onEnd);
                    el.addEventListener('touchstart', onStart, { passive: false });
                    window.addEventListener('touchmove', onMove, { passive: false });
                    window.addEventListener('touchend', onEnd);

                    stateRef.current.sideMeshes = sideMeshes;
                    stateRef.current.baseMeshes = baseMeshes;
                    stateRef.current.sceneRoot = sceneRoot;
                    stateRef.current.renderer = renderer;
                    stateRef.current.scene = scene;
                    stateRef.current.camera = camera;

                    const animate = () => {
                        if (renderer && scene && camera) renderer.render(scene, camera);
                        frameId = requestAnimationFrame(animate);
                    };
                    animate();

                    // 첫 진행도 적용
                    applyProgress(stateRef.current.progress ?? progress);

                    stateRef.current.cleanup = () => {
                        try { el.removeEventListener('mousedown', onStart); } catch (e) {}
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onEnd);
                        try { el.removeEventListener('touchstart', onStart); } catch (e) {}
                        window.removeEventListener('touchmove', onMove);
                        window.removeEventListener('touchend', onEnd);
                        cancelAnimationFrame(frameId);
                        disposables.forEach(d => { try { d.dispose && d.dispose(); } catch (e) {} });
                        if (renderer) {
                            try { renderer.dispose(); } catch (e) {}
                            try { if (renderer.forceContextLoss) renderer.forceContextLoss(); } catch (e) {}
                            // DOM 제거는 React에 맡김 (wrapper div unmount 시 자동 정리됨)
                            // 직접 removeChild 호출하지 않음 - React와 충돌 방지
                            renderer = null;
                        }
                    };
                    initialized = true;
                };

                const applyProgress = (p) => {
                    if (!sideMeshes.length || !stateRef.current.wrapper) return;
                    const wrap = stateRef.current.wrapper;
                    const foldAngle = 2 * Math.PI / n; // 인접 옆면 외각
                    // 옆면 hierarchical 회전: sideGroups[i] (i>=1) rotation.y = -p * foldAngle
                    // sideGroups[0]은 chain의 시작이라 회전 없음
                    for (let i = 1; i < sideMeshes.length; i++) {
                        sideMeshes[i].rotation.y = -p * foldAngle;
                    }
                    // 밑면 hinge 회전: 펼친(rotation.x=0 → polygon이 XY 평면, side mesh와 같이 평평) ↔ 접힌(rotation.x=π/2 → polygon이 도형 내부로 접힘)
                    // 위쪽 밑면: polygon이 +Y 방향. rotation.x = +π/2면 +Y → -Z (도형 안쪽으로 접힘 = 위에서 덮음)
                    // 아래쪽 밑면: scale.y=-1로 polygon이 -Y 방향. rotation.x = +π/2면 -Y → +Z. 하지만 우리는 도형 안쪽(-Z)으로 가야 함 → rotation.x = -π/2
                    if (baseMeshes[0]) {
                        baseMeshes[0].group.rotation.x = p * (Math.PI / 2);
                    }
                    if (baseMeshes[1]) {
                        baseMeshes[1].group.rotation.x = -p * (Math.PI / 2);
                    }
                    // wrapper 위치 lerp: 도형 중심을 화면 가운데로
                    // 펼친 상태: 옆면들이 X+ 방향으로 일렬. side[0] 왼쪽 모서리가 wrapper origin.
                    //   가운데 정렬: wrapper.position.x = -(n * sideLen) / 2
                    // 접힌 상태: 옆면들이 둘레 형성. 도형 중심(평균)이 (cos(π/n)*apothem, 0, -sin(π/n)*apothem) 방향에 있음
                    //   계산 단순화: hierarchical chain으로 옆면 i mesh center 위치 평균을 wrapper.position 보정으로 0에 맞춤
                    const flatX = -(n * sideLen) / 2;
                    // 접힌 상태 도형 중심 - 시각적 보정값 (실험적)
                    const folX = -apothem * Math.sin(Math.PI / n);
                    const folZ = -apothem * (1 - Math.cos(Math.PI / n));
                    wrap.position.x = flatX + p * (folX - flatX);
                    wrap.position.z = p * folZ;
                };

                stateRef.current.applyProgress = applyProgress;
                stateRef.current.progress = progress;

                const tryInit = () => {
                    if (!isMounted || initialized || !mountRef.current) return;
                    const w = mountRef.current.clientWidth;
                    const h = mountRef.current.clientHeight;
                    if (w > 0 && h > 0) initThree(w, h);
                    else frameId = requestAnimationFrame(tryInit);
                };
                tryInit();

                if (typeof ResizeObserver !== 'undefined' && mountRef.current) {
                    ro = new ResizeObserver(() => {
                        if (!isMounted || !mountRef.current) return;
                        const w = mountRef.current.clientWidth;
                        const h = mountRef.current.clientHeight;
                        if (!initialized && w > 0 && h > 0) initThree(w, h);
                        else if (initialized && camera && renderer && w > 0 && h > 0) {
                            camera.aspect = w / h;
                            camera.updateProjectionMatrix();
                            renderer.setSize(w, h);
                        }
                    });
                    ro.observe(mountRef.current);
                }

                return () => {
                    isMounted = false;
                    if (ro) ro.disconnect();
                    if (stateRef.current.cleanup) stateRef.current.cleanup();
                };
            }, [n]);

            // progress 변경 시 즉시 반영 (재마운트 없이)
            useEffect(() => {
                stateRef.current.progress = progress;
                if (stateRef.current.applyProgress) stateRef.current.applyProgress(progress);
            }, [progress]);

            return <div ref={mountRef} className="w-full h-full cursor-grab active:cursor-grabbing" dangerouslySetInnerHTML={{__html: ''}} />;
        }

        // ============================================================
        //   MISSION 5: 전개도 공방
        // ============================================================
        function NetView({ onComplete, onBack }) {
            const TOTAL = 2;
            const [page, setPage] = useState(1);
            const [n, setN] = useState(3);
            const [progress, setProgress] = useState(1); // 0=완전 펼친 전개도, 1=완전 접힌 입체도형
            const [quiz, setQuiz] = useState({ baseCount: '', sideCount: '', shape: '' });
            const [popup, setPopup] = useState(null);
            const [verified, setVerified] = useState(false);

            const shape = PRISMS.find(s => s.n === n) || PRISMS[0];

            const animRef = useRef(null);
            const animateProgress = (target) => {
                if (animRef.current) cancelAnimationFrame(animRef.current);
                const start = performance.now();
                const initial = progress;
                const duration = 1100;
                const tick = (now) => {
                    const t = Math.min(1, (now - start) / duration);
                    // ease in-out
                    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    const p = initial + (target - initial) * eased;
                    setProgress(p);
                    if (t < 1) animRef.current = requestAnimationFrame(tick);
                };
                animRef.current = requestAnimationFrame(tick);
            };

            const checkQuiz = () => {
                const bc = parseInt(quiz.baseCount);
                const sc = parseInt(quiz.sideCount);
                const sh = onlyKorean(quiz.shape);
                if (bc === 2 && sc === n && sh === '직사각형') {
                    setPopup({ type: 'success', msg: '훌륭해요! 🎉\n전개도의 구성을\n정확히 알고 있어요!' });
                    setVerified(true);
                } else {
                    setPopup({ type: 'error', msg: '힌트:\n각기둥의 전개도는\n2개의 밑면(같은 모양)과\n밑면의 변의 개수만큼의\n옆면(직사각형)으로 이루어져 있어요.' });
                }
            };

            // 정확한 SVG 전개도 - 외곽선과 점선이 절대 겹치지 않게
            // 옆면은 fill만, 외곽선은 path로 별도 (옆면 사이 세로변/접는 변 제외)
            const renderNet = () => {
                const r = 50;
                const sideLen = 2 * r * Math.sin(Math.PI / n);
                const sideH = 130;
                const apothem = r * Math.cos(Math.PI / n);
                const totalSideW = sideLen * n;
                const pad = 24;
                const svgW = totalSideW + 2 * pad;
                const svgH = sideH + 2 * (r + 10) + 2 * pad;
                const startX = pad;
                const startY = pad + r + 10;
                const baseCenterX = startX + sideLen / 2;
                const topBaseCy = startY - apothem;
                const botBaseCy = startY + sideH + apothem;

                // 옆면 fill (stroke 없음)
                const sideFills = [];
                for (let i = 0; i < n; i++) {
                    sideFills.push(
                        <rect key={`f-${i}`} x={startX + i * sideLen} y={startY} width={sideLen} height={sideH}
                            fill="#a7f3d0" stroke="none" />
                    );
                    sideFills.push(
                        <text key={`t-${i}`} x={startX + i * sideLen + sideLen/2} y={startY + sideH/2 + 6}
                            textAnchor="middle" fontSize="15" fill="#065f46" fontWeight="bold">옆면{i+1}</text>
                    );
                }

                // 옆면 영역의 외곽선: 첫 옆면 위/아래 변 제외 (접는 선 점선이 그 자리)
                // 즉 외곽 = 왼쪽 변(side 0 왼변) + 위 변(side 1부터 마지막까지) + 오른쪽 변 + 아래 변(side 1부터 마지막까지)
                const outlinePath = `
                    M ${startX} ${startY}
                    L ${startX} ${startY + sideH}
                    M ${startX + sideLen} ${startY + sideH}
                    L ${startX + totalSideW} ${startY + sideH}
                    L ${startX + totalSideW} ${startY}
                    L ${startX + sideLen} ${startY}
                `;

                // n각형 밑면 그리기 (한 변이 아래쪽에 있도록)
                const baseAngle = n % 2 === 0 ? -Math.PI / 2 - Math.PI / n : -Math.PI / 2;
                const polyPoints = (cx, cy, flip) => {
                    const pts = [];
                    for (let i = 0; i < n; i++) {
                        const a = (i / n) * Math.PI * 2 + baseAngle + (flip ? Math.PI : 0);
                        pts.push(`${cx + Math.cos(a) * r},${cy + Math.sin(a) * r}`);
                    }
                    return pts.join(' ');
                };

                return (
                    <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full h-full" preserveAspectRatio="xMidYMid meet">
                        {/* 옆면 fill */}
                        {sideFills}
                        {/* 밑면 (위) - fill만 */}
                        <polygon points={polyPoints(baseCenterX, topBaseCy, false)} fill="#fde68a" stroke="none" />
                        <text x={baseCenterX} y={topBaseCy + 5} textAnchor="middle" fontSize="15" fill="#92400e" fontWeight="bold">밑면</text>
                        {/* 밑면 (아래) - fill만 */}
                        <polygon points={polyPoints(baseCenterX, botBaseCy, true)} fill="#fde68a" stroke="none" />
                        <text x={baseCenterX} y={botBaseCy + 5} textAnchor="middle" fontSize="15" fill="#92400e" fontWeight="bold">밑면</text>
                        {/* 옆면 영역 외곽선 (path, 실선) - 점선 자리는 제외 */}
                        <path d={outlinePath} stroke="#065f46" strokeWidth="2.5" fill="none" />
                        {/* 밑면 외곽선 (실선) - 단, 옆면과 닿는 변은 제외 */}
                        {(() => {
                            // 위쪽 밑면: 옆면 위변과 닿는 변(첫 변) 제외
                            const ptsArr = [];
                            for (let i = 0; i < n; i++) {
                                const a = (i / n) * Math.PI * 2 + baseAngle;
                                ptsArr.push([baseCenterX + Math.cos(a) * r, topBaseCy + Math.sin(a) * r]);
                            }
                            // 첫 번째 변 = ptsArr[0] -> ptsArr[1] 가 옆면과 닿는 변 (가장 아래쪽 변)
                            // baseAngle 설정상 i=0 정점이 가장 아래쪽 변의 한 끝점
                            // 실제로 polygon의 한 변이 아래쪽이 되도록 baseAngle 설정. 그 변의 정점 인덱스 찾기
                            // baseAngle 설정시 각도 계산:
                            //   홀수 n: baseAngle = -π/2 → i=0이 위쪽 점. 변 i (i와 i+1 정점)의 중심 각도 = baseAngle + (i+0.5)*2π/n
                            //   변이 아래쪽(각도 π/2)에 오려면 i = (n-1)/2 (홀수n)
                            //   짝수 n: baseAngle = -π/2 - π/n → i=0이 좌상점. 변 i의 중심 각도 ...
                            // 단순화: 옆면과 닿는 변 인덱스를 직접 찾아 그 변 제외하고 path
                            // 변 j 중심 각도 = baseAngle + (j+0.5)*2π/n. π/2가 되는 j 찾기.
                            // π/2 = baseAngle + (j+0.5)*2π/n → j+0.5 = (π/2 - baseAngle)*n/(2π) → j = (π/2 - baseAngle)*n/(2π) - 0.5
                            const jExclude = Math.round((Math.PI/2 - baseAngle) * n / (2 * Math.PI) - 0.5);
                            const jExc = ((jExclude % n) + n) % n;
                            // path: jExc 변(jExc-jExc+1) 제외하고 path 그림
                            // 시작점 = jExc+1, 종료점 = jExc, 닫지 않음
                            let pathD = '';
                            for (let k = 0; k <= n; k++) {
                                const idx = (jExc + 1 + k) % n;
                                if (k === 0) pathD += `M ${ptsArr[idx][0]} ${ptsArr[idx][1]} `;
                                else if (k < n) pathD += `L ${ptsArr[idx][0]} ${ptsArr[idx][1]} `;
                            }
                            // 같은 방식으로 아래쪽 밑면도
                            const ptsArr2 = [];
                            for (let i = 0; i < n; i++) {
                                const a = (i / n) * Math.PI * 2 + baseAngle + Math.PI;
                                ptsArr2.push([baseCenterX + Math.cos(a) * r, botBaseCy + Math.sin(a) * r]);
                            }
                            // flip된 polygon이므로 baseAngle+π 적용. 옆면과 닿는 변(위쪽 변, 각도 -π/2)
                            const jExclude2 = Math.round((-Math.PI/2 - (baseAngle + Math.PI)) * n / (2 * Math.PI) - 0.5);
                            const jExc2 = ((jExclude2 % n) + n) % n;
                            let pathD2 = '';
                            for (let k = 0; k <= n; k++) {
                                const idx = (jExc2 + 1 + k) % n;
                                if (k === 0) pathD2 += `M ${ptsArr2[idx][0]} ${ptsArr2[idx][1]} `;
                                else if (k < n) pathD2 += `L ${ptsArr2[idx][0]} ${ptsArr2[idx][1]} `;
                            }
                            return (
                                <Fragment>
                                    <path d={pathD} stroke="#92400e" strokeWidth="2.5" fill="none" />
                                    <path d={pathD2} stroke="#92400e" strokeWidth="2.5" fill="none" />
                                </Fragment>
                            );
                        })()}
                        {/* 접는 선 (점선, 빨강) - 옆면들 사이 세로선 (n-1개) */}
                        {[...Array(n - 1)].map((_, i) => (
                            <line key={`v-${i}`}
                                x1={startX + (i+1) * sideLen} y1={startY}
                                x2={startX + (i+1) * sideLen} y2={startY + sideH}
                                stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" />
                        ))}
                        {/* 위쪽 밑면-옆면 접는 선 */}
                        <line x1={startX} y1={startY} x2={startX + sideLen} y2={startY}
                            stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" />
                        {/* 아래쪽 옆면-밑면 접는 선 */}
                        <line x1={startX} y1={startY + sideH} x2={startX + sideLen} y2={startY + sideH}
                            stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" />
                    </svg>
                );
            };

            const pageTitle = page === 1 ? '펼치고 접으며 전개도 확인하기' : '전개도 확인 퀴즈';

            return (
                <div className="h-full flex flex-col p-2 paper-bg overflow-hidden">
                    <Popup {...(popup || {})} onClose={() => setPopup(null)} />

                    {/* 헤더 (한 줄, 컴팩트) */}
                    <div className="bg-white ink-border rounded-xl px-3 py-1 stamp-shadow mb-1 shrink-0 flex items-center gap-2">
                        <button onClick={onBack}
                            className="px-2 py-1 bg-amber-50 ink-border rounded-lg text-amber-800 hover:bg-amber-100 flex items-center gap-1 shrink-0">
                            <Icon name="Home" className="w-4 h-4" />
                            <span className="text-xs font-bold whitespace-nowrap">지도</span>
                        </button>
                        <div className="w-8 h-8 bg-violet-400 rounded-lg flex items-center justify-center text-white shrink-0">
                            <Icon name="BoxSelect" className="w-5 h-5" />
                        </div>
                        <span className="text-xs text-amber-700 font-bold tracking-wider whitespace-nowrap">MISSION 5</span>
                        <h2 className="font-jua text-lg text-amber-900 whitespace-nowrap">{pageTitle}</h2>
                        <div className="flex gap-1.5 flex-1 justify-center">
                            {PRISMS.map(s => (
                                <button key={s.id} onClick={() => { setN(s.n); setVerified(false); setQuiz({ baseCount: '', sideCount: '', shape: '' }); setProgress(1); }}
                                    className={`px-3 py-1 rounded-lg font-jua text-sm ink-border ${n === s.n ? 'bg-violet-500 text-white' : 'bg-white text-amber-800 hover:bg-violet-50'}`}>
                                    {s.name}
                                </button>
                            ))}
                        </div>
                        <div className="px-3 py-1 bg-amber-100 ink-border rounded-full font-jua text-sm text-amber-900 shrink-0 whitespace-nowrap">
                            {page} / {TOTAL} 페이지
                        </div>
                    </div>

                    <AvatarGuide char="master" text={
                        page === 1
                            ? `"여기 ${shape.name}이 있네! [펼치기]를 누르면 오른쪽 도면과 똑같은 전개도로 펼쳐진단다. 펼쳐서 같은 모양인지 확인한 뒤, 다시 [접기]를 눌러 ${shape.name}으로 만들어 보시오!"`
                            : '"전개도가 어떤 면들로 이루어졌는지 확인 문제를 풀어보시오! 밑면의 변 개수와 옆면 개수를 잘 비교해 보시오."'
                    } />

                    {page === 1 ? (
                        <div className="grid grid-cols-3 gap-2 flex-1 min-h-0 mb-1">
                            {/* 좌측: 접기 애니메이션 (큰 사이즈) */}
                            <div className="col-span-2 bg-white ink-border rounded-2xl p-2 stamp-shadow flex flex-col">
                                <div className="flex items-center justify-between mb-1 shrink-0">
                                    <div className="font-jua text-base text-amber-900 whitespace-nowrap">
                                        🔄 {progress < 0.5 ? '펼쳐진 전개도' : progress < 0.95 ? '접히는 중' : `${shape.name}`}
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={() => animateProgress(0)}
                                            className={`px-2 py-1 rounded-lg font-jua text-xs ink-border stamp-shadow flex items-center gap-1 ${progress < 0.5 ? 'bg-amber-500 text-white' : 'bg-white text-amber-800 hover:bg-amber-50'}`}>
                                            <Icon name="Maximize2" className="w-3 h-3" /> 펼치기
                                        </button>
                                        <button onClick={() => animateProgress(1)}
                                            className={`px-2 py-1 rounded-lg font-jua text-xs ink-border stamp-shadow flex items-center gap-1 ${progress >= 0.5 ? 'bg-violet-500 text-white' : 'bg-white text-amber-800 hover:bg-violet-50'}`}>
                                            <Icon name="Minimize2" className="w-3 h-3" /> 접기
                                        </button>
                                    </div>
                                </div>
                                <div className="flex-1 bg-violet-50 rounded-xl border-2 border-violet-300 min-h-0">
                                    <FoldablePrism n={n} progress={progress} />

                                <button onClick={() => setStage('celebrate')}
                                    className="px-4 py-2 bg-white text-amber-800 font-jua text-base rounded-xl ink-border hover:bg-amber-50 stamp-shadow flex items-center gap-1">

                                    <Icon name="Download" className="w-4 h-4" /> 개념 노트 다운로드

                                <button onClick={() => setStage('cert')} disabled={!allChecked}

            // ===== 3단계: 인증서 =====
            return (
                <div className="h-full flex flex-col items-center justify-center gap-2 p-2 paper-bg overflow-y-auto relative">
                    <LocalFireworks />

                    <div ref={ref} className="bg-amber-50 p-2 rounded-3xl shadow-2xl w-full max-w-xl relative ink-border stamp-shadow-deep">
