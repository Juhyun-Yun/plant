<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root{
    --bg1:#2a1710; --bg2:#3c2417; --cream:#faefd4; --cream2:#f4e4bf;
    --ink:#5b4634; --ink-soft:#977a5b; --line:#e7d4ab; --star:#f6ab30; --white:#fff;
    --root:#e0894a; --root2:#cf763a; --stem:#76bb4d; --stem2:#62a73d;
    --leaf:#2faa70; --leaf2:#22945e; --trans:#4f9fd1; --trans2:#3d8cc0;
    --flower:#e07ba0; --flower2:#d0688f; --whole:#f0b537; --whole2:#e0a522;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden; font-family:'Noto Sans KR',sans-serif; font-weight:500;
    word-break:keep-all; overflow-wrap:break-word; line-height:1.35;
    background:radial-gradient(circle at 50% 38%,var(--bg2),var(--bg1) 78%); user-select:none; touch-action:manipulation;}
  #fit{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  #stage{width:1280px; height:720px; position:relative; transform-origin:center center;
    background:radial-gradient(circle at 50% 30%,var(--bg2),var(--bg1) 80%);}
  .deco{position:absolute; font-size:63px; opacity:.5; pointer-events:none;}
  .board{position:absolute; inset:26px; background:linear-gradient(170deg,var(--cream),var(--cream2));
    border-radius:34px; box-shadow:0 18px 0 rgba(0,0,0,.18), inset 0 2px 0 rgba(255,255,255,.6); overflow:hidden;}
  .page{position:absolute; inset:0; padding:22px 34px 18px; display:flex; flex-direction:column;}

  .topbar{display:flex; align-items:center; gap:12px; height:80px; flex:0 0 auto;}
  .mascot{width:64px; height:64px; border-radius:50%; background:linear-gradient(160deg,#f0a85e,#d77a35);
    display:flex; align-items:center; justify-content:center; font-size:56px; box-shadow:0 4px 0 rgba(0,0,0,.12); flex:0 0 auto;}
  .hello{font-family:'Jua'; color:var(--ink); line-height:1.05;}
  .hello .t{font-size:39px;} .hello .s{font-size:24px; color:var(--ink-soft); margin-top:3px; font-family:'Noto Sans KR'; font-weight:700;}
  .stats{margin-left:auto; display:flex; gap:8px;}
  .chip{background:var(--white); border-radius:15px; padding:6px 11px; font-family:'Jua'; font-size:26px;
    color:var(--ink); box-shadow:0 3px 0 rgba(0,0,0,.08); border:2px solid #fff; white-space:nowrap;}
  .chip.s{border-color:#ffe2a8;} .chip.a{border-color:#bdebcf;} .chip.m{border-color:#ffd1d8;}
  .homebtn{background:var(--white); border:none; border-radius:15px; padding:8px 13px; font-family:'Jua';
    font-size:26px; color:var(--ink); cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.1);}
  .homebtn:active{transform:translateY(2px);}

  .home-title{text-align:center; margin:2px 0 0;}
  .home-title h1{font-family:'Jua'; font-size:40px; color:var(--ink);}
  .home-title p{font-size:23px; color:var(--ink-soft); font-weight:700;}
  .grid{flex:1; min-height:0; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(2,1fr); gap:12px; padding:8px 2px 2px;}
  .card{border-radius:18px; padding:8px; color:#fff; position:relative; cursor:pointer;
    box-shadow:0 7px 0 rgba(0,0,0,.16), inset 0 2px 0 rgba(255,255,255,.25);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    transition:transform .12s; overflow:hidden;}
  .card:active{transform:translateY(3px);}
  .card .no{position:absolute; top:7px; left:9px; width:26px; height:26px; border-radius:50%; background:#fff;
    color:var(--ink); font-family:'Jua'; font-size:17px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .card .lock{position:absolute; inset:0; background:rgba(60,40,25,.55); display:flex; align-items:center; justify-content:center; font-size:40px; border-radius:18px;}
  .card .cicon{font-size:46px; line-height:1; filter:drop-shadow(0 4px 3px rgba(0,0,0,.18));}
  .card .ctitle{font-family:'Jua'; font-size:24px; margin-top:4px;}
  .card .cdesc{font-size:16px; font-weight:700; opacity:.95; margin-top:2px;}
  .card .stars{margin-top:4px; font-size:21px; letter-spacing:2px;}
  .card .cprog{margin-top:5px; font-family:'Jua'; font-size:20px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.18);}
  .card .stars .on{color:#fff7d9;} .card .stars .off{opacity:.45;}
  .home-foot{text-align:center; font-weight:700; font-size:19px; color:var(--ink-soft); padding-top:2px;}

  .phead{display:flex; align-items:center; gap:10px; flex:0 0 auto; margin-bottom:4px;}
  .pbadge{font-family:'Jua'; color:#fff; padding:4px 12px; border-radius:12px; font-size:26px; box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .ptitle{font-family:'Jua'; font-size:43px; color:var(--ink);}
  .pbody{flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden;}
  .ask{font-family:'Jua'; color:var(--ink); line-height:1.35;}
  .lead{font-size:31px; font-weight:700; color:var(--ink); line-height:1.45;}

  .navrow{flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding-top:6px;}
  .dots{display:flex; gap:6px;}
  .dot{width:9px; height:9px; border-radius:50%; background:#e2cfa6;}
  .dot.on{background:var(--ink); transform:scale(1.2);}
  .navbtn{border:none; border-radius:15px; padding:9px 18px; font-family:'Jua'; font-size:30px; cursor:pointer;
    color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.16); display:inline-flex; align-items:center; gap:6px;}
  .navbtn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.16);}
  .navbtn.ghost{background:#efe0bd; color:var(--ink); box-shadow:0 4px 0 rgba(0,0,0,.1);}
  .navbtn.sm{padding:8px 14px; font-size:28px;}
  .navbtn:disabled{opacity:.35; pointer-events:none;}

  .panel{background:#fff; border-radius:18px; box-shadow:0 4px 0 rgba(0,0,0,.07); border:2px solid #f1e3c2;}
  .softpill{background:#fff; border:2px solid #efe0bd; border-radius:13px; padding:6px 10px; font-weight:700; color:var(--ink); font-size:22px;}

  .opt{background:#fff; border:3px solid #efe0bd; border-radius:16px; padding:12px 14px; font-family:'Noto Sans KR';
    font-weight:700; font-size:33px; color:var(--ink); cursor:pointer; text-align:left; transition:transform .1s; box-shadow:0 3px 0 rgba(0,0,0,.06);}
  .opt:active{transform:translateY(2px);}
  .opt.correct{background:#d8f3e1; border-color:#5cc98a; color:#1f7a4d;}
  .opt.wrong{background:#fbe0e0; border-color:#e58b8b; color:#b33; animation:shake .35s;}
  .opt.disabled{pointer-events:none;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .fbk{font-family:'Jua'; font-size:33px; margin-top:6px; min-height:24px;}
  .fbk.good{color:#1f9d57;} .fbk.bad{color:#d3603a;}
  .tag{display:inline-block; background:#fff4dc; color:var(--ink); border:2px solid #f0dcab; border-radius:12px;
    padding:4px 10px; font-weight:700; font-size:28px; margin:2px;}
  .bigemoji{font-size:170px; filter:drop-shadow(0 6px 4px rgba(0,0,0,.15));}
  .pulse{animation:pulse 1.6s infinite;} @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

  /* sim layout */
  .simwrap{flex:1; display:flex; gap:16px; min-height:0;}
  .simcanvas{background:#fff; border-radius:18px; border:2px solid #f1e3c2; box-shadow:0 4px 0 rgba(0,0,0,.07); overflow:hidden; flex:0 0 auto; cursor:pointer;}
  .simside{flex:1; display:flex; flex-direction:column; gap:6px; min-width:0;}
  .controls{display:flex; flex-wrap:wrap; gap:7px;}
  .toggle{border:3px solid #efe0bd; background:#fff; border-radius:14px; padding:7px 11px; font-family:'Jua'; font-size:22px; color:var(--ink); cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,.06);}
  .toggle.on{background:#fff3cc; border-color:var(--whole);}
  .toggle:active{transform:translateY(2px);}
  .meter{display:flex; gap:8px; flex-wrap:wrap;}
  .meter .m{background:#f7fbf3; border:2px solid #d7ebc6; border-radius:12px; padding:5px 9px; font-weight:700; font-size:20px; color:var(--ink);}
  .meter .m b{font-family:'Jua'; color:var(--stem2); font-size:24px;}
  .check{display:flex; flex-direction:column; gap:7px;}
  .ck{display:flex; align-items:center; gap:7px; font-weight:700; color:var(--ink-soft); font-size:23px;}
  .ck.on{color:var(--ink);}
  .ck .box{width:20px; text-align:center; font-size:23px;}
  .hintline{font-size:20px; font-weight:700; color:var(--ink-soft);}
  input[type=range]{accent-color:var(--root); height:24px;}

  .slotxt{pointer-events:none;}
  .slot{cursor:pointer;}
  .slot.done{filter:drop-shadow(0 0 3px rgba(0,0,0,.15));}

  /* MODAL */
  #modalRoot{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:60; pointer-events:none;}
  .mback{position:absolute; inset:0; background:rgba(45,28,16,.5); opacity:0; transition:.25s;}
  .mbox{position:relative; width:560px; max-width:80%; max-height:92%; overflow:auto; background:linear-gradient(170deg,#fffaf0,#f6e9cd);
    border-radius:26px; padding:20px 26px 18px; border:3px solid #fff; box-shadow:0 16px 0 rgba(0,0,0,.2);
    transform:scale(.82) translateY(14px); opacity:0; transition:transform .28s cubic-bezier(.2,1.4,.4,1), opacity .25s; text-align:center;}
  #modalRoot.show{pointer-events:auto;} #modalRoot.show .mback{opacity:1;} #modalRoot.show .mbox{transform:scale(1); opacity:1;}
  .mbox .mart{font-size:74px; line-height:1; animation:floaty 2s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .mbox .mstep{display:flex; gap:6px; justify-content:center; margin:6px 0 2px;}
  .mbox .mstep i{width:8px; height:8px; border-radius:50%; background:#e2cfa6; display:inline-block;}
  .mbox .mstep i.on{background:var(--root);}
  .mbox h3{font-family:'Jua'; font-size:34px; color:var(--ink); margin-top:4px;}
  .mbox p{font-size:25px; font-weight:700; color:var(--ink); line-height:1.45; margin-top:8px; word-break:keep-all; overflow-wrap:break-word;}
  .mbox p b{color:var(--root2);}
  /* 크게 강조하는 모달(핵심 개념) */
  .mbox.mbig{width:660px; padding-top:8px;}
  .mbox.mbig .mart{font-size:112px;}
  .mbox.mbig h3{font-size:52px; line-height:1.2;}
  .mbox.mbig p{font-size:31px; line-height:1.5;}
  .mbtns{display:flex; gap:10px; justify-content:center; margin-top:14px;}
</style>

<div id="fit"><div id="stage">
  <div class="deco" style="top:6px;left:60px;transform:rotate(-20deg)">🍂</div>

  <div class="deco" style="top:54px;right:40px;transform:rotate(-12deg);font-size:48px">🌱</div>

<script>

 *   될 수 있습니다.

// 빌드 서명
const _BUILD_SIG = 'GEGHS-DEEPE-2026';

// 출처 확인용 함수
function getBuildInfo() {
  return { sig: _BUILD_SIG, owner: 'GEG화성(깊이 e끌림)', year: 2026 };
}

/* =========================================================================
   식물의 비밀 공장 — 식물의 구조와 기능 (초6) · 동적 시뮬레이션 버전
   ========================================================================= */
const COLORS={cell:{c:'#46b3a3',d:'#359384'},root:{c:'#e0894a',d:'#cf763a'},stem:{c:'#76bb4d',d:'#62a73d'},leaf:{c:'#2faa70',d:'#22945e'},
  trans:{c:'#4f9fd1',d:'#3d8cc0'},flower:{c:'#e07ba0',d:'#d0688f'},whole:{c:'#f0b537',d:'#e0a522'}};
const state={view:'home',ti:0,pi:0,stars:{cell:0,root:0,stem:0,leaf:0,trans:0,flower:0,whole:0},done:{},correct:0,seen:{}};
const board=document.getElementById('board');
const modalRoot=document.getElementById('modalRoot');

/* =========================================================================
   진행 저장/연동 레이어 (SYNC)
   · 학생 링크(#c=주소)로 오면 → 시트 연동, ⚙️ 숨김
   · 저장된 주소가 있으면 → 시트 연동, ⚙️ 보임(선생님)
   · 둘 다 없으면 → 무료 체험(데모), 로컬(localStorage) 저장·이어하기
   구글 시트와는 교차출처 문제를 피하려 JSONP(GET)로만 주고받는다.
   ========================================================================= */
const SYNC = (function(){
  const APP='plant-structure';
  let mode='demo', exec='', canSettings=true, roster=[], student=0, doneReset=false;
  const lsKey=no=>'progress:'+APP+':'+no;
  const execKey=()=>'sync:'+APP+':exec';
  const lastKey=()=>'sync:'+APP+':last';
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function jsonp(params){
    return new Promise((resolve,reject)=>{
      if(!exec) return reject(new Error('연결된 주소가 없습니다.'));
      const cb='__pcb'+(jsonp._n=(jsonp._n||0)+1);
      const s=document.createElement('script'); let fin=false;
      const clean=()=>{ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); };
      window[cb]=d=>{ fin=true; clean(); resolve(d); };
      s.onerror=()=>{ if(!fin){clean(); reject(new Error('네트워크 오류'));} };
      const q=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
      s.src=exec+(exec.indexOf('?')>=0?'&':'?')+q+'&callback='+cb;
      document.body.appendChild(s);
      setTimeout(()=>{ if(!fin){clean(); reject(new Error('시간 초과'));} },12000);
    });
  }

  function detect(){
    const m=location.hash.match(/[#&]c=([^&]+)/);
    if(m){ exec=decodeURIComponent(m[1]); mode='linked'; canSettings=false; return; }
    const saved=localStorage.getItem(execKey());
    if(saved){ exec=saved; mode='linked'; canSettings=true; return; }
    mode='demo'; canSettings=true;
  }

  function loadRoster(){
    if(mode==='linked'){
      return jsonp({action:'roster'}).then(r=>{
        if(r&&r.ok&&r.roster&&r.roster.length){ roster=r.roster; return; }
        defaultRoster();
      }).catch(()=>defaultRoster());
    }
    defaultRoster(); return Promise.resolve();
  }
  function defaultRoster(){ roster=[]; for(let i=1;i<=30;i++)roster.push({no:i,name:'학생'+i}); }

  function summary(){ return {sprouts:sproutsDone(),sproutsTotal:sproutsTotal(),stars:starsDone(),starsTotal:starsTotal(),allComplete:allComplete()}; }
  function payload(){ return {v:1,app:APP,summary:summary(),state:{stars:state.stars,done:state.done,correct:state.correct,seen:state.seen}}; }
  function resetState(){ state.stars={cell:0,root:0,stem:0,leaf:0,trans:0,flower:0,whole:0}; state.done={}; state.correct=0; state.seen={}; }
  function restore(p){ if(!p||!p.state)return; const st=p.state;
    if(st.stars)Object.assign(state.stars,st.stars); if(st.done)state.done=st.done;
    if(typeof st.correct==='number')state.correct=st.correct; if(st.seen)state.seen=st.seen; }

  function selectStudent(no){
    student=Number(no)||0; doneReset=false;
    try{localStorage.setItem(lastKey(),String(student));}catch(e){}
    resetState();
    if(!student){ renderHome(); return Promise.resolve(); }
    if(mode==='linked'){
      return jsonp({action:'load',student:student}).then(r=>{ if(r&&r.ok)restore(r.data); renderHome(); })
        .catch(()=>renderHome());
    }
    const raw=localStorage.getItem(lsKey(student));
    if(raw){ try{restore(JSON.parse(raw));}catch(e){} }
    renderHome(); return Promise.resolve();
  }

  function save(){
    if(!student) return;
    if(mode==='demo' && doneReset) return;
    const pl=payload();
    if(mode==='linked'){ jsonp({action:'save',student:student,data:JSON.stringify(pl)}).catch(()=>{}); return; }
    try{ localStorage.setItem(lsKey(student),JSON.stringify(pl)); }catch(e){}
    if(allComplete()){ try{localStorage.removeItem(lsKey(student));}catch(e){} doneReset=true; }   // 데모: 전체 완료 시 리셋
  }

  function init(){
    detect();
    showLogin();                       // 로그인 화면 먼저(목차와 분리)
    loadRoster().then(()=>showLogin()); // 명단 로딩되면 이름 채워 다시 렌더
  }

  /* ---- 로그인(학습자 선택) — 목차와 분리된 별도 화면. 이름은 드롭다운으로 선택 ---- */
  function loginOptions(){
    const hl=Number(localStorage.getItem(lastKey()))||0;
    return roster.map(r=>`<option value="${r.no}" ${r.no===hl?'selected':''}>${esc(r.name)}</option>`).join('');
  }
  function showLogin(){
    runCleanups(); state.view='login'; student=0;
    const badge=mode==='linked'
      ? `<span style="font-size:16px;font-weight:700;color:#2f8f57;background:#e7f5ec;border-radius:20px;padding:6px 14px;">시트 연동</span>`
      : `<span style="font-size:16px;font-weight:700;color:#b07a1a;background:#fdf3dc;border-radius:20px;padding:6px 14px;">무료 체험</span>`;
    const gear=canSettings?`<button id="login-gear" style="font-size:14px;color:var(--ink-soft);background:none;border:none;text-decoration:underline;cursor:pointer;padding:2px 6px;">⚙️ 선생님 설정</button>`:'';
    const hl=Number(localStorage.getItem(lastKey()))||0;
    const picker=`<select id="login-select" style="font-family:'Jua';font-size:24px;padding:10px 16px;border-radius:12px;border:2px solid #e7d4ab;background:#fff;color:#5b4634;cursor:pointer;min-width:220px;">
        <option value="0" ${!hl?'selected':''}>이름을 선택하세요</option>${roster.length?loginOptions():''}</select>`;
    board.innerHTML=`<div class="page" style="align-items:center; justify-content:center; text-align:center; gap:14px;">
      <div style="font-size:64px; line-height:1;">🌱</div>
      <div style="font-family:'Jua'; font-size:50px; color:var(--ink); line-height:1;">식물의 비밀 공장</div>

/* ---- lifecycle cleanup (animation loops) ---- */
let cleanups=[];
function registerCleanup(fn){cleanups.push(fn);}
function runCleanups(){cleanups.forEach(f=>{try{f()}catch(e){}}); cleanups=[]; if(typeof clearModals==='function')clearModals();}
/* 설명 모달이 떠 있는 동안에는 시뮬레이션을 일시정지해, 장면이 모달 뒤로 지나가 버리지 않게 한다 */
function loop(fn){let raf,run=true; const step=t=>{if(!run)return; if(!modalActive)fn(t); raf=requestAnimationFrame(step);};
  raf=requestAnimationFrame(step); registerCleanup(()=>{run=false; cancelAnimationFrame(raf);});}
function delay(fn,ms){const id=setTimeout(fn,ms); registerCleanup(()=>clearTimeout(id)); return id;}

/* ---- 자연스러운 뿌리 생성/그리기 (형태는 한 번 생성해 고정) ---- */
function srand(seed){let s=seed>>>0||1; return ()=>{s=(s*1664525+1013904223)>>>0; return s/4294967296;};}
function genRoot(bx,by,len,spread,seed){
  const R=srand(seed), segs=12, main=[]; let x=bx,y=by;
  for(let i=0;i<=segs;i++){ main.push({x,y,w:Math.max(1.4,5.6*(1-i/segs)+1)});
    y+=len/segs; x+=(R()-0.5)*spread*0.16; }
  const laterals=[];
  for(let k=0;k<5;k++){ const idx=2+Math.floor(R()*(segs-3)), st=main[idx];
    const dir=(k%2?1:-1)*(0.7+R()*0.6), llen=len*(0.55-idx/segs*0.32)*(0.7+R()*0.5), ls=6, pts=[];
    let lx=st.x,ly=st.y;
    for(let j=0;j<=ls;j++){ pts.push({x:lx,y:ly,w:Math.max(0.9,2.7*(1-j/ls))});
      lx+=dir*spread*0.17*(1-j/ls*0.3)+(R()-0.5)*3; ly+=llen/ls*(0.75+0.25*(1-j/ls)); }
    laterals.push(pts); }
  const hairs=[];
  const addH=poly=>{ for(let i=1;i<poly.length;i++){ const p=poly[i], n=1+(R()<0.55?1:0);
    for(let h=0;h<n;h++){ const a=Math.PI*0.5+(R()-0.5)*2.3, L=6+R()*9, sgn=R()<0.5?-1:1;
      const ex=p.x+Math.cos(a)*L*sgn, ey=p.y+Math.abs(Math.sin(a))*L*0.5+L*0.4;
      hairs.push({x:p.x,y:p.y,ex,ey,cx:p.x+(ex-p.x)*0.4+(R()-0.5)*5,cy:p.y+(ey-p.y)*0.5}); } } };
  addH(main); laterals.forEach(addH);
  for(let i=hairs.length-1;i>0;i--){const j=Math.floor(R()*(i+1)); const tmp=hairs[i]; hairs[i]=hairs[j]; hairs[j]=tmp;}
  return {main,laterals,hairs};
}
function drawRoot(ctx,root,col,hcol,nActive){
  ctx.lineCap='round'; ctx.strokeStyle=col;
  const sp=poly=>{for(let i=1;i<poly.length;i++){ctx.lineWidth=poly[i].w; ctx.beginPath();
    ctx.moveTo(poly[i-1].x,poly[i-1].y); ctx.lineTo(poly[i].x,poly[i].y); ctx.stroke();}};
  sp(root.main); root.laterals.forEach(sp);
  ctx.strokeStyle=hcol; ctx.lineWidth=1.3;
  const n=nActive==null?root.hairs.length:Math.min(nActive,root.hairs.length);
  for(let i=0;i<n;i++){const h=root.hairs[i]; ctx.beginPath(); ctx.moveTo(h.x,h.y);
    ctx.quadraticCurveTo(h.cx,h.cy,h.ex,h.ey); ctx.stroke();}
  ctx.lineCap='butt';
}

/* ---- 공용: 자연스러운 잎 (뾰족한 끝 + 중앙맥 + 곁맥) ----
   (x,y)=잎이 붙는 밑동, angle=잎이 뻗는 방향(라디안, 0=오른쪽),
   len=길이, wid=폭(반값), fill/vein=색. 살짝 굽은 잎몸으로 자연스럽게. */
function drawLeafShape(ctx,x,y,angle,len,wid,fill,vein){
  fill=fill||'#4fae6d'; vein=vein||'#2f7a4f';
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  const bend=wid*0.28;                       // 잎몸이 한쪽으로 살짝 휘게
  ctx.beginPath();
  ctx.moveTo(0,0);                            // 밑동
  ctx.bezierCurveTo(len*0.30,-wid,      len*0.72,-wid*0.72+bend, len,bend);   // 위쪽 가장자리 → 뾰족한 끝
  ctx.bezierCurveTo(len*0.72, wid*0.72+bend, len*0.30, wid,      0,0);        // 아래쪽 가장자리 → 밑동
  ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=vein; ctx.lineWidth=Math.max(1,len*0.035); ctx.lineJoin='round'; ctx.stroke();
  // 중앙맥
  ctx.lineWidth=Math.max(0.9,len*0.03);
  ctx.beginPath(); ctx.moveTo(len*0.04,bend*0.15); ctx.quadraticCurveTo(len*0.55,bend*0.6,len*0.92,bend); ctx.stroke();
  // 곁맥
  ctx.lineWidth=Math.max(0.6,len*0.02);
  for(let i=1;i<=3;i++){ const t=i/4, mx=len*t, my=bend*0.6*t, sp=wid*(1-t*0.55);
    ctx.beginPath(); ctx.moveTo(mx,my); ctx.quadraticCurveTo(mx+len*0.10,my-sp*0.5,mx+len*0.18,my-sp*0.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mx,my); ctx.quadraticCurveTo(mx+len*0.10,my+sp*0.5,mx+len*0.18,my+sp*0.8); ctx.stroke(); }
  ctx.restore();
}
/* ---- 공용: 자연스러운 잎 (SVG 문자열) ----
   (cx,cy)=밑동, deg=뻗는 방향(도), len=길이, wid=폭(반값) */
function svgLeaf(cx,cy,deg,len,wid,fill,vein){
  fill=fill||'#4fae6d'; vein=vein||'#2f7a4f'; const b=wid*0.28;
  const d=`M0 0 C${len*0.30} ${-wid} ${len*0.72} ${-wid*0.72+b} ${len} ${b} C${len*0.72} ${wid*0.72+b} ${len*0.30} ${wid} 0 0 Z`;
  const mid=`M${len*0.04} ${b*0.15} Q${len*0.55} ${b*0.6} ${len*0.92} ${b}`;
  return `<g transform="translate(${cx} ${cy}) rotate(${deg})">`+
    `<path d="${d}" fill="${fill}" stroke="${vein}" stroke-width="${Math.max(1,len*0.04).toFixed(1)}" stroke-linejoin="round"/>`+
    `<path d="${mid}" fill="none" stroke="${vein}" stroke-width="${Math.max(0.8,len*0.03).toFixed(1)}" opacity="0.85"/></g>`;
}

/* ---- 새싹(활동) → 별(마을) → 황금 새싹(전체 완료) 단계 ---- */
function gatedKeys(ti){const t=TOPICS[ti],k=[];t.pages.forEach((p,i)=>{if(p.gate)k.push(t.id+'-'+i);});return k;}
function gatedAllKeys(){let k=[]; TOPICS.forEach((t,i)=>{k=k.concat(gatedKeys(i));}); return k;}
function topicDone(ti){const k=gatedKeys(ti); return k.length?k.filter(x=>state.done[x]).length:0;}
function topicTotal(ti){return gatedKeys(ti).length;}
function topicComplete(ti){return topicTotal(ti)>0 && topicDone(ti)===topicTotal(ti);}
function sproutsDone(){return gatedAllKeys().filter(k=>state.done[k]).length;}   // 모은 새싹
function sproutsTotal(){return gatedAllKeys().length;}
function starsDone(){return TOPICS.reduce((a,_,i)=>a+(topicComplete(i)?1:0),0);}   // 완료한 마을 = 별
function starsTotal(){return TOPICS.length;}                                       // 7
function allComplete(){return starsDone()===starsTotal();}                          // 전체 완료 → 황금 새싹
function totalStars(){return starsDone();}

function recomputeStars(ti){const t=TOPICS[ti],keys=gatedKeys(ti); if(!keys.length)return;
  const n=keys.filter(k=>state.done[k]).length, s=n>0?Math.max(1,Math.round(n/keys.length*3)):0;

/* =========================================================================
   동적 모달 (단계 스캐폴딩)
   ========================================================================= */
let modalQueue=[], modalActive=false;
function openModal(steps, opts={}){ modalQueue.push({steps,opts}); if(!modalActive) showNextModal(); }
function clearModals(){ modalQueue=[]; modalActive=false; modalRoot.classList.remove('show'); modalRoot.innerHTML=''; }
function showNextModal(){
  if(!modalQueue.length){ modalActive=false; return; }
  modalActive=true;
  const {steps,opts}=modalQueue.shift();
  let idx=0; const color=opts.color||COLORS.root.c;
  function render(){
    const s=steps[idx], multi=steps.length>1;
    const dots=multi?`<div class="mstep">${steps.map((_,i)=>`<i class="${i<=idx?'on':''}" style="${i<=idx?'background:'+color:''}"></i>`).join('')}</div>`:'';
    const last=idx===steps.length-1;
    modalRoot.innerHTML=`<div class="mback"></div>
      <div class="mbox${s.big?' mbig':''}" style="border-color:#fff">
        <div class="mart">${s.art||'🌱'}</div>${dots}
        <h3>${s.title||''}</h3><p>${s.body||''}</p>
        <div class="mbtns">
          ${idx>0?`<button class="navbtn ghost sm" id="mPrev">← 이전</button>`:''}
          <button class="navbtn sm" id="mNext" style="background:${color}">${last?'알겠어요 ✅':'다음 →'}</button>
        </div>
      </div>`;
    modalRoot.querySelector('.mbox').querySelectorAll('p b').forEach(b=>b.style.color=color);
    requestAnimationFrame(()=>modalRoot.classList.add('show'));
    const nx=modalRoot.querySelector('#mNext'); nx.onclick=()=>{ if(last) close(); else {idx++; render();} };
    const pv=modalRoot.querySelector('#mPrev'); if(pv) pv.onclick=()=>{idx--; render();};
    // 배경 클릭으로는 닫히지 않음 (버튼으로만 진행)
  }
  function close(){ modalRoot.classList.remove('show');
    setTimeout(()=>{ modalRoot.innerHTML=''; opts.onDone&&opts.onDone(); showNextModal(); },260); }
  render();
}
/* 단발 안내 모달(마일스톤) */
function popModal(art,title,body,color){ openModal([{art,title,body}],{color}); }

/* =========================================================================
   안내 투어 — 팝업을 하나씩 차례로(사이에 화면 볼 시간을 두고) 보여 준다.
   · 화면이 뜨면 먼저 전체를 볼 시간을 주고 첫 팝업이 나온다.
   · 하나를 읽고 닫으면 잠시 화면을 볼 시간을 준 뒤 다음 팝업이 나온다.
   · 모든 팝업을 다 봐야 '다음' 버튼(다음 활동)이 열린다.
   ========================================================================= */
let tourActive=false, tourPendingUnlock=false;
const TOUR_START_DELAY=1400, TOUR_GAP=1200;
function startTour(steps, opts={}){
  if(!steps || !steps.length){ tourActive=false; return; }
  tourActive=true; tourPendingUnlock=false;
  let i=0;
  const showOne=()=>{
    if(i>=steps.length){                     // 투어 끝 — 대기 중이던 잠금 해제
      tourActive=false;
      if(tourPendingUnlock){ const b=document.getElementById('nextBtn'); if(b)b.disabled=false; }
      opts.onComplete&&opts.onComplete();
      return;
    }
    openModal([steps[i]], {color:opts.color, onDone:()=>{ i++; delay(showOne, i<steps.length?TOUR_GAP:0); }});
  };
  delay(showOne, opts.startDelay!=null?opts.startDelay:TOUR_START_DELAY);
}
/* 첫 방문에만 자동으로 투어 실행(한 번만). 재방문 시엔 잠그지 않음.
   onComplete: 투어를 모두 본 뒤(또는 이미 봤으면 즉시) 호출된다. */
function autoTour(steps, color, onComplete){
  const k='guide-'+TOPICS[state.ti].id+'-'+state.pi;
  if(state.seen[k]){ if(onComplete)onComplete(); return; }
  state.seen[k]=1;
  startTour(steps, {color, onComplete});
}

const IMG={};

function imgReady(i){ return i && i.complete && i.naturalWidth>0; }

/* ---- 공용: 캔버스 만들기 (2x backing for crispness) ---- */
function mkCanvas(parent,w,h){
  const c=document.createElement('canvas'); c.className='simcanvas';
  c.style.width=w+'px'; c.style.height=h+'px'; c.width=w*2; c.height=h*2;
  const ctx=c.getContext('2d'); ctx.scale(2,2); parent.appendChild(c);
  return {c,ctx,w,h};
}
function canvasXY(c,e){const r=c.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*c.width/2, y:(e.clientY-r.top)/r.height*c.height/2};}

function tick(body,id){const e=body.querySelector(`.ck[data-ck="${id}"]`);
  if(e&&!e.classList.contains('on')){e.classList.add('on'); e.querySelector('.box').textContent='✅';
    e.animate([{transform:'scale(1)'},{transform:'scale(1.15)'},{transform:'scale(1)'}],{duration:300});}}
function allTicked(body){return [...body.querySelectorAll('.ck')].every(e=>e.classList.contains('on'));}

function waterSimBuilder(cfg){ // cfg:{title, intro:[steps], showSun, showStomata, simpleHint, checks, color}

    // controls

    waterBtn.textContent='💧 물 주기'; waterBtn.onclick=()=>{sim.flowEnabled=true; for(let i=0;i<6;i++)sim.addSoilDrop(undefined,true); tick(body,'water'); checkDone();};
    ctr.appendChild(waterBtn);
    if(cfg.showSun){const sb=document.createElement('button'); sb.className='toggle on'; sb.id='sunT'; sb.textContent='☀️ 날씨: 맑음';

      }; ctr.appendChild(sb);}
    if(cfg.showStomata){const stb=document.createElement('button'); stb.className='toggle on'; stb.id='stoT'; stb.textContent='🌿 기공: 열림';
      stb.onclick=()=>{sim.stomata=!sim.stomata; stb.classList.toggle('on',sim.stomata); stb.textContent='🌿 기공: '+(sim.stomata?'열림':'닫힘');
        if(!sim.stomata){popModal('🚪','기공을 닫았어요','기공이 닫히면 <b>증산</b>이 멈춰요. 그러면 물을 위로 끌어올리는 힘이 사라져 물의 이동이 거의 멈춘답니다!',col); tick(body,'stoma'); checkDone();}
      }; ctr.appendChild(stb);}
    // canvas tap = water
    cv.c.onclick=e=>{const p=canvasXY(cv.c,e); if(p.y>sim.soilY-10){sim.flowEnabled=true; sim.addSoilDrop(p.x,true); tick(body,'water'); checkDone();}};
    document.getElementById('guide').onclick=()=>openModal(cfg.intro,{color:col});
    // meter refs
    function renderMeter(){document.getElementById('meter').innerHTML=
      `<div class="m">흡수 <b>${sim.counts.absorbed}</b></div>
       <div class="m">잎 도달 <b>${sim.counts.reached}</b></div>
       ${cfg.showStomata?`<div class="m">증산 <b>${sim.counts.transpired}</b></div>`:''}`;}
    function updateHint(){const left=cfg.checks.filter(c=>{const e=body.querySelector('.ck[data-ck="'+c.id+'"]'); return e&&!e.classList.contains('on');}).map(c=>c.label);
      const h=document.getElementById('hint'); if(h&&left.length)h.innerHTML='💧 남은 단계: <b>'+left.join(' · ')+'</b>';}
    function checkDone(){ if(allTicked(body)){const h=document.getElementById('hint'); if(h)h.textContent='👍 모든 단계를 확인했어요! ‘다음’으로 넘어가요.'; done();} else updateHint(); }
    // milestone handler
    function onMile(key){
      if(key==='absorb'){tick(body,'absorb'); popModal('💧','뿌리가 물을 흡수했어요!','땅속의 물이 뿌리털로 쏙 빨려 들어갔어요. 이제 줄기를 타고 올라갈 거예요.',col);}
      if(key==='reach'){tick(body,'reach'); popModal('🍃','잎까지 도착!','물이 줄기 속 <b>물관</b>을 타고 잎까지 올라왔어요. 눈에 보이지 않던 물의 이동을 직접 확인했어요!',col);}
      if(key==='transp'&&cfg.showStomata){tick(body,'transp'); popModal('💨','증산이 일어났어요!','잎의 기공으로 물이 <b>수증기</b>가 되어 빠져나갔어요. 이 힘이 아래의 물을 계속 끌어올려요.',col);}
      checkDone();
    }
    // loop
    loop(()=>{sim.update(); sim.draw(); renderMeter();});
    renderMeter();
    // 첫 방문 자동 안내(팝업을 하나씩 차례로) → 다 본 뒤 잠깐 화면을 보여 주고 물이 천천히 올라가기 시작
    autoTour(cfg.intro, col, ()=>{ delay(()=>{ sim.flowEnabled=true; }, 900); });
  };
}

class WaterSim{
  constructor(cv,cfg){this.ctx=cv.ctx; this.W=cv.w; this.H=cv.h; this.cfg=cfg;
    this.img=loadImg('plant_cutaway.png');
    this.sun=true; this.stomata=true; this.cloudAmt=0; this.counts={absorbed:0,reached:0,transpired:0};
    const S=this.W; this.S=S;
    this.soilY=S*0.60; this.leafY=S*0.16; this.midX=S*0.51;
    this.lanes=[this.midX-3,this.midX,this.midX+3];
    this.leafPts=[{x:S*0.30,y:S*0.17},{x:S*0.66,y:S*0.20},{x:S*0.42,y:S*0.12},{x:S*0.60,y:S*0.30}];
    this.ms={absorb:false,reach:false,transp:false}; this.parts=[];
    this.frame=0; this.pourX=this.midX; this.pourUntil=-1;
    this.flowEnabled=false;   // 안내 팝업을 다 본 뒤(또는 직접 물을 준 뒤)에 물이 올라가기 시작
    for(let i=0;i<24;i++)this.addSoilDrop();}
  addSoilDrop(x,fromTop){ if(this.parts.length>82)return; const S=this.S;
    const px=x!=null?x:S*0.20+Math.random()*S*0.60;
    if(fromTop){ this.parts.push({x:px+(Math.random()-.5)*8,y:6+Math.random()*16,ph:'fall',lane:0,a:1,t:0,ty:this.soilY+S*0.03+Math.random()*S*0.22});
      this.pourX=px; this.pourUntil=this.frame+48; }
    else this.parts.push({x:px,y:this.soilY+S*0.03+Math.random()*S*0.22,ph:'soil',lane:0,a:1,t:Math.random()*200});}
  tf(){let f=0.4; if(this.cfg.showSun){ f+=0.55*(1-this.cloudAmt); } else f+=0.55;
    if(this.cfg.showStomata && !this.stomata)f=0.05; return f;}
  bump(k){if(!this.ms[k]){this.ms[k]=true; this.cfg.onMilestone&&this.cfg.onMilestone(k);}}
  update(){this.frame++;
    if(this.cfg.showSun){ const tgt=this.sun?0:1; this.cloudAmt+=(tgt-this.cloudAmt)*0.05; }
    const tf=this.tf(), S=this.S;
    for(const p of this.parts){ p.t++;
      if(p.ph==='fall'){p.y+=4.4; if(p.y>=p.ty)p.ph='soil';}
      else if(p.ph==='soil'){ p.x+=Math.sin(p.t*0.03)*0.15;
        if(this.flowEnabled && Math.random()<0.0035*(0.5+tf)){p.ph='absorb'; p.lane=this.lanes[(Math.random()*3)|0];}}   // 물 흐름이 켜졌을 때만, 천천히 흡수
      else if(p.ph==='absorb'){const tx=this.midX,ty=this.soilY; p.x+=(tx-p.x)*0.05; p.y+=(ty-p.y)*0.05;
        if(Math.abs(p.x-tx)<5&&Math.abs(p.y-ty)<5){p.ph='rise'; this.counts.absorbed++; this.bump('absorb');}}
      else if(p.ph==='rise'){p.x+=(p.lane-p.x)*0.25; p.y-=(0.32+tf*0.95);   // 상승 속도 완화(천천히 올라감)
        if(p.y<=this.leafY){p.ph='leaf'; p.y=this.leafY; p.t=0; const d=this.leafPts[(Math.random()*this.leafPts.length)|0]; p.lx=d.x; p.ly=d.y; this.counts.reached++; this.bump('reach');}}
      else if(p.ph==='leaf'){p.x+=((p.lx||this.midX)-p.x)*0.06; p.y+=((p.ly||this.leafY)-p.y)*0.06;
        const open=this.cfg.showStomata?this.stomata:true;
        if(open&&p.t>120+Math.random()*200){p.ph='vapor'; this.counts.transpired++; this.bump('transp');}}
      else if(p.ph==='vapor'){p.y-=0.9; p.x+=Math.sin(p.t*0.05)*0.7; p.a-=0.012;
        if(p.a<=0){p.ph='soil'; p.a=1; p.x=S*0.20+Math.random()*S*0.60; p.y=this.soilY+S*0.03+Math.random()*S*0.22; p.t=0;}}}}
  draw(){const c=this.ctx,W=this.W,H=this.H,mx=this.midX,sy=this.soilY,ly=this.leafY;
    c.clearRect(0,0,W,H);
    if(imgReady(this.img)) c.drawImage(this.img,0,0,W,H);
    else { const sky=c.createLinearGradient(0,0,0,sy); sky.addColorStop(0,'#eaf6ff'); sky.addColorStop(1,'#f3faf0');
      c.fillStyle=sky; c.fillRect(0,0,W,sy); c.fillStyle='#7a5230'; c.fillRect(0,sy,W,H-sy); }
    // 날씨: 구름이 옆에서 서서히 몰려와 해를 가리고 하늘이 흐려짐
    if(this.cfg.showSun && this.cloudAmt>0.01){
      const amt=this.cloudAmt;
      c.fillStyle='rgba(150,160,175,'+(amt*0.24)+')'; c.fillRect(0,0,W,sy); // 하늘 흐려짐
      this.cloud(W*0.02-70+amt*(W*0.11+80), H*0.11, 1.1+amt*0.4);          // 왼쪽→해로 드리프트
    }
    // 물뿌리개(물 줄 때)
    if(this.frame<this.pourUntil) this.drawCan(this.pourX);
    // 물관 흐름 오버레이(줄기 속 가느다란 물줄기가 위로 흐름)
    const flow=this.tf();
    c.lineCap='round'; c.lineWidth=2;
    const dash=13, gap=10, period=dash+gap, off=(this.frame*(0.8+flow*4))%period;
    c.strokeStyle='rgba(74,163,216,'+(0.35+Math.min(0.45,flow))+')';
    for(let y=sy+off; y>ly; y-=period){ const y2=Math.max(ly,y-dash);
      c.beginPath(); c.moveTo(mx,Math.min(sy,y)); c.lineTo(mx,y2); c.stroke(); }
    c.lineCap='butt';
    // 라벨
    c.font='bold 15px Noto Sans KR'; c.textAlign='left';
    c.fillStyle='#2f6fa0'; c.fillText('물관',mx+12,(ly+sy)/2);
    c.fillStyle='#8a5a2b'; c.fillText('뿌리털',mx+16,sy+H*0.17);
    // 증산(연결 마을) 김 표시
    if((this.cfg.showStomata?this.stomata:true)&&this.counts.transpired>0){
      c.font='24px serif'; c.globalAlpha=.75; c.fillText('💨',mx-70,ly-2); c.fillText('💨',mx+44,ly-8); c.globalAlpha=1;}
    // 입자
    for(const p of this.parts){ c.globalAlpha=p.a;
      if(p.ph==='vapor'){c.fillStyle='rgba(150,200,235,'+(p.a*0.7)+')'; c.beginPath(); c.arc(p.x,p.y,4.5,0,7); c.fill();}
      else{c.fillStyle='#2f88d4'; c.beginPath(); c.arc(p.x,p.y,2.3,0,7); c.fill();
        c.fillStyle='rgba(255,255,255,.7)'; c.beginPath(); c.arc(p.x-0.7,p.y-0.7,0.9,0,7); c.fill();}}
    c.globalAlpha=1;
    // 상태 배너
    c.textAlign='center'; c.font='bold 18px Noto Sans KR';
    if(flow<0.12){c.fillStyle='#c0663a'; c.fillText('⏸ 물의 이동이 거의 멈췄어요',W/2,24);}
    else if(this.cfg.showSun&&!this.sun){c.fillStyle='#7a818c'; c.fillText('☁ 흐린 날 — 천천히 올라가요',W/2,24);}
    else{c.fillStyle='#2f8f57'; c.fillText('⬆ 물이 물관을 따라 올라가요',W/2,24);}
    c.textAlign='left';}
  cloud(x,y,s){s=s||1; const c=this.ctx; c.fillStyle='#f2f4f7';
    [[0,0,22],[-18,6,15],[18,6,16],[-6,-10,13],[10,-8,13]].forEach(o=>{c.beginPath(); c.arc(x+o[0]*s,y+o[1]*s,o[2]*s,0,7); c.fill();});}
  drawCan(px){const c=this.ctx, x=Math.max(52,Math.min(this.W-18,px)), y=18, sy=this.soilY;
    c.strokeStyle='rgba(70,150,210,.55)'; c.lineWidth=3; c.setLineDash([4,5]);
    c.beginPath(); c.moveTo(x,y+4); c.lineTo(x,sy); c.stroke(); c.setLineDash([]);
    c.fillStyle='#4aa3d8'; c.beginPath(); c.roundRect(x-46,y-14,30,22,6); c.fill();
    c.strokeStyle='#4aa3d8'; c.lineWidth=3; c.beginPath(); c.arc(x-31,y-16,8,Math.PI,0); c.stroke();
    c.fillStyle='#4aa3d8'; c.beginPath(); c.moveTo(x-18,y-8); c.lineTo(x+2,y); c.lineTo(x-18,y+6); c.closePath(); c.fill();}
}

/* =========================================================================
   ✦ 동적 시뮬레이션 2 — 뿌리의 흡수 (root)
   ========================================================================= */
function rootAbsorbBuilder(){return function(body,t,done){
  const col=t.col.c;
  body.innerHTML=`<div class="simwrap"><div id="cvHolder"></div>
    <div class="simside">
      <div class="controls">
        <button class="navbtn sm" id="water" style="background:${col}">💧 물 주기</button>
      </div>
      <div class="softpill">🌿 뿌리털 개수: <b id="hn">6</b>개</div>
      <input id="rng" type="range" min="3" max="34" value="6" style="width:100%; accent-color:${col}">
      <div class="meter"><div class="m">흡수한 물 <b id="abs">0</b></div><div class="m">식물 키 <b id="gh">0</b>%</div></div>
      <div class="panel" style="padding:7px 12px; flex:1; display:flex; flex-direction:column; gap:5px;">
        <div style="font-family:'Jua'; color:var(--ink); font-size:22px">🔎 단계별 확인</div>
        <div class="check" id="check">
          <div class="ck" data-ck="water"><span class="box">○</span><span>흙에 물을 주었어요</span></div>
          <div class="ck" data-ck="absorb"><span class="box">○</span><span>뿌리털이 물을 흡수해요</span></div>
          <div class="ck" data-ck="many"><span class="box">○</span><span>뿌리털이 많을수록 빨라요</span></div>
          <div class="ck" data-ck="grow"><span class="box">○</span><span>물을 흡수하면 위쪽이 자라요</span></div>
        </div>
        <div class="hintline" id="hint">흙(아래 갈색 부분)을 톡톡 눌러 물을 주세요.</div>
      </div>
      <button class="navbtn sm ghost" id="guide">📖 차근차근 알아보기</button>
    </div></div>`;
  const cv=mkCanvas(document.getElementById('cvHolder'),540,360);
  const ctx=cv.ctx,W=cv.w,H=cv.h, soilY=150, mx=W/2, maxLen=H-soilY-14;
  // 잔뿌리 미리 정의(물을 흡수해 g가 커질수록 born 값이 낮은 것부터 하나씩 나타남)
  const RR=srand(23), lats=[];
  for(let k=0;k<14;k++){ lats.push({ f:0.18+RR()*0.72, side:(k%2?1:-1)*(0.5+RR()*0.85), len:0.20+RR()*0.30, wob:(RR()-0.5)*2, born:(k/14)*0.9 }); }
  let hairs=6, parts=[], absorbed=0, frame=0, pourX=mx, pourUntil=-1, g=0;
  function addDrop(x){if(parts.length>110)return; const px=x!=null?x:40+Math.random()*(W-80);
    parts.push({x:px+(Math.random()-.5)*8, y:6+Math.random()*16, ph:'fall', a:1, ty:soilY+14+Math.random()*(H-soilY-40)}); pourX=px; pourUntil=frame+46;}
  function seed(){if(parts.length>110)return; parts.push({x:40+Math.random()*(W-80), y:soilY+14+Math.random()*(H-soilY-40), ph:'soil', a:1, life:Math.random()*200});}
  for(let i=0;i<10;i++)seed();
  function drawCan(px){const x=Math.max(50,Math.min(W-18,px)), y=16;
    ctx.strokeStyle='rgba(70,150,210,.55)'; ctx.lineWidth=3; ctx.setLineDash([4,5]);
    ctx.beginPath(); ctx.moveTo(x,y+4); ctx.lineTo(x,soilY); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#4aa3d8'; ctx.beginPath(); ctx.roundRect(x-46,y-14,30,22,6); ctx.fill();
    ctx.strokeStyle='#4aa3d8'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(x-31,y-16,8,Math.PI,0); ctx.stroke();
    ctx.fillStyle='#4aa3d8'; ctx.beginPath(); ctx.moveTo(x-18,y-8); ctx.lineTo(x+2,y); ctx.lineTo(x-18,y+6); ctx.closePath(); ctx.fill();}
  cv.c.onclick=e=>{const p=canvasXY(cv.c,e); if(p.y>soilY){for(let i=0;i<5;i++)addDrop(p.x+(Math.random()-.5)*40); tickW();}};
  document.getElementById('water').onclick=()=>{for(let i=0;i<8;i++)addDrop(); tickW();};
  function tickW(){tick(body,'water'); chk();}
  const rng=document.getElementById('rng');
  rng.oninput=()=>{hairs=+rng.value; document.getElementById('hn').textContent=hairs;
    if(hairs>=26){tick(body,'many'); chk();}};
  document.getElementById('guide').onclick=guide;
  const gsteps=[
    {art:'🌱',title:'뿌리가 하는 일',body:'뿌리는 땅속의 <b>물과 양분을 흡수</b>하고, 식물이 쓰러지지 않게 <b>지지</b>하며, 고구마처럼 양분을 <b>저장</b>하기도 해요.'},
    {art:'🔍',title:'뿌리털의 비밀',body:'뿌리 끝에는 솜털 같은 <b>뿌리털</b>이 아주 많아요. 뿌리털이 많을수록 물과 닿는 면이 넓어져 흡수를 더 잘한답니다.'},
    {art:'🌳',title:'직접 해 보기',body:'흙을 눌러 물을 주고 <b>뿌리털</b>을 늘려 보세요. 물을 흡수하면 <b>잔뿌리</b>가 새로 나오고 <b>줄기·잎</b>이 쑥쑥 자라는 것도 관찰해요!'}
  ];
  function guide(){openModal(gsteps,{color:col});}
  function chk(){if(allTicked(body)){document.getElementById('hint').textContent='👍 모든 단계 확인! ‘다음’으로 넘어가요.'; done();}}
  function mainPts(mlen){const p=[],segs=10; for(let i=0;i<=segs;i++){const u=i/segs; p.push({x:mx+Math.sin(u*3.2)*7*u, y:soilY+mlen*u, w:Math.max(1.6,6.5*(1-u*0.8))});} return p;}
  function latPts(l,mlen){const ay=soilY+mlen*l.f, ax=mx+Math.sin(l.f*3.2)*7*l.f, len=maxLen*l.len, st=5, p=[{x:ax,y:ay}];
    for(let i=1;i<=st;i++){const u=i/st; p.push({x:ax+l.side*len*u*0.9+l.wob*3*u, y:ay+len*u*0.72});} return p;}
  loop(()=>{ frame++;
    const mlen=maxLen*(0.4+g*0.6);
    const shownLats=lats.filter(l=>g>=l.born).map(l=>latPts(l,mlen));
    const mp=mainPts(mlen);
    const absorbPts=[]; shownLats.forEach(poly=>{absorbPts.push(poly[poly.length-1]); absorbPts.push(poly[(poly.length/2)|0]);}); absorbPts.push(mp[mp.length-1]);
    const pull=0.5+hairs/34*1.7, absorbProb=0.005+(hairs/34)*0.035;
    for(const p of parts){
      if(p.ph==='fall'){p.y+=4.4; if(p.y>=p.ty){p.ph='soil'; p.life=0;}}
      else if(p.ph==='soil'){ p.life=(p.life||0)+1; p.x+=Math.sin((p.y+p.life)*0.05)*0.3; p.y+=0.05;
        if(absorbPts.length && Math.random()<absorbProb){ let best=absorbPts[0],bd=1e9; for(const a of absorbPts){const dd=(a.x-p.x)**2+(a.y-p.y)**2; if(dd<bd){bd=dd;best=a;}} p.ph='go'; p.tx=best.x; p.ty=best.y; }
        else if(p.life>420){p.a-=0.012; if(p.a<=0)p.ph='dead';}
      }
      else if(p.ph==='go'){p.x+=(p.tx-p.x)*0.05*pull; p.y+=(p.ty-p.y)*0.05*pull;
        if(Math.abs(p.x-p.tx)<6&&Math.abs(p.y-p.ty)<6){p.ph='rise'; absorbed++; tick(body,'absorb'); chk();}}
      else if(p.ph==='rise'){p.x+=(mx-p.x)*0.12; p.y-=1.7*(0.6+hairs/34*0.7); if(p.y<=40){p.a-=0.05; if(p.a<=0)p.ph='dead';}}
    }
    parts=parts.filter(p=>p.ph!=='dead');
    const soilWater=parts.filter(p=>p.ph==='fall'||p.ph==='soil'||p.ph==='go').length;
    const moist=Math.min(1,soilWater/16), hairFac=0.2+(hairs/34)*0.8;
    g=Math.min(1,g+moist*hairFac*0.006);
    if(g>=0.6){tick(body,'grow'); chk();}
    if(hairs>=26){tick(body,'many'); chk();}
    document.getElementById('abs').textContent=absorbed;
    document.getElementById('gh').textContent=Math.round(g*100);
    const hint=document.getElementById('hint');
    if(!allTicked(body)){
      if(soilWater<3) hint.textContent='💧 흙이 말랐어요! 물을 주어야 잘 자라요.';
      else if(hairs<26) hint.textContent='🌿 물이 있어요! 뿌리털을 늘리면 더 빨리 흡수해요.';
      else hint.textContent='👍 물도 있고 뿌리털도 많아요. 흡수가 빨라요!';
    }
    // ---- draw ----
    ctx.clearRect(0,0,W,H);
    const sky=ctx.createLinearGradient(0,0,0,soilY); sky.addColorStop(0,'#eaf6ff'); sky.addColorStop(1,'#f1f8ef');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,soilY);
    // 해(하늘 구석에 고정 — 자람과 무관)
    ctx.fillStyle='#ffd24d'; ctx.beginPath(); ctx.arc(58,42,19,0,7); ctx.fill();
    ctx.strokeStyle='rgba(255,200,60,.6)'; ctx.lineWidth=3; for(let i=0;i<8;i++){const a=i/8*6.283; ctx.beginPath(); ctx.moveTo(58+Math.cos(a)*25,42+Math.sin(a)*25); ctx.lineTo(58+Math.cos(a)*32,42+Math.sin(a)*32); ctx.stroke();}
    ctx.fillStyle='#7a5230'; ctx.fillRect(0,soilY,W,H-soilY);
    ctx.fillStyle='#6c4626'; for(let x=0;x<W;x+=24)ctx.fillRect(x,soilY+3,11,3);
    if(frame<pourUntil) drawCan(pourX);
    // 자라는 줄기 + 잎 (g에 따라 위쪽만 자람)
    const stemH=30+g*116, topY=soilY-stemH;
    ctx.strokeStyle='#5aa05a'; ctx.lineCap='round'; ctx.lineWidth=7+g*4; ctx.beginPath(); ctx.moveTo(mx,soilY); ctx.lineTo(mx,topY); ctx.stroke(); ctx.lineCap='butt';
    if(g>0.06){const sc=0.6+g*0.6; drawLeafShape(ctx,mx-4,topY+16,Math.PI+0.32,40*sc,14*sc,'#4fae6d','#2f7a4f'); drawLeafShape(ctx,mx+4,topY+16,-0.32,40*sc,14*sc,'#4fae6d','#2f7a4f');}
    if(g>0.5){const sc=0.5+g*0.5; drawLeafShape(ctx,mx-4,topY+stemH*0.5,Math.PI+0.25,38*sc,13*sc,'#4fae6d','#2f7a4f'); drawLeafShape(ctx,mx+4,topY+stemH*0.5,-0.25,38*sc,13*sc,'#4fae6d','#2f7a4f');}
    // 뿌리: 본뿌리 + 잔뿌리(물 흡수할수록 증가)
    ctx.strokeStyle='#9c6a34'; ctx.lineCap='round';
    for(let i=1;i<mp.length;i++){ctx.lineWidth=mp[i].w; ctx.beginPath(); ctx.moveTo(mp[i-1].x,mp[i-1].y); ctx.lineTo(mp[i].x,mp[i].y); ctx.stroke();}
    ctx.lineWidth=2.4;
    shownLats.forEach(poly=>{ctx.beginPath(); ctx.moveTo(poly[0].x,poly[0].y); for(let i=1;i<poly.length;i++)ctx.lineTo(poly[i].x,poly[i].y); ctx.stroke();});
    ctx.lineCap='butt';
    // 뿌리털(슬라이더 개수만큼 촘촘히)
    const anchors=[]; for(let i=1;i<mp.length;i++)anchors.push(mp[i]); shownLats.forEach(poly=>{for(let i=1;i<poly.length;i++)anchors.push(poly[i]);});
    ctx.strokeStyle='#caa06a'; ctx.lineWidth=1.1; ctx.lineCap='round'; const HH=srand(9);
    for(let i=0;i<hairs;i++){const a=anchors[i%Math.max(1,anchors.length)]; if(!a)break; const ang=Math.PI*0.5+(HH()-0.5)*2.2, L=6+HH()*7, dir=HH()<.5?-1:1;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(a.x+Math.cos(ang)*L*dir, a.y+Math.abs(Math.sin(ang))*L*0.5+L*0.5); ctx.stroke();}
    ctx.lineCap='butt';
    // 물 입자
    for(const p of parts){ctx.globalAlpha=p.a; ctx.fillStyle='#2f88d4'; ctx.beginPath(); ctx.arc(p.x,p.y,3.4,0,7); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.75)'; ctx.beginPath(); ctx.arc(p.x-1,p.y-1,1.2,0,7); ctx.fill(); ctx.globalAlpha=1;}
    // 라벨
    ctx.globalAlpha=1; ctx.font='bold 14px Noto Sans KR'; ctx.textAlign='left'; ctx.fillStyle='#6b4a26';
    ctx.fillText('← 잔뿌리',W-104,soilY+52); ctx.fillText('뿌리털',14,H-14);
  });
  autoTour(gsteps, col);
};}

/* =========================================================================
   ✦ 동적 시뮬레이션 3 — 광합성 (leaf)
   ========================================================================= */
function photoBuilder(){return function(body,t,done){
  const col=t.col.c;
  body.innerHTML=`<div class="simwrap"><div id="cvHolder"></div>
    <div class="simside">
      <div class="softpill">☁️ 구름으로 해 가리기: <b id="cv">0</b>%</div>

      <div class="panel" style="padding:7px 12px; flex:1; display:flex; flex-direction:column; gap:5px;">

          <div class="ck" data-ck="water"><span class="box">○</span><span>물이 줄기를 타고 잎으로 올라와요</span></div>

          <div class="ck" data-ck="move"><span class="box">○</span><span>양분이 줄기를 타고 이동해요</span></div>
          <div class="ck" data-ck="store"><span class="box">○</span><span>양분이 뿌리·열매에 저장·사용돼요</span></div>
        </div>
        <div class="hintline" id="hint">슬라이더로 구름을 움직여 햇빛을 가려 보세요.</div>
      </div>
      <button class="navbtn sm ghost" id="guide">📖 차근차근 알아보기</button>
    </div></div>`;
  const cv=mkCanvas(document.getElementById('cvHolder'),400,400);
  const ctx=cv.ctx,W=cv.w,H=cv.h, S=W, cx=S*0.51;
  const bgImg=loadImg('scene_photosynthesis.png');
  const soilTop=S*0.80, stemTopY=8, junctionY=S*0.30, lx=S*0.65, ly=S*0.25, leafRot=-0.5;
  const leaf2={x:S*0.33, y:S*0.55}, fruit={x:S*0.62, y:S*0.52}, rootC={x:cx, y:S*0.86};
  const dests=[{key:'root',pt:rootC},{key:'fruit',pt:fruit},{key:'leaf',pt:leaf2}];
  let cloud=0, sugar=0, oxygen=0, stored=0, dRoot=0, dFruit=0, dLeaf=0, parts=[], frame=0, cloudAmt=0, glow=0;

  slider.oninput=()=>{cloud=+slider.value; document.getElementById('cv').textContent=cloud; chk();};
  document.getElementById('guide').onclick=guide;
  function rate(){return Math.max(0,1-cloudAmt);}   // 햇빛 양(구름이 서서히 가리면 감소)
  const gsteps=[
    {art:'☀️',big:true,title:'광합성 — 잎이 햇빛으로 양분을 만들어요',body:'잎은 <b>햇빛</b>을 받아 스스로 <b>양분</b>을 만들어요. 이것을 <b>광합성</b>이라고 해요.'},
    {art:'📦',title:'양분은 여러 곳으로 이동해요',body:'잎에서 만든 <b>양분</b>은 줄기를 타고 <b>다른 잎·열매·뿌리</b> 등 식물 곳곳으로 이동해서, 자라는 데 <b>사용</b>되거나 <b>저장</b>돼요.'},
    {art:'☁️',title:'직접 해 보기',body:'슬라이더로 <b>구름</b>을 움직여 해를 가려 보세요. 햇빛이 줄면 양분도 적게 만들어져요. 만든 양분이 어디로 이동하는지 따라가 보세요!'}
  ];
  function guide(){openModal(gsteps,{color:col});}
  function chk(){if(allTicked(body)){document.getElementById('hint').textContent='👍 모든 단계 확인! ‘다음’으로 넘어가요.'; done();}}
  function drawCloud(x,y,s){ctx.fillStyle='#f2f4f7'; ctx.strokeStyle='#d7dde6'; ctx.lineWidth=2;
    [[0,0,26],[-22,6,18],[22,6,20],[-8,-12,16],[12,-10,15]].forEach(c=>{ctx.beginPath(); ctx.arc(x+c[0]*s,y+c[1]*s,c[2]*s,0,7); ctx.fill();});}
  function drawLeaf(x,y,rot,sc){ ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.scale(sc,sc);
    ctx.beginPath(); ctx.moveTo(0,-46); ctx.bezierCurveTo(34,-28,28,32,0,48); ctx.bezierCurveTo(-28,32,-34,-28,0,-46); ctx.closePath();
    ctx.fillStyle='#41a86a'; ctx.fill(); ctx.strokeStyle='#2c7a4d'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-42); ctx.lineTo(0,44); ctx.stroke();
    ctx.lineWidth=1.2; for(let i=-2;i<=2;i++){const yy=i*14; ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(19,yy-9); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(-19,yy-9); ctx.stroke();}
    ctx.restore(); }
  function produce(){sugar++; oxygen++;
    const d=dests[sugar%dests.length];
    parts.push({type:'nut',ph:'n1',x:lx+(Math.random()-.5)*24,y:ly+(Math.random()-.5)*24, dest:d.key, dx:d.pt.x+(Math.random()-.5)*14, dy:d.pt.y+(Math.random()-.5)*12});
    parts.push({type:'o2',x:lx+(Math.random()-.5)*20,y:ly-26,a:1});
    tick(body,'made'); document.getElementById('sug').textContent=sugar; chk();}
  loop(()=>{ frame++;
    cloudAmt += (cloud/100 - cloudAmt)*0.04;   // 구름이 서서히 몰려옴/걷힘
    const r=rate();
    // 물은 재료 중 하나일 뿐 — 가끔만 소량 올라옴
    if(frame%26===0) parts.push({type:'h2o',ph:'rise',x:cx+(Math.random()-.5)*5,y:soilTop+14});
    // 이산화 탄소: 햇빛 있을 때 잎으로
    if(r>0.05 && frame%18===0) parts.push({type:'co2',x:W-14,y:ly-24+Math.random()*48});
    // ★ 광합성: 햇빛 세기에 따라 잎에서 양분이 만들어짐(물과 무관하게 강조)
    if(r>0.05 && frame%Math.max(7,Math.round(22-r*15))===0){ produce(); glow=1; }
    glow=Math.max(0,glow-0.03);
    for(const p of parts){
      if(p.type==='h2o'){
        if(p.ph==='rise'){p.y-=2.2; if(p.y<=junctionY){p.ph='toleaf';}}
        else {p.x+=(lx-p.x)*0.07; p.y+=(ly-p.y)*0.07;
          if(Math.abs(p.x-lx)<8&&Math.abs(p.y-ly)<8){p.dead=1; tick(body,'water'); chk();}}}
      else if(p.type==='co2'){p.x+=(lx-p.x)*0.05; p.y+=(ly-p.y)*0.05; if(Math.abs(p.x-lx)<24)p.dead=1;}
      else if(p.type==='nut'){ // 잎에서 만든 양분 → 줄기 → 여러 곳으로 이동
        if(p.ph==='n1'){p.x+=(cx-p.x)*0.1; p.y+=(junctionY-p.y)*0.1; if(Math.abs(p.x-cx)<5&&Math.abs(p.y-junctionY)<6){p.ph='go'; tick(body,'move'); chk();}}
        else {p.x+=(p.dx-p.x)*0.09; p.y+=(p.dy-p.y)*0.09;
          if(Math.abs(p.x-p.dx)<6&&Math.abs(p.y-p.dy)<6){p.dead=1;
            if(p.dest==='root'){dRoot++; stored++;} else if(p.dest==='fruit'){dFruit++; stored++;} else {dLeaf++;}
            document.getElementById('st').textContent=stored; if(dRoot+dFruit>=4)tick(body,'store'); chk();}}}
      else if(p.type==='o2'){p.y-=1.4; p.x+=Math.sin(p.y*0.05)*0.5; p.a-=0.012; if(p.a<=0)p.dead=1;}
    }
    parts=parts.filter(p=>!p.dead);
    // ---- draw ----
    ctx.clearRect(0,0,W,H);
    if(imgReady(bgImg)) ctx.drawImage(bgImg,0,0,W,H);
    else { const bg=ctx.createLinearGradient(0,0,0,soilTop); bg.addColorStop(0,'#eaf6ff'); bg.addColorStop(1,'#eef8ea');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,soilTop); ctx.fillStyle='#7a5230'; ctx.fillRect(0,soilTop,W,H-soilTop); }
    // 햇빛 광선 (해 → 큰 잎)
    if(r>0.05){ctx.strokeStyle=`rgba(255,200,60,${0.3+r*0.5})`; ctx.lineWidth=3;
      const n=Math.round(r*5); for(let i=0;i<n;i++){const yy=ly-26+i*14; ctx.beginPath(); ctx.moveTo(sun.x-10,sun.y+10); ctx.lineTo(lx+10,yy); ctx.stroke();}}
    // 구름: 오른쪽에서 서서히 몰려와 해를 가림(해보다 크게)
    if(cloudAmt>0.02){ ctx.globalAlpha=Math.min(1,cloudAmt*1.5);
      drawCloud(sun.x+120-cloudAmt*128, sun.y+2, 1.6); ctx.globalAlpha=1;
      ctx.fillStyle='rgba(150,160,175,'+(cloudAmt*0.18)+')'; ctx.fillRect(0,0,W,soilTop); }
    // ★ 광합성 강조: 큰 잎에서 빛나는 표시
    if(r>0.05){ const gr=ctx.createRadialGradient(lx,ly,4,lx,ly,52);
      gr.addColorStop(0,'rgba(255,240,130,'+(0.28+glow*0.45)+')'); gr.addColorStop(1,'rgba(255,240,130,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(lx,ly,52,0,7); ctx.fill(); }
    // 입자 (물은 작게, 양분은 크고 또렷하게)
    for(const p of parts){ctx.globalAlpha=p.a==null?1:p.a;
      if(p.type==='h2o'){ctx.fillStyle='#2f88d4'; ctx.beginPath(); ctx.arc(p.x,p.y,2.3,0,7); ctx.fill();}
      else if(p.type==='co2'){ctx.fillStyle='#9aa0a6'; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill();}
      else if(p.type==='nut'){ctx.fillStyle='#f0b820'; ctx.beginPath(); ctx.arc(p.x,p.y,6,0,7); ctx.fill(); ctx.strokeStyle='#b9892a'; ctx.lineWidth=1.2; ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.6)'; ctx.beginPath(); ctx.arc(p.x-1.4,p.y-1.4,1.6,0,7); ctx.fill();}
      else if(p.type==='o2'){ctx.fillStyle='rgba(120,200,255,'+p.a+')'; ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,7); ctx.fill();}
      ctx.globalAlpha=1;}
    // 라벨(크게)
    ctx.textAlign='center'; ctx.font='bold 17px Jua, Noto Sans KR'; ctx.fillStyle='#2f8f57';
    ctx.fillText('☀️ 광합성: 잎이 햇빛으로 양분을 만들어요', W/2, 26);
    if(cloudAmt>0.45){ ctx.font='bold 15px Noto Sans KR'; ctx.fillStyle='#7a818c'; ctx.fillText('☁ 구름이 해를 가려 양분이 적게 만들어져요', W/2, 50); }
    ctx.textAlign='left'; ctx.font='bold 15px Noto Sans KR'; ctx.fillStyle='#c79320';
    ctx.fillText('● 양분 → 뿌리·열매·잎', 12, H-12);
  });
  autoTour(gsteps, col);
};}

/* =========================================================================
   ✦ 동적 시뮬레이션 4 — 증산 작용 (trans)
   ========================================================================= */
function transBuilder(){return function(body,t,done){
  const col=t.col.c;
  body.innerHTML=`<div class="simwrap"><div id="cvHolder"></div>
    <div class="simside">
      <div class="controls">
        <button class="toggle on" id="stoT">🌿 기공: 열림</button>
        <button class="toggle on" id="sunT">☀️ 날씨: 맑음</button>
      </div>
      <div class="meter"><div class="m">공기 중으로 나간 수증기 <b id="vp">0</b></div></div>
      <div class="panel" style="padding:7px 12px; flex:1; display:flex; flex-direction:column; gap:5px;">
        <div style="font-family:'Jua'; color:var(--ink); font-size:22px">🔎 단계별 확인</div>
        <div class="check" id="check">
          <div class="ck" data-ck="rise"><span class="box">○</span><span>물이 줄기를 타고 잎으로 올라와요</span></div>
          <div class="ck" data-ck="vapor"><span class="box">○</span><span>기공으로 수증기가 빠져나가요</span></div>
          <div class="ck" data-ck="air"><span class="box">○</span><span>수증기가 공기 중으로 사라져요</span></div>
          <div class="ck" data-ck="close"><span class="box">○</span><span>기공을 닫으면 멈춰요</span></div>
        </div>
        <div class="hintline" id="hint">기공을 열고 맑은 날로 하면, 잎으로 올라온 물이 빠져나가요.</div>
      </div>
      <button class="navbtn sm ghost" id="guide">📖 차근차근 알아보기</button>
    </div></div>`;
  const cv=mkCanvas(document.getElementById('cvHolder'),400,400);
  const ctx=cv.ctx,W=cv.w,H=cv.h, S=W, cx=S*0.52, leafCy=S*0.34, stoY=S*0.46, potY=S*0.70;
  const bgImg=loadImg('scene_transpiration.png');
  let open=true, sun=true, cloudAmt=0, vapor=0, parts=[], frame=0;
  const stoT=document.getElementById('stoT'), sunT=document.getElementById('sunT');
  stoT.onclick=()=>{open=!open; stoT.classList.toggle('on',open); stoT.textContent='🌿 기공: '+(open?'열림':'닫힘');
    if(open)tick(body,'open'); else {tick(body,'close'); popModal('🌿','기공을 닫았어요','양쪽 <b>공변세포</b>가 오므라들어 가운데 <b>기공(구멍)</b>이 닫혔어요. 수증기가 빠져나가지 못해 <b>증산이 멈춰요</b>.',col); chk();}};
  sunT.onclick=()=>{sun=!sun; sunT.classList.toggle('on',sun); sunT.textContent=(sun?'☀️ 날씨: 맑음':'☁️ 날씨: 흐림');};
  document.getElementById('guide').onclick=guide;
  function drawCloud(x,y,s){ctx.fillStyle='#eef1f5';
    [[0,0,20],[-17,6,15],[17,6,16],[-6,-11,13],[9,-9,13]].forEach(c=>{ctx.beginPath(); ctx.arc(x+c[0]*s,y+c[1]*s,c[2]*s,0,7); ctx.fill();});}
  // 기공 확대 인셋(두 공변세포가 열리고 닫힘)
  function drawStomaInset(ox,oy,rad,isOpen){
    ctx.save();
    // 배경 원
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.strokeStyle='#bcd8c2'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(ox,oy,rad,0,7); ctx.fill(); ctx.stroke();
    // 두 공변세포 → 열리면 팽팽하게 부풀어 동그란 고리 모양, 닫히면 가는 틈으로 오므라듦
    const orx=isOpen?rad*0.62:rad*0.44, ory=rad*0.74;            // 공변세포 바깥 둘레
    const prx=isOpen?rad*0.23:rad*0.03, pry=isOpen?rad*0.48:rad*0.52; // 가운데 기공(구멍)
    // 공변세포(초록 고리): 바깥 타원에서 가운데 구멍을 뺌
    ctx.beginPath();
    ctx.ellipse(ox,oy,orx,ory,0,0,7);
    ctx.ellipse(ox,oy,prx,pry,0,0,7,true);      // 반대 방향 → 가운데가 구멍
    ctx.fillStyle='#5cb377'; ctx.fill('evenodd');
    ctx.strokeStyle='#2f7a4f'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.ellipse(ox,oy,orx,ory,0,0,7); ctx.stroke();
    // 가운데 기공(열리면 또렷한 구멍, 닫히면 가는 틈)
    ctx.fillStyle=isOpen?'#2b3a30':'#3f6b4f';
    ctx.beginPath(); ctx.ellipse(ox,oy,prx,pry,0,0,7); ctx.fill();
    ctx.strokeStyle='#2f7a4f'; ctx.lineWidth=1.6; ctx.stroke();
    // 두 공변세포가 맞닿는 위·아래 이음매
    ctx.strokeStyle='#2f7a4f'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ox,oy-ory); ctx.lineTo(ox,oy-pry); ctx.moveTo(ox,oy+pry); ctx.lineTo(ox,oy+ory); ctx.stroke();
    ctx.fillStyle='#2f7a4f'; ctx.font='bold 13px Noto Sans KR'; ctx.textAlign='center';
    ctx.fillText('기공 '+(isOpen?'열림':'닫힘'), ox, oy+rad+15); ctx.textAlign='left';
    ctx.restore();
  }
  const gsteps=[
    {art:'💧',title:'잎에 온 물은?',body:'뿌리가 빨아들인 물이 줄기를 타고 <b>잎</b>까지 올라와요. 그중 일부는 잎의 작은 구멍 <b>기공</b>으로 빠져나가요.'},
    {art:'💨',title:'수증기로 빠져나가요',body:'기공으로 나온 물은 <b>수증기</b>가 되어 <b>공기 중으로 사라져요</b>. 이것을 <b>증산 작용</b>이라고 해요.'},
    {art:'🌿',title:'직접 해 보기',body:'<b>기공</b>과 <b>날씨</b>를 바꾸며, 잎으로 올라온 물이 기공으로 빠져나가 공기 중으로 사라지는 모습을 관찰해요!'}
  ];
  function guide(){openModal(gsteps,{color:col});}
  function chk(){if(allTicked(body)){document.getElementById('hint').textContent='👍 모든 단계 확인! ‘다음’으로 넘어가요.'; done();}}
  loop(()=>{ frame++;
    const active=open&&sun;
    cloudAmt += ((sun?0:1)-cloudAmt)*0.028;   // 천천히 몰려옴
    if(frame%16===0) parts.push({ph:'rise',x:cx+(Math.random()-.5)*6,y:potY,a:1});
    for(const p of parts){
      if(p.ph==='rise'){p.y-=1.8; if(p.y<=leafCy){p.ph='leaf'; p.y=leafCy; p.t=0; tick(body,'rise'); chk();}}
      else if(p.ph==='leaf'){p.t++; p.x+=(cx-p.x)*0.02;
        if(active && p.t>30){p.ph='vapor'; p.x=cx+(Math.random()-.5)*40; p.y=stoY; p.r=7; vapor++; tick(body,'vapor');
          document.getElementById('vp').textContent=vapor; chk();}}
      else if(p.ph==='vapor'){p.y-=1.7; p.x+=Math.sin(p.y*0.06)*1.0; p.r=Math.min(17,(p.r||7)+0.12); p.a-=0.010;
        if(p.y<40 || p.a<=0){tick(body,'air'); chk(); p.dead=1;}}
    }
    parts=parts.filter(p=>!p.dead);
    // ---- draw ----
    ctx.clearRect(0,0,W,H);
    if(imgReady(bgImg)) ctx.drawImage(bgImg,0,0,W,H);
    else { const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,sun?'#eaf6ff':'#dfe4ea'); bg.addColorStop(1,'#eef8ea'); ctx.fillStyle=bg; ctx.fillRect(0,0,W,H); }
    if(cloudAmt>0.01){ ctx.fillStyle='rgba(150,160,175,'+(cloudAmt*0.2)+')'; ctx.fillRect(0,0,W,H*0.62);
      drawCloud(64+(1-cloudAmt)*180, 52, 2.3); }   // 오른쪽에서 해(왼쪽 위)로 천천히 몰려와 크게 가림
    // 잎의 기공(작은 표시) + 확대 인셋
    ctx.fillStyle= open?'#1f5e3a':'#7fb795';
    for(let i=-2;i<=2;i++){ctx.beginPath(); ctx.ellipse(cx+i*13,stoY, open?4:1.6, 2.6,0,0,7); ctx.fill();}
    ctx.strokeStyle='#2f7a4f'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx+30,stoY); ctx.lineTo(W-112,72); ctx.stroke();
    drawStomaInset(W-64, 72, 44, open);
    // 입자 (물=파랑 점, 수증기=옅은 큰 김이 위로 올라가며 사라짐)
    for(const p of parts){
      if(p.ph==='vapor'){const r=p.r||7; ctx.globalAlpha=Math.max(0,p.a*0.75);
        ctx.fillStyle='#aed4ea'; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,7); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(p.x-r*0.3,p.y-r*0.3,r*0.4,0,7); ctx.fill(); ctx.globalAlpha=1;}
      else {ctx.fillStyle='#2f88d4'; ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,7); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.75)'; ctx.beginPath(); ctx.arc(p.x-0.9,p.y-0.9,1.1,0,7); ctx.fill();}}
    // 상태 배너 — 열림/닫힘 차이를 확실히
    if(active){ctx.font='26px serif'; ctx.globalAlpha=.9; ctx.textAlign='left'; ctx.fillText('💨',cx-20,stoY-14); ctx.fillText('💨',cx+8,stoY-20); ctx.globalAlpha=1;}
    ctx.textAlign='center'; ctx.font='bold 17px Noto Sans KR';
    if(active){ctx.fillStyle='#2f8f57'; ctx.fillText('💨 증산 활발! 물이 수증기로 나가요',W/2,26);}
    else if(!open){ctx.fillStyle='#c0663a'; ctx.fillText('⏸ 기공을 닫아 증산이 멈췄어요',W/2,26);}
    else {ctx.fillStyle='#7a818c'; ctx.fillText('☁ 흐린 날 — 증산이 약해요',W/2,26);}
    ctx.textAlign='left';
  });
  if(open)tick(body,'open');
  autoTour(gsteps, col);
};}

/* =========================================================================
   꽃 — 이름표 붙이기 (SVG) + 모달 스캐폴딩

    </div>
    <div class="simside">
      <div style="font-size:28px;font-weight:700;color:var(--ink)">🏷️ 이름표를 누른 뒤, 꽃에서 알맞은 자리를 누르세요.</div>

      </div>
      <div class="fbk good" id="ff" style="min-height:24px"></div>

function saveNoteJPG(rows){
  const W=920, H=130+rows.length*88;
  const c=document.createElement('canvas'); c.width=W; c.height=H; const x=c.getContext('2d');
  x.fillStyle='#fffaf0'; x.fillRect(0,0,W,H);
  x.fillStyle='#f4e4bf'; x.fillRect(0,0,W,84);
  x.fillStyle='#5b4634'; x.textAlign='left'; x.textBaseline='alphabetic';
  x.font='bold 40px "Noto Sans KR", sans-serif'; x.fillText('📒 나의 식물 관찰 노트', 30, 56);
  rows.forEach((r,i)=>{const y=150+i*88;
    x.font='42px serif'; x.fillText(r.icon, 32, y+12);
    x.fillStyle='#2c7a4d'; x.font='bold 32px "Noto Sans KR", sans-serif'; x.fillText(r.name, 96, y+6);
    x.fillStyle='#977a5b'; x.font='28px "Noto Sans KR", sans-serif'; x.fillText('→', 230, y+6);
    x.fillStyle='#5b4634'; x.font='27px "Noto Sans KR", sans-serif'; x.fillText(r.fn, 280, y+6);
    x.strokeStyle='#e7d4ab'; x.lineWidth=2; x.beginPath(); x.moveTo(30,y+34); x.lineTo(W-30,y+34); x.stroke();
  });
  try{ const url=c.toDataURL('image/jpeg',0.92);
    const a=document.createElement('a'); a.href=url; a.download='식물_관찰_노트.jpg';
    document.body.appendChild(a); a.click(); a.remove(); }catch(e){}
}

/* 공용: 이름표 붙이기 활동 */
function labelActivity(body,t,done,opts){
  const col=t.col.c;
  body.innerHTML=`<div class="simwrap">
    <div class="panel" style="flex:0 0 auto; width:430px; padding:8px; display:flex; align-items:center; justify-content:center;">${opts.svg}</div>
    <div class="simside">
      <div style="font-size:23px;font-weight:700;color:var(--ink)">${opts.intro}</div>
      <div id="labels" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
      <div class="fbk good" id="ff" style="min-height:24px"></div>
      <div class="panel" style="padding:7px 12px; flex:1;">
        <div class="check" id="check">${opts.parts.map(p=>`<div class="ck" data-ck="${p.id}"><span class="box">○</span><span>${p.label}</span></div>`).join('')}</div>
      </div>
      <button class="navbtn sm ghost" id="guide">📖 차근차근 알아보기</button>
    </div></div>`;
  const lab=body.querySelector('#labels'); let sel=null, placed=0;
  [...opts.parts].sort(()=>Math.random()-.5).forEach(p=>{const b=document.createElement('button');
    b.className='tag'; b.style.cursor='pointer'; b.textContent=p.label; b.dataset.id=p.id;
    b.onclick=()=>{lab.querySelectorAll('.tag').forEach(x=>x.style.outline=''); sel=b; b.style.outline='3px solid '+col;};
    lab.appendChild(b);});
  body.querySelectorAll('.slot').forEach(s=>s.onclick=()=>{ if(!sel||s.dataset.done)return;
    const fb=body.querySelector('#ff');
    if(sel.dataset.id===s.dataset.id){ s.dataset.done=1; s.setAttribute('fill','#fff'); s.setAttribute('stroke-dasharray','');
      const tx=body.querySelector(`text.slotxt[data-id="${s.dataset.id}"]`); if(tx)tx.textContent=sel.textContent;
      const p=opts.parts.find(x=>x.id===s.dataset.id); fb.className='fbk good'; fb.innerHTML=`✅ <b>${p.label}</b>: ${p.desc}`;
      tick(body,s.dataset.id); sel.remove(); sel=null; placed++;
      if(placed===opts.parts.length){fb.innerHTML='🎉 모두 찾았어요!'; done();}
    }else{fb.className='fbk bad'; fb.textContent='그 자리가 아니에요. 다시 살펴볼까요?'; s.animate([{r:14},{r:18},{r:14}],{duration:250});}});
  const gb=body.querySelector('#guide');
  if(opts.guide){ gb.onclick=()=>openModal(opts.guide,{color:col});
    autoTour(opts.guide, col); }
  else gb.style.display='none';
}

/* 기공과 증산 작용 — 공변세포 그림 + 카드 넘기기 */
function stomataInfo(body,t,done){
  const col=t.col.c;
  // 공변세포 둘레에 육각형 식물 세포들 (벌집 모양 타일)
  function hex(cx,cy,r){const p=[];for(let k=0;k<6;k++){const a=Math.PI/6+k*Math.PI/3; p.push(`${(cx+Math.cos(a)*r).toFixed(1)},${(cy+Math.sin(a)*r).toFixed(1)}`);}return `<polygon points="${p.join(' ')}" fill="#cfe9d5" stroke="#7bbf8c" stroke-width="2"/>`;}
  const hexes=(()=>{ let s=''; const r=27, dx=r*1.732, dy=r*1.5;
    let ri=0; for(let y=24; y<=232; y+=dy){ const x0=(ri%2?dx/2:0)+6; for(let x=x0; x<=216; x+=dx){ s+=hex(x,y,r); } ri++; }
    return s; })();
  const stoma=`<img src="img/stomata.png" style="width:100%;height:100%;max-height:330px;object-fit:contain;display:block">`;
  const cards=[
    {art:'💨',title:'증산 작용이란?',sub:'잎의 기공으로 물이 수증기가 되어 빠져나가는 것을 증산 작용이라고 해요.'},
    {art:'⬆️',title:'물 끌어올리기',sub:'잎에서 물이 빠져나가면 그 힘으로 뿌리의 물을 줄기 위로 끌어올려요.'},
    {art:'🌡️',title:'온도 낮추기',sub:'물이 증발하면서 더운 날 식물의 온도를 시원하게 낮춰 줘요.'}
  ];
  let i=0;
  body.innerHTML=`<div class="simwrap">
    <div class="panel" style="flex:0 0 auto; width:300px; padding:8px; display:flex; align-items:center; justify-content:center;">${stoma}</div>
    <div class="simside">
      <div id="dots"></div>
      <div id="cardbox" style="flex:1; min-height:0; overflow:auto; display:flex; flex-direction:column; justify-content:center;"></div>
      <div class="fbk good" id="sdone" style="min-height:24px"></div>
    </div></div>`;
  // 설명 안에서 다음으로 넘어가는 버튼(하얀 박스 안, 아웃라인 스타일 — 파란 '다음' 페이지 버튼과 구분)
  const navBtn=(id,label)=>`<button class="navbtn sm ghost" id="${id}" style="align-self:flex-end; color:${col}; border-color:${col}; margin-top:2px">${label}</button>`;
  function render(){
    const box=body.querySelector('#cardbox');
    const last=i===cards.length;
    body.querySelector('#dots').innerHTML=[...Array(cards.length+1)].map((_,k)=>`<i style="width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:6px;background:${k<=i?col:'#e2cfa6'}"></i>`).join('');
    if(!last){
      const c=cards[i];
      box.innerHTML=`<div class="panel" style="padding:16px 18px; display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center;">
        <div style="font-size:64px">${c.art}</div>
        <div style="font-family:'Jua'; font-size:39px; color:${col}; line-height:1.15">${c.title}</div>
        <div style="font-size:30px; font-weight:700; line-height:1.35; color:var(--ink)">${c.sub}</div>
        ${navBtn('snext', i===cards.length-1?'정리 보기 ▶':'다음 ▶')}</div>`;
      body.querySelector('#sdone').textContent='';
    }else{
      // 정리 — 하나의 박스 안에 모아서
      box.innerHTML=`<div class="panel" style="padding:14px 18px; display:flex; flex-direction:column; gap:8px;">
        <div style="font-family:'Jua'; font-size:26px; color:var(--ink); margin-bottom:2px; text-align:center">📌 증산 작용 정리</div>
        ${cards.map((c,k)=>`<div style="display:flex; align-items:center; gap:12px; text-align:left; padding:7px 2px; ${k<cards.length-1?'border-bottom:2px dashed #e7d4ab;':''}">
          <span style="font-size:32px; flex:0 0 auto">${c.art}</span>
          <span style="flex:1"><b style="font-family:'Jua'; font-size:25px; color:${col}">${c.title}</b><br><span style="font-size:19px; font-weight:700; color:var(--ink); line-height:1.3">${c.sub}</span></span></div>`).join('')}
        ${navBtn('snext','처음부터 다시 ↺')}</div>`;
      body.querySelector('#sdone').textContent='🎉 기공과 증산 작용을 모두 살펴봤어요!';
      done();
    }
    body.querySelector('#snext').onclick=()=>{ i=(i+1)%(cards.length+1); render(); };
  }
  render();
}

    body.querySelector('#dots').innerHTML=[...Array(steps.length+1)].map((_,k)=>`<i style="width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:6px;background:${k<=i?col:'#e2cfa6'}"></i>`).join('');
    if(!last){
      body.querySelector('#fstage').innerHTML=svg(i);
      box.innerHTML=`<div class="panel" style="padding:16px 18px; display:flex; flex-direction:column; gap:10px; text-align:center;">
        <div style="font-family:'Jua'; font-size:36px; color:${col}; line-height:1.15">${steps[i].title}</div>
        <div style="font-size:28px; font-weight:700; line-height:1.4; color:var(--ink)">${steps[i].desc}</div>
        ${navBtn(i===steps.length-1?'정리 보기 ▶':'다음 단계 ▶')}</div>`;
      body.querySelector('#fdone').textContent='';
    }else{
      body.querySelector('#fstage').innerHTML=svg(steps.length-1);
      box.innerHTML=`<div class="panel" style="padding:12px 16px; display:flex; flex-direction:column; gap:4px;">
        <div style="font-family:'Jua'; font-size:23px; color:var(--ink); margin-bottom:2px; text-align:center">📌 꽃이 열매가 되는 과정 정리</div>
        ${steps.map((s,k)=>`<div style="display:flex; align-items:center; gap:10px; text-align:left; padding:5px 2px; ${k<steps.length-1?'border-bottom:2px dashed #e7d4ab;':''}">
          <span style="flex:1"><b style="font-family:'Jua'; font-size:20px; color:${col}">${s.title}</b><br><span style="font-size:16px; font-weight:700; color:var(--ink); line-height:1.3">${s.desc}</span></span></div>`).join('')}
        ${navBtn('처음부터 다시 ↺')}</div>`;
      body.querySelector('#fdone').textContent='🎉 꽃이 열매가 되는 과정을 모두 살펴봤어요!';
      done();
    }
    body.querySelector('#fnext').onclick=()=>{ i=(i+1)%(steps.length+1); render(); };
  }
  render();
}
