<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도형 왕국의 잃어버린 일지 - 각기둥과 각뿔</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Single+Day&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        /* 학교안심 칠판지우개체 (KCC/노눈에서 배포한 무료 폰트) */
        @font-face {
            font-family: 'HakgyoansimChalk';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/HakgyoansimChilpanjiugeTTF-R.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'HakgyoansimChalk';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/HakgyoansimChilpanjiugeTTF-B.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        html { font-size: 22px; height: 100%; }

        body {
            font-family: 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 50%, #fecaca 100%);
            color: #1e293b;
            /* 한글 단어 단위 줄바꿈 - 단어 중간 끊김 방지 */
            word-break: keep-all;
            overflow-wrap: break-word;
            line-break: strict;
        }

        /* 모든 한글 텍스트 단어 단위 줄바꿈 + 폰트 통일 */
        p, h1, h2, h3, h4, h5, h6, span, div, button, label, td, th, li, a, input, textarea {
            font-family: 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            word-break: keep-all;
            line-break: strict;
        }

        /* 제목 전용 - 진짜 주아체 */
        .font-jua {
            font-family: 'Jua', 'HakgyoansimChalk', 'Gowun Dodum', 'Noto Sans KR', sans-serif !important;
            font-weight: 400;
            letter-spacing: -0.01em;
        }
        .font-gaegu {
            font-family: 'HakgyoansimChalk', 'Single Day', 'Gowun Dodum', sans-serif !important;
            font-weight: 400;
        }
        /* 대화(font-gaegu) 안의 span/p/b 등이 전역 span 규칙 때문에 다른 글씨체로 빠지지 않도록
           항상 부모(대화) 글씨체를 따라가게 함 - 경비 아저씨처럼 span으로 감싼 대화도 동일하게 보임 */
        .font-gaegu span, .font-gaegu p, .font-gaegu b, .font-gaegu strong, .font-gaegu em, .font-gaegu div {
            font-family: inherit !important;
        }

        /* 스크롤바 완전히 숨김 */
        ::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        .font-jua { font-family: 'Jua', sans-serif; }
        .font-gaegu { font-family: 'Gaegu', cursive; font-weight: 700; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

        .paper-bg {
            background-color: #fef9e7;
            background-image:
                linear-gradient(90deg, rgba(180, 140, 80, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(180, 140, 80, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .map-bg {
            background-color: #fef3c7;
            background-image: radial-gradient(circle at 20% 30%, rgba(217, 119, 6, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(190, 18, 60, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 90%, rgba(5, 150, 105, 0.06) 0%, transparent 40%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .stamp-shadow {
            box-shadow: 4px 4px 0px 0px rgba(120, 53, 15, 0.3);
        }

        .stamp-shadow-deep {
            box-shadow: 6px 6px 0px 0px rgba(120, 53, 15, 0.4);
        }

        .ink-border {
            border: 3px solid #78350f;
        }

        .ink-border-dashed {
            border: 3px dashed #78350f;
        }

        /* 핵심 단어 형광펜 하이라이트 (글씨체는 주변 텍스트를 그대로 따라감) */
        .hl-key {
            font-family: inherit;
            background: linear-gradient(transparent 52%, #fde047 52%);
            padding: 0 2px;
            font-weight: 700;
            border-radius: 2px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .floating { animation: float 3s ease-in-out infinite; }

        @keyframes stamp-in {
            0% { transform: scale(3) rotate(-30deg); opacity: 0; }
            60% { transform: scale(0.9) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(-12deg); opacity: 0.85; }
        }

        .stamp-in { animation: stamp-in 0.6s ease-out forwards; }

        /* 부분 버튼을 누르면: 가운데에서 크게 떠서 충분히 읽을 시간을 준 뒤, 오른쪽 위(마을 어른 말주머니 쪽)로 날아가며 사라짐 */
        @keyframes pop-then-park {
            0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            8%   { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
            14%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            80%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(120%, -85%) scale(0.3); opacity: 0; }
        }
        .pop-then-park { animation: pop-then-park 3.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease-in-out; }

        .draggable-card {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .draggable-card:active { cursor: grabbing; }

        .drop-zone-active {
            background: rgba(251, 191, 36, 0.15) !important;
            border-color: #d97706 !important;
            transform: scale(1.02);
        }

        * { transition: background-color 0.2s, border-color 0.2s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s; }

        /* 오른쪽 탭 아이콘 - 어떤 아이콘이든 고정 크기 상자에 가둬 글씨와 겹치지 않게 함 */
        .tab-ico {
            flex: 0 0 24px;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .tab-ico > span {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tab-ico svg { width: 22px !important; height: 22px !important; }
    </style>

        // ============ ERROR BOUNDARY (빈 화면 방지 - 에러를 잡아 메시지 표시) ============
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMsg: '' };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorMsg: (error && error.message) ? error.message : String(error) };
            }
            componentDidCatch(error, info) {
                console.error('ErrorBoundary caught:', error, info);
            }
            componentDidUpdate(prevProps) {
                // 자식이 바뀌면 (예: step 변경) 에러 상태 리셋
                if (this.state.hasError && prevProps.resetKey !== this.props.resetKey) {
                    this.setState({ hasError: false, errorMsg: '' });
                }
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="h-full flex items-center justify-center p-6 paper-bg">
                            <div className="bg-white ink-border rounded-2xl p-6 max-w-xl stamp-shadow">
                                <div className="text-5xl mb-2 text-center">⚠</div>
                                <h2 className="font-jua text-xl text-amber-900 mb-2 text-center">앗, 화면을 그리다 문제가 생겼어요</h2>
                                <div className="bg-amber-50 p-3 rounded-lg border-2 border-amber-300 mb-3">
                                    <p className="text-sm text-amber-800 font-mono break-all whitespace-pre-wrap">{this.state.errorMsg}</p>
                                </div>
                                <button onClick={() => this.setState({ hasError: false, errorMsg: '' })}
                                    className="w-full px-4 py-2 bg-amber-700 text-white rounded-lg font-jua hover:bg-amber-800">
                                    다시 시도
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============ ICON WRAPPER ============
        // lucide.createIcons가 span을 SVG로 교체하는 동작이 React와 충돌하므로
        // 임시 컨테이너에서 SVG를 생성한 후 dangerouslySetInnerHTML로 안전하게 삽입
        const iconCache = {};
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const [svgHtml, setSvgHtml] = useState(() => iconCache[name + '|' + className] || '');
            useEffect(() => {
                const cacheKey = name + '|' + className;
                if (iconCache[cacheKey]) { setSvgHtml(iconCache[cacheKey]); return; }
                try {
                    if (typeof lucide === 'undefined' || !lucide.icons || !lucide.icons[name]) {
                        setSvgHtml('');
                        return;
                    }
                    // 임시 컨테이너에 span 만들고 lucide로 SVG 생성 후 추출
                    const temp = document.createElement('div');
                    temp.style.position = 'absolute';
                    temp.style.left = '-9999px';
                    const span = document.createElement('span');
                    span.setAttribute('data-lucide', name);
                    temp.appendChild(span);
                    document.body.appendChild(temp);
                    try {
                        lucide.createIcons({
                            icons: { [name]: lucide.icons[name] },
                            attrs: { class: className },
                            nameAttr: 'data-lucide'
                        });
                        const svg = temp.querySelector('svg');
                        if (svg) {
                            svg.setAttribute('class', className);
                            const html = svg.outerHTML;
                            iconCache[cacheKey] = html;
                            setSvgHtml(html);
                        }
                    } finally {
                        try { document.body.removeChild(temp); } catch (e) {}
                    }
                } catch (e) {
                    console.warn('Lucide icon render skipped:', name, e);
                }
            }, [name, className]);
            return <span className={className} dangerouslySetInnerHTML={{__html: svgHtml}} />;
        };

        // ============ 시트 연결 ============
        // 앱 화면은 한 곳에 배포되고, 각 선생님은 자신의 시트 사본에 연결된

        //  - 브라우저에 저장된 주소가 있으면 그 시트에 연결됩니다.
        //  - 둘 다 없으면 체험 모드로 동작합니다.
        //  - 명단은 시트 '학생명단' 탭에서 읽어와 드롭다운으로 보여줍니다(getStudentList).
        const ShapeAPI = (function () {
            // 세 가지 접속 상태를 주소만으로 자동 판별합니다.
            //  1) 학생용 링크(#c=)로 접속  2) 브라우저에 저장된 주소  3) 둘 다 없음(체험)
            function readConnection() {
                // (1) 학생용 링크: 주소 뒤 #c=... 부분
                try {
                    var hash = location.hash || '';
                    var m = hash.match(/[#&]c=([^&]+)/);
                    if (m && m[1]) return { url: decodeURIComponent(m[1]), viaLink: true };
                } catch (e) {}
                // (구버전 링크 호환) 주소 뒤 ?api=... 부분도 학생용 링크로 인정
                try {
                    var fromQuery = new URLSearchParams(location.search).get('api');
                    if (fromQuery) return { url: fromQuery, viaLink: true };
                } catch (e) {}
                // (2) 브라우저에 저장된 주소
                try {
                    var saved = localStorage.getItem('shapeApiUrl') || '';
                    if (saved) return { url: saved, viaLink: false };
                } catch (e) {}
                // (3) 둘 다 없음
                return { url: '', viaLink: false };
            }

            var conn = readConnection();
            var apiUrl = conn.url;
            var viaLink = conn.viaLink;   // 학생용 링크로 들어온 경우 true → 선생님 설정을 감춤

            function call(action, params) {
                return new Promise(function (resolve, reject) {
                    if (!apiUrl) { reject(new Error('연결된 시트가 없습니다.')); return; }
                    var cb = 'shapeCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
                    var script = document.createElement('script');
                    var timer = setTimeout(function () { cleanup(); reject(new Error('시간 초과')); }, 12000);
                    function cleanup() {
                        clearTimeout(timer);
                        try { delete window[cb]; } catch (e) { window[cb] = undefined; }
                        if (script.parentNode) script.parentNode.removeChild(script);
                    }
                    window[cb] = function (data) { cleanup(); resolve(data); };
                    var qs = Object.keys(params || {}).map(function (k) {
                        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
                    });
                    qs.unshift('action=' + encodeURIComponent(action));
                    qs.push('callback=' + cb);
                    script.src = apiUrl + (apiUrl.indexOf('?') >= 0 ? '&' : '?') + qs.join('&');
                    script.onerror = function () { cleanup(); reject(new Error('네트워크 오류')); };
                    document.body.appendChild(script);
                });
            }

            return {
                isConnected: function () { return !!apiUrl; },
                // 학생용 링크로 접속했는지 여부 (true면 선생님 설정 버튼을 화면에 만들지 않습니다)
                isViaLink: function () { return viaLink; },
                getApiUrl: function () { return apiUrl; },
                setApiUrl: function (url) {
                    apiUrl = (url || '').trim();
                    // 선생님이 앱에서 직접 연결하면 학생용 링크 상태가 아니게 됩니다.
                    viaLink = false;
                    try {
                        if (apiUrl) localStorage.setItem('shapeApiUrl', apiUrl);
                        else localStorage.removeItem('shapeApiUrl');
                    } catch (e) {}
                },
                // '학생명단' 탭에서 명단을 읽어옵니다 (드롭다운 채우기용)
                getStudentList: function () {
                    return call('list', {}).then(function (d) { return (d && d.students) || []; });
                },
                recordMission: function (name, mission) {
                    return call('record', { name: name, mission: mission });
                }
            };
        })();

        // ============ 체험 모드: 진행 상태를 저장하지 않음 ============
        // 체험 모드에서는 학생이 나갔다 다시 들어오면 처음부터 시작합니다.
        // (혹시 예전에 저장된 값이 남아 있으면 입장할 때 지웁니다.)
        const APP_ID = 'shape-kingdom';
        const progressKey = (name) => 'progress:' + APP_ID + ':' + name;
        const clearProgress = (name) => {
            try { localStorage.removeItem(progressKey(name)); } catch (e) {}
        };

        // 분류 활동용 - 각기둥과 각뿔만 (원기둥, 원뿔은 2학기 과정)
        const CLASSIFY_ITEMS = [
            { id: 'c1', name: '삼각기둥', kind: 'prism', shape: PRISMS[0], color: 0xf59e0b },
            { id: 'c2', name: '삼각뿔', kind: 'pyramid', shape: PYRAMIDS[0], color: 0xec4899 },
            { id: 'c3', name: '사각기둥', kind: 'prism', shape: PRISMS[1], color: 0x10b981 },
            { id: 'c4', name: '사각뿔', kind: 'pyramid', shape: PYRAMIDS[1], color: 0xef4444 },
            { id: 'c5', name: '오각기둥', kind: 'prism', shape: PRISMS[2], color: 0x0ea5e9 },
            { id: 'c6', name: '오각뿔', kind: 'pyramid', shape: PYRAMIDS[2], color: 0x8b5cf6 },
        ];

        const onlyKorean = (val) => val.replace(/[^ㄱ-ㅎㅏ-ㅣ가-힣0-9\s]/g, '').trim();

        // n각형(밑면) BufferGeometry - Three.js CylinderGeometry/ConeGeometry는 x=sin*r, z=cos*r 순서
        const createNgonGeometry = (radius, n) => {
            const geometry = new THREE.BufferGeometry();
            const vertices = [0, 0, 0]; // 중심점
            const indices = [];
            for (let i = 0; i < n; i++) {
                const a = (i / n) * Math.PI * 2;
                vertices.push(Math.sin(a) * radius, 0, Math.cos(a) * radius);
            }
            for (let i = 0; i < n; i++) {
                indices.push(0, i + 1, ((i + 1) % n) + 1);
            }
            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.computeVertexNormals();
            return geometry;
        };

        // 접기 애니메이션용 n각형: 한 변이 X축 (-sideLen/2 ~ +sideLen/2)에 있고 polygon이 +Y 방향으로 연장
        const createNgonForHinge = (radius, n) => {
            const apothem = radius * Math.cos(Math.PI / n);
            const geometry = new THREE.BufferGeometry();
            const vertices = [0, apothem, 0]; // 중심 (Y+ 방향 apothem 거리)
            const indices = [];
            const a0 = -Math.PI / 2 - Math.PI / n;
            for (let i = 0; i < n; i++) {
                const a = a0 + i * (2 * Math.PI / n);
                vertices.push(radius * Math.cos(a), apothem + radius * Math.sin(a), 0);
            }
            for (let i = 0; i < n; i++) {
                indices.push(0, i + 1, ((i + 1) % n) + 1);
            }
            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.computeVertexNormals();
            return geometry;
        };

        // 색상 어둡게 (옆면 강조용)
        const darkenColor = (hex, factor = 0.55) => {
            const r = ((hex >> 16) & 0xff) * factor;
            const g = ((hex >> 8) & 0xff) * factor;
            const b = (hex & 0xff) * factor;
            return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
        };
        // 색상 밝게 (메인 mesh 색용 - 옅은 파스텔)
        const lightenColor = (hex, factor = 0.75) => {
            const r = (hex >> 16) & 0xff;
            const g = (hex >> 8) & 0xff;
            const b = hex & 0xff;
            const nr = Math.round(r + (255 - r) * factor);
            const ng = Math.round(g + (255 - g) * factor);
            const nb = Math.round(b + (255 - b) * factor);
            return (nr << 16) | (ng << 8) | nb;
        };

        // ============ 3D VIEWER (겨냥도 스타일) ============
        // 보이는 모서리: 검은 실선 / 가려진 모서리: 검은 점선 / 면: 옅은 fill
        // highlight: 'base'|'side'|'vertex'|'edge'|'none'
        function Shape3DViewer({ shape, color = 0xf59e0b, highlight = 'none', special = null, interactive = false, onPartClick = null }) {
            const mountRef = useRef(null);
            const stateRef = useRef({});
            const cbRef = useRef(onPartClick);
            cbRef.current = onPartClick;  // 최신 콜백 유지 (재초기화 방지)

            useEffect(() => {
                let renderer, scene, camera, group, frameId, ro;
                let isMounted = true;
                let initialized = false;
                let geo = null, mat = null;
                const disposables = [];

                const initThree = (w, h) => {
                    if (initialized || !mountRef.current) return;
                    // 기존 canvas만 안전하게 제거 (React 관리 children은 절대 건드리지 않음)
                    const oldCanvases = mountRef.current.querySelectorAll('canvas');
                    oldCanvases.forEach(c => {
                        try { if (c.parentNode === mountRef.current) mountRef.current.removeChild(c); } catch (e) {}
                    });
                    scene = new THREE.Scene();
                    scene.background = null;
                    camera = new THREE.PerspectiveCamera(38, w / h, 0.1, 1000);
                    camera.position.set(0, 1.4, 5.5);
                    camera.lookAt(0, 0, 0);

                    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.setSize(w, h);
                    mountRef.current.appendChild(renderer.domElement);

                    scene.add(new THREE.AmbientLight(0xffffff, 0.95));

                    group = new THREE.Group();
                    scene.add(group);

                    const r = 1.3, ht = 2.4;
                    if (special === 'cylinder') {
                        geo = new THREE.CylinderGeometry(r, r, ht, 32);
                    } else if (special === 'cone') {
                        geo = new THREE.ConeGeometry(r, ht, 32);
                    } else if (shape.type === 'prism') {
                        geo = new THREE.CylinderGeometry(r, r, ht, shape.n);
                    } else if (shape.type === 'pyramid') {
                        geo = new THREE.ConeGeometry(r, ht, shape.n);
                    }
                    disposables.push(geo);

                    // ============ 진짜 겨냥도 렌더링 ============
                    // 흐름: mesh 그림 → 점선 그림(모든 모서리) → 실선 그림(보이는 모서리만)
                    // - mesh는 불투명이라 depth 정확히 작성됨
                    // - 점선은 depthTest off로 mesh 위에 모든 모서리 그려짐
                    // - 실선은 depthTest on + polygonOffset으로 mesh보다 살짝 앞 → 보이는 부분만 그려져 점선 위 덮음
                    // - 가려진 부분: 점선만 남음
                    const meshColor = lightenColor(color, 0.78);
                    mat = new THREE.MeshBasicMaterial({
                        color: meshColor,
                        side: THREE.DoubleSide,
                        polygonOffset: true,
                        polygonOffsetFactor: 1.0,
                        polygonOffsetUnits: 1.0
                    });
                    disposables.push(mat);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.renderOrder = 0;
                    group.add(mesh);

                    const edges = new THREE.EdgesGeometry(geo);
                    disposables.push(edges);

                    // 점선 (가려진 모서리용) - depthTest off라 mesh 위에 항상 그려짐, renderOrder로 mesh 다음
                    const dashedMat = new THREE.LineDashedMaterial({
                        color: 0x1e293b,
                        dashSize: 0.11,
                        gapSize: 0.07,
                        depthTest: false,
                        depthWrite: false
                    });
                    disposables.push(dashedMat);
                    const dashedLines = new THREE.LineSegments(edges, dashedMat);
                    dashedLines.computeLineDistances();
                    dashedLines.renderOrder = 1;
                    group.add(dashedLines);

                    // 실선 (보이는 모서리용) - depthTest on, mesh가 polygonOffset으로 뒤로 가서 line이 앞에
                    const solidMat = new THREE.LineBasicMaterial({
                        color: 0x0f172a,
                        linewidth: 2
                    });
                    disposables.push(solidMat);
                    const solidLines = new THREE.LineSegments(edges, solidMat);
                    solidLines.renderOrder = 2;
                    group.add(solidLines);

                    // ============ 하이라이트 처리 ============

                    // 옆면 강조 - 메인 색의 진한 버전 (각기둥=초록, 각뿔=분홍 계열 유지)
                    if (highlight === 'side' && !special && !interactive) {
                        const sideColor = darkenColor(color, 0.55);
                        const sideMat = new THREE.MeshBasicMaterial({
                            color: sideColor,
                            side: THREE.DoubleSide,
                            transparent: true,
                            opacity: 0.85,
                            polygonOffset: true,
                            polygonOffsetFactor: -1,
                            polygonOffsetUnits: -1
                        });
                        disposables.push(sideMat);
                        if (shape.type === 'prism') {
                            // 각 옆면(직사각형)을 별도 mesh로
                            for (let i = 0; i < shape.n; i++) {
                                const a1 = (i / shape.n) * Math.PI * 2;
                                const a2 = ((i + 1) / shape.n) * Math.PI * 2;
                                const x1 = Math.sin(a1) * r, z1 = Math.cos(a1) * r;
                                const x2 = Math.sin(a2) * r, z2 = Math.cos(a2) * r;
                                const sGeo = new THREE.BufferGeometry();
                                const verts = new Float32Array([
                                    x1, ht/2, z1,  x2, ht/2, z2,
                                    x2, -ht/2, z2, x1, -ht/2, z1
                                ]);
                                sGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                                sGeo.setIndex([0, 1, 2, 0, 2, 3]);
                                sGeo.computeVertexNormals();
                                disposables.push(sGeo);
                                group.add(new THREE.Mesh(sGeo, sideMat));
                            }
                        } else if (shape.type === 'pyramid') {
                            // 각 옆면(삼각형)
                            for (let i = 0; i < shape.n; i++) {
                                const a1 = (i / shape.n) * Math.PI * 2;
                                const a2 = ((i + 1) / shape.n) * Math.PI * 2;
                                const x1 = Math.sin(a1) * r, z1 = Math.cos(a1) * r;
                                const x2 = Math.sin(a2) * r, z2 = Math.cos(a2) * r;
                                const sGeo = new THREE.BufferGeometry();
                                const verts = new Float32Array([
                                    0, ht/2, 0,
                                    x1, -ht/2, z1,
                                    x2, -ht/2, z2
                                ]);
                                sGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                                sGeo.setIndex([0, 1, 2]);
                                sGeo.computeVertexNormals();
                                disposables.push(sGeo);
                                group.add(new THREE.Mesh(sGeo, sideMat));
                            }
                        }
                    }

                    // 밑면 강조 - 노란색 (옆면과 명확히 구분되는 강조색)
                    if (highlight === 'base' && !special && !interactive) {
                        const baseGeo = createNgonGeometry(r, shape.n);
                        disposables.push(baseGeo);
                        const baseMat = new THREE.MeshBasicMaterial({
                            color: 0xfbbf24,
                            side: THREE.DoubleSide,
                            transparent: true,
                            opacity: 0.9,
                            polygonOffset: true,
                            polygonOffsetFactor: -2,
                            polygonOffsetUnits: -2
                        });
                        disposables.push(baseMat);
                        if (shape.type === 'prism') {
                            const topMesh = new THREE.Mesh(baseGeo, baseMat);
                            topMesh.position.y = ht / 2 + 0.002;
                            group.add(topMesh);
                            const botMesh = new THREE.Mesh(baseGeo, baseMat);
                            botMesh.position.y = -ht / 2 - 0.002;
                            group.add(botMesh);
                        } else if (shape.type === 'pyramid') {
                            const botMesh = new THREE.Mesh(baseGeo, baseMat);
                            botMesh.position.y = -ht / 2 - 0.002;
                            group.add(botMesh);
                        }
                    }

                    // 꼭짓점 강조
                    if (highlight === 'vertex' && !special && !interactive) {
                        const positions = [];
                        if (shape.type === 'prism') {
                            for (let i = 0; i < shape.n; i++) {
                                const a = (i / shape.n) * Math.PI * 2;
                                positions.push([Math.sin(a) * r, ht / 2, Math.cos(a) * r]);
                                positions.push([Math.sin(a) * r, -ht / 2, Math.cos(a) * r]);
                            }
                        } else if (shape.type === 'pyramid') {
                            positions.push([0, ht / 2, 0]);
                            for (let i = 0; i < shape.n; i++) {
                                const a = (i / shape.n) * Math.PI * 2;
                                positions.push([Math.sin(a) * r, -ht / 2, Math.cos(a) * r]);
                            }
                        }
                        const sphereGeo = new THREE.SphereGeometry(0.14, 16, 16);
                        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xef4444, depthTest: false });
                        disposables.push(sphereGeo, sphereMat);
                        positions.forEach(p => {
                            const s = new THREE.Mesh(sphereGeo, sphereMat);
                            s.position.set(p[0], p[1], p[2]);
                            s.renderOrder = 3;
                            group.add(s);
                        });
                    }

                    // 모서리 강조 - 보이는 모서리(실선)만 빨간색으로 (가려진 모서리는 점선 검정 그대로)
                    if (highlight === 'edge' && !special && !interactive) {
                        solidMat.color.setHex(0xef4444);
                        // 보이는 모서리에 빨간 굵은 튜브 추가 (depthTest로 가려진 부분은 mesh가 가림)
                        const pts = edges.attributes.position.array;
                        const tubeMat = new THREE.MeshBasicMaterial({
                            color: 0xef4444,
                            polygonOffset: true,
                            polygonOffsetFactor: -1.0,
                            polygonOffsetUnits: -1.0
                        });
                        disposables.push(tubeMat);
                        for (let i = 0; i < pts.length; i += 6) {
                            const v1 = new THREE.Vector3(pts[i], pts[i + 1], pts[i + 2]);
                            const v2 = new THREE.Vector3(pts[i + 3], pts[i + 4], pts[i + 5]);
                            const dir = new THREE.Vector3().subVectors(v2, v1);
                            const len = dir.length();
                            const tubeGeo = new THREE.CylinderGeometry(0.035, 0.035, len, 6);
                            disposables.push(tubeGeo);
                            const tube = new THREE.Mesh(tubeGeo, tubeMat);
                            tube.position.copy(v1).add(v2).multiplyScalar(0.5);
                            tube.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
                            tube.renderOrder = 3;
                            group.add(tube);
                        }
                    }

                    // ============ 클릭으로 직접 찾기 (interactive 모드) ============
                    // 부분을 직접 클릭하면 색이 변하고 onPartClick(type) 호출
                    const raycaster = new THREE.Raycaster();
                    const pointer = new THREE.Vector2();
                    const clickProxies = [];      // 꼭짓점/모서리: 클릭 가능한 중립색 프록시
                    let baseShown = false, sideShown = false, firstProxyFired = false;

                    const addBaseOverlay = () => {
                        if (baseShown) return; baseShown = true;
                        const baseGeo = createNgonGeometry(r, shape.n);
                        disposables.push(baseGeo);
                        const baseMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24, side: THREE.DoubleSide, transparent: true, opacity: 0.9, polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2 });
                        disposables.push(baseMat);
                        const ys = shape.type === 'prism' ? [ht/2 + 0.002, -ht/2 - 0.002] : [-ht/2 - 0.002];
                        ys.forEach(y => { const m = new THREE.Mesh(baseGeo, baseMat); m.position.y = y; group.add(m); });
                    };
                    const addSideOverlay = () => {
                        if (sideShown) return; sideShown = true;
                        const sideMat = new THREE.MeshBasicMaterial({ color: darkenColor(color, 0.55), side: THREE.DoubleSide, transparent: true, opacity: 0.85, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 });
                        disposables.push(sideMat);
                        for (let i = 0; i < shape.n; i++) {
                            const a1 = (i/shape.n)*Math.PI*2, a2 = ((i+1)/shape.n)*Math.PI*2;
                            const x1 = Math.sin(a1)*r, z1 = Math.cos(a1)*r, x2 = Math.sin(a2)*r, z2 = Math.cos(a2)*r;
                            const sGeo = new THREE.BufferGeometry();
                            const verts = shape.type === 'prism'
                                ? new Float32Array([x1,ht/2,z1, x2,ht/2,z2, x2,-ht/2,z2, x1,-ht/2,z1])
                                : new Float32Array([0,ht/2,0, x1,-ht/2,z1, x2,-ht/2,z2]);
                            sGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
                            sGeo.setIndex(shape.type === 'prism' ? [0,1,2,0,2,3] : [0,1,2]);
                            sGeo.computeVertexNormals();
                            disposables.push(sGeo);
                            group.add(new THREE.Mesh(sGeo, sideMat));
                        }
                    };

                    if (interactive && !special) {
                        if (highlight === 'vertex') {
                            const positions = [];
                            if (shape.type === 'prism') {
                                for (let i = 0; i < shape.n; i++) { const a = (i/shape.n)*Math.PI*2; positions.push([Math.sin(a)*r, ht/2, Math.cos(a)*r]); positions.push([Math.sin(a)*r, -ht/2, Math.cos(a)*r]); }
                            } else { positions.push([0, ht/2, 0]); for (let i = 0; i < shape.n; i++) { const a = (i/shape.n)*Math.PI*2; positions.push([Math.sin(a)*r, -ht/2, Math.cos(a)*r]); } }
                            const sphereGeo = new THREE.SphereGeometry(0.16, 16, 16);
                            disposables.push(sphereGeo);
                            positions.forEach(p => {
                                const m = new THREE.MeshBasicMaterial({ color: 0x94a3b8, depthTest: false });
                                disposables.push(m);
                                const s = new THREE.Mesh(sphereGeo, m);
                                s.position.set(p[0], p[1], p[2]); s.renderOrder = 3;
                                group.add(s); clickProxies.push(s);
                            });
                        } else if (highlight === 'edge') {
                            const pts = edges.attributes.position.array;
                            for (let i = 0; i < pts.length; i += 6) {
                                const v1 = new THREE.Vector3(pts[i], pts[i+1], pts[i+2]);
                                const v2 = new THREE.Vector3(pts[i+3], pts[i+4], pts[i+5]);
                                const dir = new THREE.Vector3().subVectors(v2, v1); const len = dir.length();
                                const tubeGeo = new THREE.CylinderGeometry(0.05, 0.05, len, 6); disposables.push(tubeGeo);
                                const m = new THREE.MeshBasicMaterial({ color: 0x94a3b8 }); disposables.push(m);
                                const tube = new THREE.Mesh(tubeGeo, m);
                                tube.position.copy(v1).add(v2).multiplyScalar(0.5);
                                tube.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
                                tube.renderOrder = 3; group.add(tube); clickProxies.push(tube);
                            }
                        }
                    }

                    const pickAt = (cx, cy) => {
                        if (!interactive || !renderer) return;
                        const rect = renderer.domElement.getBoundingClientRect();
                        pointer.x = ((cx - rect.left) / rect.width) * 2 - 1;
                        pointer.y = -((cy - rect.top) / rect.height) * 2 + 1;
                        raycaster.setFromCamera(pointer, camera);
                        let found = null;
                        if (highlight === 'base' || highlight === 'side') {
                            const hit = raycaster.intersectObject(mesh, false)[0];
                            if (hit && hit.face) {
                                const ny = Math.abs(hit.face.normal.y);
                                // 처음 찾았을 때만 팝업(found) - 이미 색칠됐으면 조용히
                                if (highlight === 'base' && ny > 0.6 && !baseShown) { addBaseOverlay(); found = 'base'; }
                                else if (highlight === 'side' && ny <= 0.6 && !sideShown) { addSideOverlay(); found = 'side'; }
                            }
                        } else if (clickProxies.length) {
                            const hit = raycaster.intersectObjects(clickProxies, false)[0];
                            if (hit) {
                                hit.object.material.color.setHex(0xef4444); // 클릭한 점/선 색칠
                                if (!firstProxyFired) { found = highlight; firstProxyFired = true; }
                            }
                        }
                        if (found && cbRef.current) cbRef.current(found);
                    };

                    group.rotation.y = 0.5;
                    group.rotation.x = 0.18;

                    // 인터랙션 (드래그 회전 + interactive 모드에서는 탭으로 부분 선택)
                    let isDragging = false;
                    let prev = { x: 0, y: 0 };
                    let downXY = null, movedDist = 0;
                    const getXY = (e) => ({
                        x: e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX),
                        y: e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY)
                    });
                    const onStart = (e) => { isDragging = true; prev = getXY(e); downXY = prev; movedDist = 0; e.preventDefault && e.preventDefault(); };
                    const onMove = (e) => {
                        if (!isDragging) return;
                        const xy = getXY(e);
                        movedDist += Math.abs(xy.x - prev.x) + Math.abs(xy.y - prev.y);
                        group.rotation.y += (xy.x - prev.x) * 0.01;
                        group.rotation.x += (xy.y - prev.y) * 0.01;
                        prev = xy;
                    };
                    const onEnd = () => {
                        if (isDragging && interactive && downXY && movedDist < 6) pickAt(downXY.x, downXY.y);
                        isDragging = false; downXY = null;
                    };
                    const el = mountRef.current;
                    el.addEventListener('mousedown', onStart);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onEnd);
                    el.addEventListener('touchstart', onStart, { passive: false });
                    window.addEventListener('touchmove', onMove, { passive: false });
                    window.addEventListener('touchend', onEnd);

                    const animate = () => {
                        if (renderer && scene && camera) renderer.render(scene, camera);
                        frameId = requestAnimationFrame(animate);
                    };
                    animate();

                    stateRef.current.cleanup = () => {
                        try { el.removeEventListener('mousedown', onStart); } catch (e) {}
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onEnd);
                        try { el.removeEventListener('touchstart', onStart); } catch (e) {}
                        window.removeEventListener('touchmove', onMove);
                        window.removeEventListener('touchend', onEnd);
                        cancelAnimationFrame(frameId);
                        disposables.forEach(d => { try { d.dispose && d.dispose(); } catch (e) {} });
                        if (renderer) {
                            try { renderer.dispose(); } catch (e) {}
                            try { if (renderer.forceContextLoss) renderer.forceContextLoss(); } catch (e) {}
                            // DOM 제거는 React에 맡김 (wrapper div unmount 시 자동 정리됨)
                            // 직접 removeChild 호출하지 않음 - React와 충돌 방지
                            renderer = null;
                        }
                    };
                    initialized = true;
                };

                // 컨테이너 크기 확보 후 초기화 시도
                const tryInit = () => {
                    if (!isMounted || initialized || !mountRef.current) return;
                    const w = mountRef.current.clientWidth;
                    const h = mountRef.current.clientHeight;
                    if (w > 0 && h > 0) {
                        initThree(w, h);
                    } else {
                        frameId = requestAnimationFrame(tryInit);
                    }
                };
                tryInit();

                // ResizeObserver - 컨테이너 크기 변화/지연 마운트 시 초기화 보장
                if (typeof ResizeObserver !== 'undefined' && mountRef.current) {
                    ro = new ResizeObserver(() => {
                        if (!isMounted || !mountRef.current) return;
                        const w = mountRef.current.clientWidth;
                        const h = mountRef.current.clientHeight;
                        if (!initialized && w > 0 && h > 0) {
                            initThree(w, h);
                        } else if (initialized && camera && renderer && w > 0 && h > 0) {
                            camera.aspect = w / h;
                            camera.updateProjectionMatrix();
                            renderer.setSize(w, h);
                        }
                    });
                    ro.observe(mountRef.current);
                }

                return () => {
                    isMounted = false;
                    if (ro) ro.disconnect();
                    if (stateRef.current.cleanup) stateRef.current.cleanup();
                };
            }, [shape, color, highlight, special, interactive]);

            // dangerouslySetInnerHTML로 React가 children reconciliation 안 하게 → Three.js canvas와 충돌 방지
            return <div ref={mountRef} className="w-full h-full cursor-grab active:cursor-grabbing" dangerouslySetInnerHTML={{__html: ''}} />;
        }
